<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJChapa</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #020308;
      font-family: 'DM Mono', monospace;
      color: #e8eaf0;
      cursor: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    @media(hover:none){ body { cursor: auto; } }
    #custom-cursor {
      position: fixed; width: 5px; height: 5px; border-radius: 50%;
      pointer-events: none; z-index: 999999; transform: translate(-50%,-50%);
      background: rgba(255,100,60,0.85); box-shadow: 0 0 8px rgba(255,60,20,0.7);
    }
    .fx-scan {
      position: fixed; inset: 0; pointer-events: none; z-index: 99998;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
    }
    .fx-vig {
      position: fixed; inset: 0; pointer-events: none; z-index: 99997;
      background: radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.88) 100%);
    }
    .fx-noise {
      position: fixed; inset: 0; opacity: 0.028; pointer-events: none; z-index: 99996;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 128px;
    }
    #collapse-overlay {
      position: fixed; inset: 0; z-index: 99994;
      pointer-events: none; opacity: 0;
      background: radial-gradient(ellipse at center, rgba(60,0,0,0.0) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,1) 100%);
    }
    #hero-canvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 30; pointer-events: none;
    }
    #star-nav {
      position: fixed; top: 0; left: 0; z-index: 25;
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s cubic-bezier(0.16,1,0.3,1);
    }
    #star-nav.docked { opacity: 1; pointer-events: all; }
    #star-btn {
      display: block; position: relative;
      width: 180px; height: 180px;
      background: none; border: none; padding: 0; cursor: none;
    }
    @media(hover:none){ #star-btn { cursor: pointer; } }
    #star-canvas { display: block; }
    #star-hitarea {
      position: absolute; top: 58px; left: 58px;
      width: 64px; height: 64px; border-radius: 50%; z-index: 10;
    }
    #stage-landing { position: fixed; inset: 0; z-index: 10; }
    #starfield { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }
    .nebula {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 25% 70%, rgba(40,5,5,0.16) 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 80% 30%, rgba(30,5,5,0.12) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(20,5,5,0.1) 0%, transparent 70%);
      animation: pulseNeb 20s infinite alternate ease-in-out;
    }
    @keyframes pulseNeb { 0%{opacity:.8;transform:scale(1)} 100%{opacity:1;transform:scale(1.05)} }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-15px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(15px)}  to{opacity:1;transform:translateY(0)} }
    .top-header {
      position: absolute; top: 3rem; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; flex-direction: column; align-items: center; pointer-events: none;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .site-name {
      font-family: 'Cormorant Garamond', serif; font-weight: 300;
      font-size: clamp(1.5rem, 4vw, 2.5rem); letter-spacing: 0.28em;
      text-transform: uppercase; color: #eef0f8; text-align: center; white-space: nowrap;
      opacity: 0; animation: fadeDown 1.4s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
      text-shadow: 0 0 40px rgba(255,60,20,0.08);
    }
    .site-name::after {
      content:''; display:block; width:60%; height:1px;
      background: linear-gradient(90deg, transparent, rgba(160,30,10,0.35), transparent);
      margin: 0.5rem auto 0;
    }
    .bottom-nav {
      position: absolute; bottom: 3.5rem; left: 0; width: 100%;
      z-index: 10; display: flex; align-items: center; justify-content: center; gap: 0 2rem;
      opacity: 0; animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .link-item {
      display: flex; align-items: center; gap: 0.36rem; text-decoration: none; color: #8892b0;
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      transition: color 0.3s; position: relative; white-space: nowrap; cursor: none;
    }
    .link-item:hover { color: #e0e6ff; }
    .link-item svg { width: 12px; height: 12px; opacity: 0.7; transition: opacity 0.3s; }
    .link-item:hover svg { opacity: 0.9; }
    .link-item::after {
      content:''; position:absolute; bottom:-4px; left:0; width:0; height:1px;
      background: rgba(180,40,20,0.5); transition: width 0.3s;
    }
    .link-item:hover::after { width:100%; }
    .link-divider { width:1px; height:10px; background:#2a2f4a; }
    body.collapsing .top-header { opacity: 0; transform: translateX(-50%) scale(0.9); }
    body.collapsing .bottom-nav { opacity: 0; transform: translateY(16px); }
    body.collapsing #star-nav   { opacity: 0 !important; transition: opacity 0.4s ease; }
    @media(max-width:768px){
      #custom-cursor { display: none; }
      .site-name { font-size: 1.5rem; letter-spacing: 0.18em; }
      .top-header { top: 2.2rem; }
      .bottom-nav { bottom: 2rem; gap: 0 1.2rem; flex-wrap: wrap; justify-content: center; padding: 0 1rem; }
      .link-item { font-size: 0.58rem; letter-spacing: 0.12em; gap: 0.28rem; cursor: pointer; }
      .link-item svg { width: 10px; height: 10px; }
      .link-divider { display: none; }
    }
    @media(max-width:390px){
      .site-name { font-size: 1.1rem; letter-spacing: 0.1em; }
      .link-item { font-size: 0.48rem; }
    }
  </style>
</head>

<script>
// ── CURSOR ─────────────────────────────────────────────────────────────────────
const cur = document.getElementById('custom-cursor');
window.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

// ═══════════════════════════════════════════════════════════════════════════════
// SHARED UTILITIES
// ═══════════════════════════════════════════════════════════════════════════════
function easeInOutCubic(x) {
  return x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x+2,3)/2;
}

// Jagged lightning from (x1,y1) to (x2,y2)
function drawLightning(ctx, x1, y1, x2, y2, segs, spread, color, lineW, alpha) {
  const pts = [[x1,y1]];
  for (let i = 1; i < segs; i++) {
    const lt  = i/segs;
    const bx  = x1+(x2-x1)*lt, by = y1+(y2-y1)*lt;
    const nx  = -(y2-y1), ny = (x2-x1);
    const len = Math.sqrt(nx*nx+ny*ny)||1;
    const jitter = (Math.random()-0.5)*2*spread*(1-Math.abs(lt-0.5)*1.5);
    pts.push([bx+(nx/len)*jitter, by+(ny/len)*jitter]);
  }
  pts.push([x2,y2]);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth   = lineW;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.shadowBlur  = 14;
  ctx.shadowColor = color;
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.stroke();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════════════
// DOCKED STAR
// All the good stuff: orbit particles, breathing, mouse pull,
// pulsing "click me" invitation rings, black lightning after dock
// ═══════════════════════════════════════════════════════════════════════════════
const cv  = document.getElementById('star-canvas');
const ctx = cv.getContext('2d');
const CX  = 90, CY = 90;
let starLoopRunning = false;
let isCollapsing    = false;

// Mouse gravitational pull
let mouse = { x:-999, y:-999 };
window.addEventListener('mousemove', e => { mouse.x=e.clientX; mouse.y=e.clientY; });

// Orbit particles
const orbitParticles = Array.from({length:14},(_,i)=>({
  angle:  (i/14)*Math.PI*2+Math.random()*0.5,
  radius: 28+Math.random()*14,
  speed:  0.009+Math.random()*0.015,
  size:   0.6+Math.random()*1.0,
  alpha:  0.3+Math.random()*0.4
}));

// Organic noise seeds for star shape
const noiseSeed = Array.from({length:10},()=>(Math.random()-0.5)*0.7);

// Black lightning state
let blackLightnings = [], blackLightTimer = 0;
const BL_DURATION = 130;

function spawnBlackLightnings(cx, cy) {
  blackLightnings = Array.from({length:9},(_,i)=>{
    const angle = (i/9)*Math.PI*2+Math.random()*0.5;
    return { angle, baseLen: 32+Math.random()*50 };
  });
  blackLightTimer = BL_DURATION;
}

function drawDockedStar() {
  const t       = performance.now()*0.001;
  const breathe = 1+Math.sin(t*1.8)*0.07;

  // Mouse pull — star-nav top-left corner; canvas center in page ≈ (66,66)
  const starPX = 66, starPY = 66;
  const mdx   = mouse.x - starPX, mdy = mouse.y - starPY;
  const mDist = Math.sqrt(mdx*mdx+mdy*mdy)||1;
  const pull  = Math.min(9,180/(mDist+1));
  const CX2   = CX + (mdx/mDist)*pull*0.55;
  const CY2   = CY + (mdy/mDist)*pull*0.55;
  const glowB = Math.max(0,1-mDist/200);
  const hoverS = 1+glowB*0.12;

  ctx.clearRect(0,0,180,180);
  ctx.save();
  ctx.translate(CX,CY); ctx.scale(hoverS,hoverS); ctx.translate(-CX,-CY);

  // ── Ambient glow ───────────────────────────────────────────────────────────
  const g1 = ctx.createRadialGradient(CX2,CY2,0, CX2,CY2, 52*breathe+22*glowB);
  g1.addColorStop(0,  `rgba(255,255,255,${0.18+glowB*0.22})`);
  g1.addColorStop(0.4,`rgba(255,240,200,${0.07+glowB*0.12})`);
  g1.addColorStop(1,  'rgba(255,200,120,0)');
  ctx.beginPath(); ctx.arc(CX2,CY2,52*breathe+22*glowB,0,Math.PI*2);
  ctx.fillStyle=g1; ctx.fill();

  // ── CLICK INVITATION — three staggered pulsing rings ──────────────────────
  for (let ring=0;ring<3;ring++) {
    const phase = ((t*0.6+ring*0.5)%1);
    const rR    = 34+phase*30;
    const rA    = (1-phase)*(0.20+glowB*0.12);
    ctx.beginPath(); ctx.arc(CX2,CY2,rR,0,Math.PI*2);
    ctx.strokeStyle = `rgba(255,195,100,${rA})`;
    ctx.lineWidth   = 1.3; ctx.stroke();
  }

  // ── Orbit particles ─────────────────────────────────────────────────────────
  orbitParticles.forEach(p=>{
    p.angle+=p.speed;
    const px=CX2+Math.cos(p.angle)*p.radius*breathe;
    const py=CY2+Math.sin(p.angle)*p.radius*breathe*0.72;
    const tw=0.5+0.5*Math.sin(t*3+p.angle*4);
    ctx.beginPath(); ctx.arc(px,py,p.size,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,210,140,${p.alpha*tw})`; ctx.fill();
  });

  // ── Lens flare streaks ──────────────────────────────────────────────────────
  ctx.save();
  ctx.globalAlpha = 0.22+glowB*0.15;
  const fL=26+breathe*4;
  ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=0.6;
  ctx.beginPath(); ctx.moveTo(CX2-fL,CY2); ctx.lineTo(CX2+fL,CY2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(CX2,CY2-fL); ctx.lineTo(CX2,CY2+fL); ctx.stroke();
  ctx.globalAlpha=0.10+glowB*0.08;
  const dL=fL*0.5;
  ctx.beginPath(); ctx.moveTo(CX2-dL,CY2-dL); ctx.lineTo(CX2+dL,CY2+dL); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(CX2+dL,CY2-dL); ctx.lineTo(CX2-dL,CY2+dL); ctx.stroke();
  ctx.restore();

  // ── Star shape: slow spin + organic noise ─────────────────────────────────
  const oR=28*breathe, iR=11.2*breathe;
  const sa=-Math.PI/2 + t*0.18;
  ctx.beginPath();
  for (let i=0;i<10;i++) {
    const noise=noiseSeed[i]*(0.5+0.5*Math.sin(t*0.7+i));
    const r=(i%2===0?oR:iR)+noise;
    const ang=sa+(i*Math.PI)/5;
    const px=CX2+Math.cos(ang)*r, py=CY2+Math.sin(ang)*r;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.closePath();
  const sf=ctx.createRadialGradient(CX2,CY2-4,0,CX2,CY2,oR);
  sf.addColorStop(0,'rgba(255,255,255,1)');
  sf.addColorStop(0.55,'rgba(255,250,240,0.97)');
  sf.addColorStop(1,'rgba(240,235,255,0.85)');
  ctx.fillStyle=sf; ctx.strokeStyle='rgba(255,255,255,0.95)';
  ctx.lineWidth=1; ctx.lineJoin='miter'; ctx.miterLimit=10;
  ctx.fill(); ctx.stroke();

  // ── BLACK LIGHTNING tendrils after docking ─────────────────────────────────
  if (blackLightTimer>0) {
    blackLightTimer--;
    const lifeR = blackLightTimer/BL_DURATION;
    blackLightnings.forEach(bl=>{
      if (Math.random()<0.25) return; // flicker
      const jAng = bl.angle+(Math.random()-0.5)*0.6;
      const jLen = bl.baseLen*(0.5+Math.random()*0.8)*lifeR;
      const ex = CX2+Math.cos(jAng)*jLen, ey = CY2+Math.sin(jAng)*jLen;
      // White-hot core bolt
      drawLightning(ctx,CX2,CY2,ex,ey, 5+Math.floor(Math.random()*4), 14*lifeR,
        `rgba(255,255,255,${lifeR*0.85})`, 1+Math.random()*1.2, lifeR*0.9);
      // Dark purple/black corona — the "black lightning" look
      drawLightning(ctx,CX2,CY2,ex,ey, 4+Math.floor(Math.random()*3), 18*lifeR,
        `rgba(30,0,60,${lifeR*0.8})`, 3.5+Math.random()*2, lifeR*0.6);
    });
  }

  ctx.restore();

  // Drop shadow
  const gs1=0.3+glowB*0.4, gs2=0.6+glowB*0.3;
  cv.style.filter=[
    'drop-shadow(0 0 3px rgba(255,255,255,1))',
    `drop-shadow(0 0 ${8+glowB*10}px rgba(220,235,255,${gs2}))`,
    `drop-shadow(0 0 ${20+glowB*20}px rgba(200,220,255,${gs1}))`,
    'drop-shadow(0 0 40px rgba(180,210,255,0.25))'
  ].join(' ');

  // Gentle wobble
  cv.style.transform=`rotate(${Math.sin(t*0.8)*1.8}deg)`;
}

function runDockedStarLoop() {
  drawDockedStar();
  requestAnimationFrame(runDockedStarLoop);
}

// ═══════════════════════════════════════════════════════════════════════════════
// HERO INTRO
// Phase 1 PLASMA   — arcs crackle from across the text toward the forge point
// Phase 2 CONDENSE — supernova flash, star crystallises
// Phase 3 FLIGHT   — bezier sweep across screen with lightning spewing from it
// Phase 4 DOCK     — impact, black lightning burst, invitation rings activate
// ═══════════════════════════════════════════════════════════════════════════════
const heroCv  = document.getElementById('hero-canvas');
const heroCtx = heroCv.getContext('2d');
let hW, hH;
function heroResize(){ hW=heroCv.width=window.innerWidth; hH=heroCv.height=window.innerHeight; }
heroResize();

function getNameRect(){
  const el=document.querySelector('.site-name');
  if(el){ return el.getBoundingClientRect(); }
  return {left:hW/2-100,right:hW/2+100,top:hH*0.12,bottom:hH*0.12+44,width:200,height:44};
}
function getDockTarget(){ return {x:66,y:66}; }

const heroNoiseSeed = Array.from({length:10},()=>(Math.random()-0.5)*0.6);
let plasmaAnchors   = [];

const Intro = {
  phase:'plasma', t:0,
  matX:0, matY:0, x:0, y:0,
  trail:[], maxTrail:65, sparks:[],
  bolts:[],
  p0:{x:0,y:0},p1:{x:0,y:0},p2:{x:0,y:0},p3:{x:0,y:0},p4:{x:0,y:0},

  init(){
    const r = getNameRect();
    this.matX = r.right + 20;
    this.matY = r.top + r.height*0.5;
    this.x = this.matX; this.y = this.matY;
    this.phase='plasma'; this.t=0;
    this.trail=[]; this.sparks=[]; this.bolts=[];

    // 8 plasma anchors spread across the text
    plasmaAnchors=[];
    for(let i=0;i<8;i++){
      plasmaAnchors.push({
        x: r.left+(i/7)*r.width,
        y: r.top+r.height*0.5+(Math.random()-0.5)*r.height*0.65
      });
    }

    // 4th-order Bezier: massive screen sweep
    this.p0={x:this.matX,y:this.matY};
    this.p1={x:hW+260,y:-180};
    this.p2={x:hW-40,y:hH+260};
    this.p3={x:-180,y:hH-80};
    this.p4=getDockTarget();
  },

  update(){
    this.t++;
    if(this.phase==='plasma'){
      if(this.t>=105){ this.phase='condense'; this.t=0; }
      return;
    }
    if(this.phase==='condense'){
      if(this.t>=38){ this.phase='flight'; this.t=0; }
      return;
    }
    if(this.phase==='flight'){
      const fl=235;
      let prog=this.t/fl;
      if(prog>=1){ prog=1; this.phase='done'; this.onDocked(); return; }

      const eT=easeInOutCubic(prog), u=1-eT;
      this.x=Math.pow(u,4)*this.p0.x+4*Math.pow(u,3)*eT*this.p1.x+6*Math.pow(u,2)*eT*eT*this.p2.x+4*u*Math.pow(eT,3)*this.p3.x+Math.pow(eT,4)*this.p4.x;
      this.y=Math.pow(u,4)*this.p0.y+4*Math.pow(u,3)*eT*this.p1.y+6*Math.pow(u,2)*eT*eT*this.p2.y+4*u*Math.pow(eT,3)*this.p3.y+Math.pow(eT,4)*this.p4.y;

      this.trail.push({x:this.x,y:this.y});
      if(this.trail.length>this.maxTrail) this.trail.shift();

      const speed=this.trail.length>1
        ?Math.hypot(this.x-this.trail[this.trail.length-2].x, this.y-this.trail[this.trail.length-2].y):0;

      // Lightning bolts during flight
      if(speed>4 && Math.random()<0.6){
        const tPick=this.trail[Math.floor(Math.random()*Math.max(1,this.trail.length*0.45))];
        this.bolts.push({
          x1:this.x,y1:this.y,
          x2:tPick.x+(Math.random()-0.5)*70,
          y2:tPick.y+(Math.random()-0.5)*70,
          life:1, decay:0.18+Math.random()*0.25
        });
      }
      // Wild sideways bolts
      if(speed>5 && Math.random()<0.35){
        const a=Math.random()*Math.PI*2, d=35+Math.random()*90;
        this.bolts.push({x1:this.x,y1:this.y,x2:this.x+Math.cos(a)*d,y2:this.y+Math.sin(a)*d,life:1,decay:0.24+Math.random()*0.3});
      }

      // Ember sparks
      if(Math.random()<0.7){
        this.sparks.push({x:this.x+(Math.random()-0.5)*10,y:this.y+(Math.random()-0.5)*10,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:1,decay:0.018+Math.random()*0.025,size:Math.random()*2.5+0.6});
      }

      for(let i=this.bolts.length-1;i>=0;i--){ this.bolts[i].life-=this.bolts[i].decay; if(this.bolts[i].life<=0) this.bolts.splice(i,1); }
      for(let i=this.sparks.length-1;i>=0;i--){ const s=this.sparks[i]; s.x+=s.vx;s.y+=s.vy;s.life-=s.decay; if(s.life<=0) this.sparks.splice(i,1); }
    }
  },

  draw(){
    heroCtx.clearRect(0,0,hW,hH);
    if(this.phase==='done') return;
    const t=performance.now()*0.001;

    // ── PLASMA ──────────────────────────────────────────────────────────────────
    if(this.phase==='plasma'){
      const prog=this.t/105;
      heroCtx.lineCap='round';

      plasmaAnchors.forEach(a=>{
        const span=plasmaAnchors[plasmaAnchors.length-1].x-plasmaAnchors[0].x||1;
        const localP=Math.max(0,prog*1.45-(a.x-plasmaAnchors[0].x)/span*0.38);
        if(localP<=0||Math.random()>localP+0.08) return;

        // Build jagged arc segments from anchor → forge
        const segs=5, pts=[[a.x,a.y]];
        for(let i=1;i<segs;i++){
          const lt=i/segs;
          const bx=a.x+(this.matX-a.x)*lt, by=a.y+(this.matY-a.y)*lt;
          const jitter=(1-localP)*38*(1-Math.abs(lt-0.5)*1.2);
          pts.push([bx+(Math.random()-0.5)*jitter*2, by+(Math.random()-0.5)*jitter]);
        }
        pts.push([this.matX,this.matY]);

        // Outer glow arc
        heroCtx.save();
        heroCtx.globalAlpha=Math.random()*0.4*localP;
        heroCtx.strokeStyle=`rgba(255,${100+Math.floor(Math.random()*130)},30,1)`;
        heroCtx.lineWidth=Math.random()*5+2;
        heroCtx.shadowBlur=20; heroCtx.shadowColor='#ff5500';
        heroCtx.beginPath(); heroCtx.moveTo(pts[0][0],pts[0][1]);
        for(let i=1;i<pts.length;i++) heroCtx.lineTo(pts[i][0],pts[i][1]);
        heroCtx.stroke(); heroCtx.restore();

        // Bright core arc
        heroCtx.save();
        heroCtx.globalAlpha=Math.random()*0.85*localP;
        heroCtx.strokeStyle=`rgba(255,${200+Math.floor(Math.random()*55)},120,1)`;
        heroCtx.lineWidth=Math.random()*1.5+0.4;
        heroCtx.beginPath(); heroCtx.moveTo(pts[0][0],pts[0][1]);
        for(let i=1;i<pts.length;i++) heroCtx.lineTo(pts[i][0],pts[i][1]);
        heroCtx.stroke(); heroCtx.restore();
      });

      // Growing energy ball at forge point
      const bR=prog*20+Math.random()*6;
      heroCtx.save();
      heroCtx.beginPath(); heroCtx.arc(this.matX,this.matY,bR,0,Math.PI*2);
      heroCtx.fillStyle='#fff'; heroCtx.globalAlpha=0.65+prog*0.35;
      heroCtx.shadowBlur=28+prog*22; heroCtx.shadowColor='#ff5500';
      heroCtx.fill(); heroCtx.restore();

      // Star emerges near end of plasma
      if(prog>0.62){
        const sA=(prog-0.62)/0.38;
        this._drawStar(this.matX,this.matY,7*sA,2.8*sA,t*0.5,sA,false);
      }
      return;
    }

    // ── CONDENSE ────────────────────────────────────────────────────────────────
    if(this.phase==='condense'){
      const prog=this.t/38;
      const fB=Math.pow(1-prog,1.6);
      const fR=40+(1-prog)*135;
      const fl=heroCtx.createRadialGradient(this.matX,this.matY,0,this.matX,this.matY,fR);
      fl.addColorStop(0,`rgba(255,255,255,${fB})`);
      fl.addColorStop(0.15,`rgba(255,220,160,${fB*0.85})`);
      fl.addColorStop(0.55,`rgba(255,100,30,${fB*0.35})`);
      fl.addColorStop(1,'rgba(255,30,0,0)');
      heroCtx.beginPath(); heroCtx.arc(this.matX,this.matY,fR,0,Math.PI*2);
      heroCtx.fillStyle=fl; heroCtx.fill();

      // Cross flare at peak
      if(prog<0.45){
        heroCtx.save(); heroCtx.globalAlpha=(1-prog*2.2)*0.85;
        const cfL=70+(1-prog)*40;
        heroCtx.strokeStyle='rgba(255,255,255,0.75)'; heroCtx.lineWidth=1.2;
        heroCtx.beginPath(); heroCtx.moveTo(this.matX-cfL,this.matY); heroCtx.lineTo(this.matX+cfL,this.matY); heroCtx.stroke();
        heroCtx.beginPath(); heroCtx.moveTo(this.matX,this.matY-cfL*0.7); heroCtx.lineTo(this.matX,this.matY+cfL*0.7); heroCtx.stroke();
        heroCtx.restore();
      }

      // Burst lightning from the flash point
      if(prog<0.65 && Math.random()<0.75){
        const ang=Math.random()*Math.PI*2, len=25+Math.random()*65*(1-prog);
        drawLightning(heroCtx,this.matX,this.matY,
          this.matX+Math.cos(ang)*len,this.matY+Math.sin(ang)*len,
          5,22*(1-prog),`rgba(255,${150+Math.floor(Math.random()*100)},60,1)`,
          1.2+Math.random()*2,(1-prog)*0.9);
      }

      this._drawStar(this.matX,this.matY,7,2.8,t*0.6,Math.min(1,prog*2.4),true);
      return;
    }

    // ── FLIGHT ──────────────────────────────────────────────────────────────────

    // Comet tail
    if(this.trail.length>1){
      heroCtx.save();
      for(let j=1;j<this.trail.length;j++){
        const frac=j/this.trail.length;
        const p0=this.trail[j-1],p1=this.trail[j];
        heroCtx.beginPath(); heroCtx.moveTo(p0.x,p0.y); heroCtx.lineTo(p1.x,p1.y);
        heroCtx.strokeStyle=`rgba(255,${Math.round(100+frac*120)},${Math.round(20+frac*90)},${frac*0.85})`;
        heroCtx.lineWidth=frac*7; heroCtx.lineCap='round'; heroCtx.stroke();
      }
      heroCtx.restore();
    }

    // Lightning bolts spewing during flight
    for(const b of this.bolts){
      drawLightning(heroCtx,b.x1,b.y1,b.x2,b.y2, 5+Math.floor(Math.random()*4),20*b.life, `rgba(255,200,80,${b.life*0.65})`,2.5,b.life*0.7);
      drawLightning(heroCtx,b.x1,b.y1,b.x2,b.y2, 4+Math.floor(Math.random()*3),10*b.life, `rgba(255,255,255,${b.life})`,0.9,b.life);
    }

    // Ember sparks
    for(const s of this.sparks){
      heroCtx.beginPath(); heroCtx.arc(s.x,s.y,s.size,0,Math.PI*2);
      heroCtx.fillStyle=`rgba(255,190,90,${s.life})`; heroCtx.fill();
    }

    // The star — fast spin during flight
    this._drawStar(this.x,this.y,7,2.8,t*1.1,1,true);
  },

  _drawStar(x,y,oR,iR,spin,alpha,flare){
    const sa=-Math.PI/2+spin;

    // Bloom glow
    const bloom=heroCtx.createRadialGradient(x,y,0,x,y,oR*4);
    bloom.addColorStop(0,`rgba(255,255,255,${0.5*alpha})`);
    bloom.addColorStop(0.4,`rgba(255,210,150,${0.2*alpha})`);
    bloom.addColorStop(1,'rgba(255,80,30,0)');
    heroCtx.beginPath(); heroCtx.arc(x,y,oR*4,0,Math.PI*2);
    heroCtx.fillStyle=bloom; heroCtx.fill();

    // Lens flare cross
    if(flare){
      heroCtx.save(); heroCtx.globalAlpha=0.28*alpha;
      const fL=24+oR;
      heroCtx.strokeStyle='rgba(255,255,255,0.65)'; heroCtx.lineWidth=0.7;
      heroCtx.beginPath(); heroCtx.moveTo(x-fL,y); heroCtx.lineTo(x+fL,y); heroCtx.stroke();
      heroCtx.beginPath(); heroCtx.moveTo(x,y-fL); heroCtx.lineTo(x,y+fL); heroCtx.stroke();
      heroCtx.restore();
    }

    // Star body with organic noise
    const nt=performance.now()*0.001;
    heroCtx.beginPath();
    for(let i=0;i<10;i++){
      const noise=heroNoiseSeed[i]*(0.5+0.5*Math.sin(nt*0.9+i));
      const r=(i%2===0?oR:iR)+noise*alpha;
      const ang=sa+(i*Math.PI)/5;
      const px=x+Math.cos(ang)*r, py=y+Math.sin(ang)*r;
      i===0?heroCtx.moveTo(px,py):heroCtx.lineTo(px,py);
    }
    heroCtx.closePath();
    heroCtx.fillStyle=`rgba(255,255,255,${alpha})`;
    heroCtx.strokeStyle=`rgba(255,255,255,${0.9*alpha})`;
    heroCtx.lineWidth=0.8; heroCtx.lineJoin='miter'; heroCtx.miterLimit=10;
    heroCtx.shadowBlur=20; heroCtx.shadowColor='rgba(255,180,80,0.8)';
    heroCtx.fill(); heroCtx.stroke(); heroCtx.shadowBlur=0;
  },

  onDocked(){
    heroCv.style.opacity='0';
    heroCv.style.transition='opacity 0.5s ease';
    document.getElementById('star-nav').classList.add('docked');

    // Trigger black lightning crackle at dock
    spawnBlackLightnings(CX,CY);

    // Arrival impact snap
    cv.style.transition='none';
    cv.style.transform='rotate(0deg) scale(1.6)';
    setTimeout(()=>{
      cv.style.transition='transform 0.45s cubic-bezier(0.16,1,0.3,1)';
      cv.style.transform='rotate(0deg) scale(1)';
      setTimeout(()=>{ cv.style.transition=''; },500);
    },60);

    if(!starLoopRunning){ starLoopRunning=true; runDockedStarLoop(); }
  }
};

  Intro.update(); Intro.draw();
  if(Intro.phase!=='done') requestAnimationFrame(heroLoop);
}

function startCollapse(){
  if(isCollapsing) return;
  isCollapsing=true;
  document.body.classList.add('collapsing');
  window._bhCollapse=true;
  window._bhCollapseStart=performance.now();
  let ov=0;
  const fadeOv=setInterval(()=>{
    ov=Math.min(1,ov+0.016);
    overlay.style.opacity=ov;
    if(ov>=1) clearInterval(fadeOv);
  },16);
  setTimeout(()=>{ window.location.href='archive.html'; },2300);
}

// ═══════════════════════════════════════════════════════════════════════════════
// STARFIELD + BLACK HOLE — UNCHANGED
// ═══════════════════════════════════════════════════════════════════════════════
function rand(a,b){ return a+Math.random()*(b-a); }
const isMobile = window.innerWidth < 768;
const vCv  = document.getElementById('starfield');
const vCtx = vCv.getContext('2d');
let vW, vH, vStars=[], vShoot=[], vDust=[];
const BH = {rx:.5, ry:.5};
let bhX, bhY, bhPulse=0, vFr=0, vNextS;
const BH_BASE_R=28;
let bhR=BH_BASE_R, gravMult=1, collapseProgress=0;
const STAR_COUNT=isMobile?100:130, S_MIN=isMobile?60:40, S_MAX=isMobile?160:110;
const GRAVITY_RADIUS=isMobile?220:300, MAX_TRAIL=isMobile?10:18;
const SCOLS=[{h:220,s:80,l:88},{h:200,s:40,l:96},{h:55,s:20,l:95},{h:30,s:65,l:82},{h:10,s:75,l:77}];
const MT=[{h:15,s:90,l:70,w:[1.2,2],len:[100,220]},{h:195,s:80,l:85,w:[1,1.8],len:[120,250]},{h:210,s:20,l:96,w:[.8,1.5],len:[80,150]}];
function vResize(){

  bhX=vW*BH.rx; bhY=vH*BH.ry;
}
function spawnStar(){
  const e=Math.floor(rand(0,4)); let x,y;
  if(e===0){x=rand(0,vW);y=-20;}else if(e===1){x=vW+20;y=rand(0,vH);}
  else if(e===2){x=rand(0,vW);y=vH+20;}else{x=-20;y=rand(0,vH);}
  const c=SCOLS[Math.floor(Math.random()*SCOLS.length)]; const ib=Math.random()>.84;
  return{x,y,vx:0,vy:0,r:ib?rand(.8,1.4):rand(.3,.7),baseOpacity:ib?rand(.5,.9):rand(.1,.4),
    twinkleSpeed:rand(.002,.01),twinkleOffset:rand(0,Math.PI*2),h:c.h,s:c.s,l:c.l,trail:[],isBright:ib};
}
function initStars(){
  vStars=[];vShoot=[];vDust=[];
  for(let i=0;i<STAR_COUNT;i++){const s=spawnStar();s.x=rand(0,vW);s.y=rand(0,vH);vStars.push(s);}

}
function drawBH(){
  bhPulse+=0.018; const pulse=Math.sin(bhPulse);
  if(window._bhCollapse){
    const el=performance.now()-window._bhCollapseStart;
    collapseProgress=Math.min(1,el/2000);

  well.addColorStop(0.4,'rgba(2,4,10,0.7)');well.addColorStop(0.7,'rgba(3,5,14,0.3)');
  well.addColorStop(1,'rgba(0,0,0,0)');
  vCtx.beginPath();vCtx.arc(bhX,bhY,wellR,0,Math.PI*2);vCtx.fillStyle=well;vCtx.fill();
  vCtx.save();vCtx.translate(bhX,bhY);vCtx.scale(1,0.28);
  const diskR=bhR*2.8+pulse*2;

  disk.addColorStop(0,'rgba(255,240,200,0)');disk.addColorStop(0.2,`rgba(255,200,120,${da})`);
  disk.addColorStop(0.5,`rgba(255,140,60,${da*.7})`);disk.addColorStop(0.8,'rgba(180,80,20,0.18)');
  disk.addColorStop(1,'rgba(0,0,0,0)');
  vCtx.beginPath();vCtx.arc(0,0,diskR,0,Math.PI*2);vCtx.fillStyle=disk;vCtx.fill();vCtx.restore();
  vCtx.beginPath();vCtx.arc(bhX,bhY,bhR*1.5,0,Math.PI*2);
  vCtx.strokeStyle=`rgba(255,210,140,${0.25+pulse*.12+collapseProgress*.4})`;
  vCtx.lineWidth=1+collapseProgress*3;vCtx.stroke();
  vCtx.beginPath();vCtx.arc(bhX,bhY,bhR*1.15,0,Math.PI*2);
  vCtx.strokeStyle=`rgba(255,180,80,${0.15+pulse*.08+collapseProgress*.3})`;
  vCtx.lineWidth=2.5+collapseProgress*6;vCtx.stroke();
  vCtx.beginPath();vCtx.arc(bhX,bhY,bhR,0,Math.PI*2);vCtx.fillStyle='#000';vCtx.fill();
}
function mkShoot(){
  const t=MT[Math.floor(Math.random()*MT.length)];const ss=Math.floor(rand(0,4));
  let sx,sy,tx,ty;
  if(ss===0){sx=rand(0,vW);sy=-20;tx=rand(0,vW);ty=vH+20;}
  else if(ss===1){sx=vW+20;sy=rand(0,vH);tx=-20;ty=rand(0,vH);}
  else if(ss===2){sx=rand(0,vW);sy=vH+20;tx=rand(0,vW);ty=-20;}
  else{sx=-20;sy=rand(0,vH);tx=vW+20;ty=rand(0,vH);}
  const ang=Math.atan2(ty-sy,tx-sx),spd=rand(28,50);
  return{x:sx,y:sy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
    len:rand(t.len[0],t.len[1]),alpha:1,fade:rand(.015,.03),width:rand(t.w[0],t.w[1]),h:t.h,s:t.s,l:t.l};
}
function vLoop(){
  vCtx.clearRect(0,0,vW,vH); vFr++; drawBH();
  if(vFr>=vNextS){vShoot.push(mkShoot());if(!isMobile&&Math.random()<.4)vShoot.push(mkShoot());vNextS=vFr+rand(S_MIN,S_MAX);}
  if(window._bhCollapse&&vFr%5===0)vShoot.push(mkShoot());
  vShoot=vShoot.filter(s=>s.alpha>0&&s.x>-500&&s.x<vW+500&&s.y>-500&&s.y<vH+500);
  for(const s of vShoot){
    vCtx.save();
    const tx2=s.x-s.vx*(s.len/20),ty2=s.y-s.vy*(s.len/20);
    const g=vCtx.createLinearGradient(s.x,s.y,tx2,ty2);
    g.addColorStop(0,`hsla(0,0%,100%,${s.alpha})`);g.addColorStop(.1,`hsla(${s.h},${s.s}%,${s.l}%,${s.alpha*.9})`);
    g.addColorStop(1,`hsla(${s.h},${s.s}%,${s.l}%,0)`);
    vCtx.beginPath();vCtx.moveTo(s.x,s.y);vCtx.lineTo(tx2,ty2);
    vCtx.strokeStyle=g;vCtx.lineWidth=s.width;vCtx.lineCap='round';vCtx.stroke();
    if(Math.random()<.04)vDust.push({x:s.x,y:s.y,vx:s.vx*.05+rand(-1,1),vy:s.vy*.05+rand(-1,1),
      alpha:s.alpha*.8,decay:rand(.02,.06),size:rand(.5,2),h:s.h,s:s.s,l:s.l});
    vCtx.restore();
    const dx=bhX-s.x,dy=bhY-s.y,dist=Math.sqrt(dx*dx+dy*dy);
    s.vx+=(dx/dist)*(.9*gravMult);s.vy+=(dy/dist)*(.9*gravMult);

    vCtx.fillStyle=`hsla(${p.h},${p.s}%,${p.l}%,${p.alpha})`;vCtx.fill();
    p.x+=p.vx;p.y+=p.vy;p.alpha-=p.decay;
  }
  for(let i=vStars.length-1;i>=0;i--){
    const s=vStars[i];

    if(dist<bhR){vStars[i]=spawnStar();continue;}
    const gp=(.001+(220/(dist+40))*.022)*gravMult;
    s.vx+=(dx/dist)*gp;s.vy+=(dy/dist)*gp;
    const sp=Math.sqrt(s.vx*s.vx+s.vy*s.vy);
    const maxSpd=(0.25+(1100/(dist+8))*2.4)*(window._bhCollapse?4+collapseProgress*9:1);
    if(sp>maxSpd){s.vx=(s.vx/sp)*maxSpd;s.vy=(s.vy/sp)*maxSpd;}
    const trailR=window._bhCollapse?vW:GRAVITY_RADIUS;
    if(dist<trailR){s.trail.push({x:s.x,y:s.y});if(s.trail.length>MAX_TRAIL)s.trail.shift();}
    else if(s.trail.length)s.trail.shift();
    s.x+=s.vx;s.y+=s.vy;
    const tw=Math.sin(vFr*s.twinkleSpeed+s.twinkleOffset);
    const a=Math.max(.01,s.baseOpacity+tw*s.baseOpacity*.4);
    if(s.trail.length>1){
      vCtx.save();
      for(let j=1;j<s.trail.length;j++){
        const ta=(j/s.trail.length)*.3;
        vCtx.beginPath();vCtx.moveTo(s.trail[j-1].x,s.trail[j-1].y);
        vCtx.lineTo(s.trail[j].x,s.trail[j].y);
        vCtx.strokeStyle=`hsla(${s.h},${s.s}%,${s.l}%,${ta})`;
        vCtx.lineWidth=s.r*.5;vCtx.lineCap='round';vCtx.stroke();
      }vCtx.restore();
    }
    vCtx.beginPath();vCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    vCtx.fillStyle=`hsla(${s.h},${s.s}%,${s.l}%,${a})`;vCtx.fill();
    if(s.isBright&&a>.4){
      const gg=vCtx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4.5);
      gg.addColorStop(0,`hsla(${s.h},${s.s}%,${s.l}%,${a*.35})`);
      gg.addColorStop(1,`hsla(${s.h},${s.s}%,${s.l}%,0)`);
      vCtx.beginPath();vCtx.arc(s.x,s.y,s.r*4.5,0,Math.PI*2);
      vCtx.fillStyle=gg;vCtx.fill();
    }
  }
  requestAnimationFrame(vLoop);
}
window.addEventListener('resize',()=>{ vResize();initStars();heroResize(); });
vResize();initStars();vLoop();
</script>
