<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJChapa</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #020308;
      font-family: 'DM Mono', monospace;
      color: #e8eaf0;
      cursor: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    @media(hover:none){ body { cursor: auto; } }

    #custom-cursor {
      position: fixed; width: 5px; height: 5px; border-radius: 50%;
      pointer-events: none; z-index: 999999; transform: translate(-50%,-50%);
      background: rgba(180,200,255,0.7); box-shadow: 0 0 8px rgba(100,160,255,0.5);
    }

    .fx-scan {
      position: fixed; inset: 0; pointer-events: none; z-index: 99998;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
    }
    .fx-vig {
      position: fixed; inset: 0; pointer-events: none; z-index: 99997;
      background: radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.88) 100%);
    }
    .fx-noise {
      position: fixed; inset: 0; opacity: 0.028; pointer-events: none; z-index: 99996;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 128px;
    }

    /* RED SURGE OVERLAY */
    #surge-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 99995; opacity: 0;
    }
    @keyframes surgeFlare {
      0%   { opacity:0; background: radial-gradient(ellipse at center, rgba(200,10,10,0.0) 0%, rgba(100,0,0,0.0) 100%); }
      12%  { opacity:1; background: radial-gradient(ellipse at center, rgba(200,10,10,0.16) 0%, rgba(100,0,0,0.36) 100%); }
      100% { opacity:0; background: radial-gradient(ellipse at center, rgba(160,5,5,0.04) 0%, rgba(60,0,0,0.14) 100%); }
    }
    #surge-overlay.active {
      animation: surgeFlare var(--surge-dur, 3s) ease-out forwards;
    }

    #stage-landing { position: fixed; inset: 0; z-index: 10; }
    #starfield { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }

    .nebula {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 25% 70%, rgba(15,25,60,0.14) 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 80% 30%, rgba(10,15,45,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(20,25,40,0.1) 0%, transparent 70%);
      animation: pulseNeb 20s infinite alternate ease-in-out;
    }
    @keyframes pulseNeb { 0%{opacity:.8;transform:scale(1)} 100%{opacity:1;transform:scale(1.05)} }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-15px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(15px)}  to{opacity:1;transform:translateY(0)} }

    /* SIGIL ANIMATIONS */
    @keyframes spinSlow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes spinFast { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes glowIdle {
      0%,100%{ filter: drop-shadow(0 0 4px rgba(200,180,255,0.45)) drop-shadow(0 0 10px rgba(160,100,255,0.25)); }
      50%    { filter: drop-shadow(0 0 7px rgba(220,200,255,0.8))  drop-shadow(0 0 18px rgba(180,120,255,0.5)); }
    }
    @keyframes glowSurge {
      0%,100%{ filter: drop-shadow(0 0 10px rgba(255,40,20,0.9)) drop-shadow(0 0 28px rgba(200,0,0,0.65)) drop-shadow(0 0 50px rgba(150,0,0,0.4)); }
      50%    { filter: drop-shadow(0 0 18px rgba(255,90,50,1))   drop-shadow(0 0 46px rgba(220,20,0,0.9))  drop-shadow(0 0 88px rgba(170,0,0,0.55)); }
    }

    #sigil-wrap {
      position: absolute; top: 2rem; left: 2rem; z-index: 20;
      opacity: 0; animation: fadeDown 1.4s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }

    #sigil-btn {
      width: 42px; height: 42px;
      background: none; border: none; padding: 0;
      cursor: none; display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    #sigil-star {
      animation: spinSlow 12s linear infinite, glowIdle 3s ease-in-out infinite;
      transform-origin: center; display: block;
    }
    #sigil-star.surge {
      animation: spinFast 0.55s linear infinite, glowSurge 0.35s ease-in-out infinite;
    }
    #sigil-star.surge .star-main  { stroke: rgba(255,70,50,0.95); }
    #sigil-star.surge .star-hex   { stroke: rgba(255,55,35,0.55); fill: rgba(200,15,0,0.2); }
    #sigil-star.surge .star-dot,
    #sigil-star.surge .star-pip  { fill: rgba(255,100,70,0.95); }

    /* warning dot */
    #warn-dot {
      position: absolute; top: 1px; right: 1px;
      width: 7px; height: 7px; border-radius: 50%;
      background: #ff1a00;
      box-shadow: 0 0 6px #ff1a00, 0 0 14px rgba(255,26,0,0.8);
      opacity: 0; pointer-events: none; transition: opacity 0.1s;
    }
    #warn-dot.active {
      opacity: 1;
      animation: warnPulse 0.22s ease-in-out infinite;
    }
    @keyframes warnPulse {
      0%,100%{ opacity:1; box-shadow:0 0 8px #ff1a00, 0 0 22px rgba(255,26,0,0.9); }
      50%    { opacity:0.35; box-shadow:0 0 3px #ff1a00; }
    }

    /* CONNECTOR LINE */
    .sig-line {
      width: 1px; height: 12px;
      background: linear-gradient(to bottom, rgba(180,140,255,0.4), rgba(180,140,255,0.06));
      transition: background 0.4s;
    }
    .sig-line.surge {
      background: linear-gradient(to bottom, rgba(255,70,50,0.6), rgba(180,10,0,0.06));
    }

    /* ARCHIVE LINK — always visible */
    #sigil-archive-link {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.24em;
      color: #b89cdd;
      text-decoration: none;
      padding: 6px 14px;
      border: 1px solid rgba(170,130,240,0.22);
      border-radius: 2px;
      background: rgba(110,70,180,0.05);
      cursor: none;
      white-space: nowrap;
      transition: color 0.25s, border-color 0.25s, background 0.25s, text-shadow 0.25s;
      text-shadow: 0 0 8px rgba(190,150,255,0.35);
    }
    #sigil-archive-link:hover {
      color: #fff;
      border-color: rgba(220,190,255,0.6);
      background: rgba(150,90,255,0.13);
      text-shadow: 0 0 10px rgba(230,210,255,1), 0 0 24px rgba(200,150,255,0.8), 0 0 46px rgba(160,90,255,0.5);
    }
    #sigil-archive-link.surge {
      color: #ff9978;
      border-color: rgba(255,70,50,0.48);
      background: rgba(170,15,0,0.09);
      text-shadow: 0 0 8px rgba(255,70,50,0.8), 0 0 20px rgba(200,10,0,0.5);
    }

    /* SITE NAME */
    .top-header {
      position: absolute; top: 3rem; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; flex-direction: column; align-items: center; pointer-events: none;
    }
    .site-name {
      font-family: 'Cormorant Garamond', serif; font-weight: 300;
      font-size: clamp(1.5rem, 4vw, 2.5rem); letter-spacing: 0.28em;
      text-transform: uppercase; color: #eef0f8; text-align: center; white-space: nowrap;
      opacity: 0; animation: fadeDown 1.4s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
      text-shadow: 0 0 40px rgba(180,200,255,0.15);
    }
    .site-name::after {
      content:''; display:block; width:60%; height:1px;
      background: linear-gradient(90deg, transparent, rgba(74,127,193,0.4), transparent);
      margin: 0.5rem auto 0;
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: absolute; bottom: 3.5rem; left: 0; width: 100%;
      z-index: 10; display: flex; align-items: center; justify-content: center; gap: 0 2rem;
      opacity: 0; animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
    }
    .link-item {
      display: flex; align-items: center; gap: 0.36rem; text-decoration: none; color: #8892b0;
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      transition: color 0.3s; position: relative; white-space: nowrap; cursor: none;
    }
    .link-item:hover { color: #e0e6ff; }
    .link-item svg { width: 12px; height: 12px; opacity: 0.7; transition: opacity 0.3s; }
    .link-item:hover svg { opacity: 0.9; }
    .link-item::after {
      content:''; position:absolute; bottom:-4px; left:0; width:0; height:1px;
      background: rgba(74,127,193,0.5); transition: width 0.3s;
    }
    .link-item:hover::after { width:100%; }
    .link-divider { width:1px; height:10px; background:#2a2f4a; }

    @media(max-width:768px){
      #custom-cursor { display: none; }
      .site-name { font-size: 1.5rem; letter-spacing: 0.18em; }
      .top-header { top: 2.2rem; }
      .bottom-nav { bottom: 2rem; gap: 0 1.2rem; flex-wrap: wrap; justify-content: center; padding: 0 1rem; }
      .link-item { font-size: 0.58rem; letter-spacing: 0.12em; gap: 0.28rem; cursor: pointer; }
      .link-item svg { width: 10px; height: 10px; }
      .link-divider { display: none; }
      #sigil-wrap { top: 1.1rem; left: 1.1rem; }
      #sigil-btn { cursor: pointer; }
      #sigil-archive-link { cursor: pointer; }
    }
    @media(max-width:390px){
      .site-name { font-size: 1.1rem; letter-spacing: 0.1em; }
      .link-item { font-size: 0.48rem; }
    }
  </style>
</head>
<body>

<script>
// CURSOR
const cur = document.getElementById('custom-cursor');
window.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

// ── SURGE SYSTEM ──────────────────────────────────────────────────────────────
let surgeActive = false;
let surgeGravMult = 1;

function triggerSurge() {
  if (surgeActive) return;
  surgeActive = true;
  surgeGravMult = 26;

  const dur = 3000 + Math.random() * 2200;

  // overlay
  const ov = document.getElementById('surge-overlay');
  ov.style.setProperty('--surge-dur', (dur/1000).toFixed(2)+'s');
  ov.classList.remove('active');
  void ov.offsetWidth; // force reflow
  ov.classList.add('active');

  // sigil
  document.getElementById('sigil-star').classList.add('surge');
  document.getElementById('warn-dot').classList.add('active');
  document.getElementById('sig-line').classList.add('surge');
  document.getElementById('sigil-archive-link').classList.add('surge');

  setTimeout(() => {
    surgeActive = false;
    surgeGravMult = 1;
    document.getElementById('sigil-star').classList.remove('surge');
    document.getElementById('warn-dot').classList.remove('active');
    document.getElementById('sig-line').classList.remove('surge');
    document.getElementById('sigil-archive-link').classList.remove('surge');

    // next surge: 18–45 seconds later
    setTimeout(triggerSurge, 18000 + Math.random() * 27000);
  }, dur);
}

// first surge: 10–20 seconds after load
setTimeout(triggerSurge, 10000 + Math.random() * 10000);

// ── STARFIELD ─────────────────────────────────────────────────────────────────
function rand(a,b){ return a+Math.random()*(b-a); }
const isMobile = window.innerWidth < 768;

const vCv  = document.getElementById('starfield');
const vCtx = vCv.getContext('2d');
let vW, vH, vStars=[], vShoot=[], vDust=[];
const BH = {rx:.5, ry:.5};
let bhX, bhY, bhPulse=0, vFr=0, vNextS;
const BH_R = 28;

const STAR_COUNT     = isMobile ? 100 : 130;
const S_MIN          = isMobile ? 60  : 40;
const S_MAX          = isMobile ? 160 : 110;
const GRAVITY_RADIUS = isMobile ? 220 : 300;
const MAX_TRAIL      = isMobile ? 10  : 18;

const SCOLS = [
  {h:220,s:80,l:88},{h:200,s:40,l:96},
  {h:55,s:20,l:95},{h:30,s:65,l:82},{h:10,s:75,l:77}
];
const MT = [
  {h:15,s:90,l:70,w:[1.2,2],len:[100,220]},
  {h:195,s:80,l:85,w:[1,1.8],len:[120,250]},
  {h:210,s:20,l:96,w:[.8,1.5],len:[80,150]}
];

function vResize(){
  vW = vCv.width  = window.innerWidth;
  vH = vCv.height = window.innerHeight;
  bhX = vW * BH.rx; bhY = vH * BH.ry;
}

function spawnStar(){
  const e = Math.floor(rand(0,4));
  let x,y;
  if      (e===0){x=rand(0,vW);y=-20;}
  else if (e===1){x=vW+20;y=rand(0,vH);}
  else if (e===2){x=rand(0,vW);y=vH+20;}
  else           {x=-20;y=rand(0,vH);}
  // during surge, spawn some red-hued stars
  const useRed = surgeActive && Math.random() < 0.6;
  const c = useRed
    ? {h: rand(0,18)|0, s:85, l:72}
    : SCOLS[Math.floor(Math.random()*SCOLS.length)];
  const ib = Math.random() > .84;
  return {
    x, y, vx:0, vy:0,
    r: ib ? rand(.8,1.4) : rand(.3,.7),
    baseOpacity: ib ? rand(.5,.9) : rand(.1,.4),
    twinkleSpeed: rand(.002,.01),
    twinkleOffset: rand(0, Math.PI*2),
    h:c.h, s:c.s, l:c.l, trail:[], isBright:ib
  };
}

function initStars(){
  vStars=[]; vShoot=[]; vDust=[];
  for(let i=0;i<STAR_COUNT;i++){
    const s=spawnStar(); s.x=rand(0,vW); s.y=rand(0,vH); vStars.push(s);
  }
  vNextS=rand(S_MIN,S_MAX);
}

function drawBH(){
  bhPulse += 0.018;
  const pulse = Math.sin(bhPulse);

  // gravitational well
  const well = vCtx.createRadialGradient(bhX,bhY,BH_R*.8,bhX,bhY,BH_R*14);
  well.addColorStop(0,   'rgba(0,0,0,1)');
  well.addColorStop(0.18,'rgba(1,2,6,0.96)');
  well.addColorStop(0.4, 'rgba(2,4,10,0.7)');
  well.addColorStop(0.7, 'rgba(3,5,14,0.3)');
  well.addColorStop(1,   'rgba(0,0,0,0)');
  vCtx.beginPath(); vCtx.arc(bhX,bhY,BH_R*14,0,Math.PI*2);
  vCtx.fillStyle=well; vCtx.fill();

  // accretion disk
  vCtx.save();
  vCtx.translate(bhX,bhY); vCtx.scale(1,0.28);
  const diskR = BH_R*(surgeActive ? 3.6 : 2.8) + pulse*2;
  const disk = vCtx.createRadialGradient(0,0,BH_R*1.05,0,0,diskR);
  if(surgeActive){
    disk.addColorStop(0,   'rgba(255,240,200,0)');
    disk.addColorStop(0.15,`rgba(255,70,30,${0.75+pulse*.15})`);
    disk.addColorStop(0.45,`rgba(210,20,5,${0.5+pulse*.1})`);
    disk.addColorStop(0.75,'rgba(140,5,0,0.22)');
    disk.addColorStop(1,   'rgba(0,0,0,0)');
  } else {
    disk.addColorStop(0,   'rgba(255,240,200,0)');
    disk.addColorStop(0.2, `rgba(255,200,120,${0.55+pulse*.12})`);
    disk.addColorStop(0.5, `rgba(255,140,60,${0.35+pulse*.08})`);
    disk.addColorStop(0.8, 'rgba(180,80,20,0.18)');
    disk.addColorStop(1,   'rgba(0,0,0,0)');
  }
  vCtx.beginPath(); vCtx.arc(0,0,diskR,0,Math.PI*2);
  vCtx.fillStyle=disk; vCtx.fill();
  vCtx.restore();

  // photon rings
  const rc1 = surgeActive ? `rgba(255,70,30,${0.4+pulse*.2})`  : `rgba(255,210,140,${0.25+pulse*.12})`;
  const rc2 = surgeActive ? `rgba(230,40,10,${0.28+pulse*.12})` : `rgba(255,180,80,${0.15+pulse*.08})`;
  vCtx.beginPath(); vCtx.arc(bhX,bhY,BH_R*1.5,0,Math.PI*2);
  vCtx.strokeStyle=rc1; vCtx.lineWidth=1; vCtx.stroke();
  vCtx.beginPath(); vCtx.arc(bhX,bhY,BH_R*1.15,0,Math.PI*2);
  vCtx.strokeStyle=rc2; vCtx.lineWidth=2.5; vCtx.stroke();

  // event horizon
  vCtx.beginPath(); vCtx.arc(bhX,bhY,BH_R,0,Math.PI*2);
  vCtx.fillStyle='#000'; vCtx.fill();
}

function mkShoot(){
  const t=MT[Math.floor(Math.random()*MT.length)];
  const ss=Math.floor(rand(0,4));
  let sx,sy,tx,ty;
  if      (ss===0){sx=rand(0,vW);sy=-20;tx=rand(0,vW);ty=vH+20;}
  else if (ss===1){sx=vW+20;sy=rand(0,vH);tx=-20;ty=rand(0,vH);}
  else if (ss===2){sx=rand(0,vW);sy=vH+20;tx=rand(0,vW);ty=-20;}
  else            {sx=-20;sy=rand(0,vH);tx=vW+20;ty=rand(0,vH);}
  const ang=Math.atan2(ty-sy,tx-sx), spd=rand(28,50);
  return {
    x:sx,y:sy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
    len:rand(t.len[0],t.len[1]),alpha:1,fade:rand(.015,.03),
    width:rand(t.w[0],t.w[1]),h:t.h,s:t.s,l:t.l
  };
}

function vLoop(){
  vCtx.clearRect(0,0,vW,vH);
  vFr++;
  drawBH();

  // shooting stars
  if(vFr >= vNextS){
    vShoot.push(mkShoot());
    if(!isMobile && Math.random()<.4) vShoot.push(mkShoot());
    vNextS = vFr + rand(S_MIN, S_MAX);
  }

  // during surge: rapidly spawn new stars at edges to feed the suction
  if(surgeActive && vFr % 2 === 0){
    vStars.push(spawnStar());
    if(vStars.length > STAR_COUNT * 2.5) vStars.splice(0,1);
  }

  // shooting star tails
  vShoot = vShoot.filter(s => s.alpha>0 && s.x>-500 && s.x<vW+500 && s.y>-500 && s.y<vH+500);
  for(const s of vShoot){
    vCtx.save();
    const tx2=s.x-s.vx*(s.len/20), ty2=s.y-s.vy*(s.len/20);
    const g=vCtx.createLinearGradient(s.x,s.y,tx2,ty2);
    g.addColorStop(0, `hsla(0,0%,100%,${s.alpha})`);
    g.addColorStop(.1,`hsla(${s.h},${s.s}%,${s.l}%,${s.alpha*.9})`);
    g.addColorStop(1, `hsla(${s.h},${s.s}%,${s.l}%,0)`);
    vCtx.beginPath(); vCtx.moveTo(s.x,s.y); vCtx.lineTo(tx2,ty2);
    vCtx.strokeStyle=g; vCtx.lineWidth=s.width; vCtx.lineCap='round'; vCtx.stroke();
    if(Math.random()<.04)
      vDust.push({x:s.x,y:s.y,
        vx:s.vx*.05+rand(-1,1),vy:s.vy*.05+rand(-1,1),
        alpha:s.alpha*.8,decay:rand(.02,.06),size:rand(.5,2),h:s.h,s:s.s,l:s.l});
    vCtx.restore();
    const dx=bhX-s.x, dy=bhY-s.y, dist=Math.sqrt(dx*dx+dy*dy);
    s.vx+=(dx/dist)*.9; s.vy+=(dy/dist)*.9;
    s.x+=s.vx; s.y+=s.vy; s.alpha-=s.fade;
  }

  // dust
  vDust = vDust.filter(p => p.alpha>0);
  for(const p of vDust){
    vCtx.beginPath(); vCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
    vCtx.fillStyle=`hsla(${p.h},${p.s}%,${p.l}%,${p.alpha})`; vCtx.fill();
    p.x+=p.vx; p.y+=p.vy; p.alpha-=p.decay;
  }

  // stars
  for(let i=vStars.length-1; i>=0; i--){
    const s=vStars[i];
    const dx=bhX-s.x, dy=bhY-s.y, dist=Math.sqrt(dx*dx+dy*dy);

    if(dist < BH_R){
      // star consumed — during surge, spit out a tiny red flare
      if(surgeActive){
        for(let k=0;k<3;k++)
          vDust.push({x:bhX+rand(-6,6),y:bhY+rand(-6,6),
            vx:rand(-3,3),vy:rand(-3,3),
            alpha:0.85,decay:rand(.05,.12),size:rand(.8,2.5),h:8,s:90,l:65});
      }
      vStars[i] = spawnStar();
      continue;
    }

    // gravity — massively amplified during surge
    const gBase = .001 + (220/(dist+40))*.022;
    const gp = gBase * surgeGravMult;
    s.vx += (dx/dist)*gp;
    s.vy += (dy/dist)*gp;

    // speed cap — loosened during surge so stars visibly spiral fast
    const sp = Math.sqrt(s.vx*s.vx+s.vy*s.vy);
    const maxSpd = (surgeActive ? 5 : 0.25) + ((surgeActive ? 2000:1100)/(dist+8))*2.4;
    if(sp > maxSpd){ s.vx=(s.vx/sp)*maxSpd; s.vy=(s.vy/sp)*maxSpd; }

    // trail — whole screen during surge
    const trailR = surgeActive ? Math.max(vW,vH) : GRAVITY_RADIUS;
    const trailLen = surgeActive ? MAX_TRAIL*3 : MAX_TRAIL;
    if(dist < trailR){ s.trail.push({x:s.x,y:s.y}); if(s.trail.length>trailLen) s.trail.shift(); }
    else if(s.trail.length) s.trail.shift();

    s.x += s.vx; s.y += s.vy;

    const tw = Math.sin(vFr*s.twinkleSpeed+s.twinkleOffset);
    const a  = Math.max(.01, s.baseOpacity + tw*s.baseOpacity*.4);

    // draw trail
    if(s.trail.length > 1){
      vCtx.save();
      for(let j=1;j<s.trail.length;j++){
        const ta=(j/s.trail.length)*.3;
        const th2 = surgeActive ? 8 : s.h;
        const ts2 = surgeActive ? 88 : s.s;
        vCtx.beginPath();
        vCtx.moveTo(s.trail[j-1].x, s.trail[j-1].y);
        vCtx.lineTo(s.trail[j].x,   s.trail[j].y);
        vCtx.strokeStyle=`hsla(${th2},${ts2}%,${s.l}%,${ta})`;
        vCtx.lineWidth=s.r*.5; vCtx.lineCap='round'; vCtx.stroke();
      }
      vCtx.restore();
    }

    // draw star (shift hue toward red during surge)
    const dh = surgeActive ? s.h*.3 + 8*.7 : s.h;
    const ds = surgeActive ? Math.min(100,s.s*1.25) : s.s;
    vCtx.beginPath(); vCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    vCtx.fillStyle=`hsla(${dh},${ds}%,${s.l}%,${a})`; vCtx.fill();

    if(s.isBright && a>.4){
      const gg=vCtx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4.5);
      gg.addColorStop(0,`hsla(${dh},${ds}%,${s.l}%,${a*.35})`);
      gg.addColorStop(1,`hsla(${dh},${ds}%,${s.l}%,0)`);
      vCtx.beginPath(); vCtx.arc(s.x,s.y,s.r*4.5,0,Math.PI*2);
      vCtx.fillStyle=gg; vCtx.fill();
    }
  }

  requestAnimationFrame(vLoop);
}

window.addEventListener('resize',()=>{ vResize(); initStars(); });
vResize();
initStars();
vLoop();
</script>
</body>
</html>
