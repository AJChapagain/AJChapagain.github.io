<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ajchapa</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #ffffff;
      --border:     #ebebeb;
      --text-main:  #000000;
      --text-muted: #888888;
      --font:       'Mulish', sans-serif;
      --mono:       Menlo, Monaco, Consolas, monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-main);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    #page {
      height: 100vh; 
      height: 100dvh; 
      display: flex;
      flex-direction: column;
      overflow: hidden; 
    }

    /* NAV */
    #nav {
      height: 52px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 24px;
      flex-shrink: 0;
    }
    #nav-time { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }

    #body {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 48px 24px 0;
      min-height: 0; /* Prevents flex children from blowing out the container height */
    }

    #hero {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      padding-bottom: 48px;
      align-items: center;
      min-height: 0;
    }

    #left {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #name {
      font-size: clamp(56px, 10vw, 96px);
      font-weight: 300; 
      line-height: 0.92;
      letter-spacing: -0.05em;
      color: var(--text-main);
      margin-bottom: 40px;
    }

    #links {
      display: flex;
      flex-direction: column;
      border-top: 1px solid var(--border);
    }

    .link-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--text-main);
      transition: padding 0.3s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s;
    }
    .link-row:hover {
      background: #f9f9f9;
      padding-left: 12px;
      padding-right: 12px;
      margin: 0 -12px;
    }
    .link-row:hover .link-arrow {
      transform: translate(3px, -3px);
      color: var(--text-main);
    }
    .link-row:last-child:hover .link-arrow {
      transform: translate(4px, 0px); 
    }

    .link-left  { display: flex; align-items: center; gap: 14px; }
    .link-index { font-size: 11px; font-family: var(--mono); color: #cccccc; width: 20px; }
    .link-name  { font-size: 13px; font-weight: 700; letter-spacing: 0.02em; }
    .link-handle{ font-size: 12px; color: var(--text-muted); font-family: var(--mono); }
    
    .link-arrow { 
      display: flex;
      align-items: center;
      justify-content: center;
      color: #cccccc; 
      transition: transform 0.3s, color 0.3s; 
    }

    #right {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%; /* Take up remaining space */
      min-height: 0; /* Crucial to let the canvas shrink so the ticker survives */
    }

    #particle-canvas { 
      display: block; 
      max-width: 100%; 
      max-height: 100%; /* Forces canvas to shrink if container is too short */
      object-fit: contain;
    }

    #ticker {
      height: 44px;
      border-top: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      background: var(--bg);
    }

    #ticker-track {
      display: flex;
      white-space: nowrap;
      animation: scroll 32s linear infinite;
    }

    .tick { 
      font-size: 12px; 
      font-family: var(--mono); 
      color: #000000; 
      font-weight: 800; 
      padding: 0 28px; 
      letter-spacing: 0.08em; 
      text-transform: uppercase;
    }
    .tick-dot { 
      font-size: 12px; 
      font-family: var(--mono); 
      color: #000000; 
      font-weight: 800;
      padding: 0 4px; 
    }

    @keyframes scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ── MOBILE OPTIMIZATION ── */
    @media (max-width: 700px) {
      #hero { 
        grid-template-columns: 1fr; 
        gap: 12px; 
        padding-bottom: 0px;
      }
      
      #body { 
        padding: 16px 16px 0;
        justify-content: space-evenly; 
      }
      
      #right { 
        order: -1; 
        margin-bottom: 0;
        height: 28vh; 
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #name {
        font-size: clamp(40px, 15vw, 64px); 
        margin-bottom: 12px;
        text-align: center;
      }

      .link-row {
        padding: 10px 0; 
      }
      
      #nav  { padding: 0 16px; }
    }
  </style>
</head>
<body>
<div id="page">

  <nav id="nav">

  </nav>

  <div id="body">
    <div id="hero">

      <div id="left">
        <h1 id="name">ajchapa</h1>

        <div id="links">
          <a class="link-row" href="https://www.instagram.com/aapplejuce/" target="_blank" rel="noopener">
            <div class="link-left">
              <span class="link-index">01</span>

                <div class="link-name">instagram</div>

              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="7" y1="17" x2="17" y2="7"></line>
                <polyline points="7 7 17 7 17 17"></polyline>
              </svg>
            </span>
          </a>

          <a class="link-row" href="https://www.linkedin.com/in/aj-chapagain/" target="_blank" rel="noopener">
            <div class="link-left">
              <span class="link-index">02</span>
              <div>
                <div class="link-name">linkedin</div>
                <div class="link-handle">/aj-chapagain</div>
              </div>
            </div>
            <span class="link-arrow">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="7" y1="17" x2="17" y2="7"></line>
                <polyline points="7 7 17 7 17 17"></polyline>
              </svg>
            </span>
          </a>

          <a class="link-row" href="https://steamcommunity.com/profiles/76561198343184351/" target="_blank" rel="noopener">
            <div class="link-left">
              <span class="link-index">03</span>
              <div>
                <div class="link-name">steam</div>
                <div class="link-handle">profile</div>
              </div>
            </div>
            <span class="link-arrow">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="7" y1="17" x2="17" y2="7"></line>
                <polyline points="7 7 17 7 17 17"></polyline>
              </svg>

          <a class="link-row" href="archive.html">
            <div class="link-left">
              <span class="link-index">04</span>
              <div>
                <div class="link-name">archive</div>

            </div>
            <span class="link-arrow">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>

            </span>

        </div>
      </div>

      <div id="right">
        <canvas id="particle-canvas"></canvas>

    </div>
  </div>

  <div id="ticker">
    <div id="ticker-track"></div>
  </div>

</div>

<script>
  /* ── CLOCK ── */
  function tick() {
    document.getElementById('nav-time').textContent =
      new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  }
  tick();
  setInterval(tick, 1000);

  /* ── TICKER: MARKET & COMMODITY DATA ── */
  const statuses = [
    { label: 'S&P 500',      value: () => '5,214.08 ▲' },
    { label: 'NVDA',         value: () => '$880.08 ▲' },
    { label: 'META',         value: () => '$510.92 ▲' },
    { label: 'AMZN',         value: () => '$185.14 ▲' },
    { label: 'MSFT',         value: () => '$425.22 ▼' },
    { label: 'WTI CRUDE',    value: () => '$82.14 ▲' },
    { label: '10-YR YIELD',  value: () => '4.32%' },
  ];
  
  function buildTicker() {
    const track = document.getElementById('ticker-track');
    let html = '';
    for (let pass = 0; pass < 2; pass++) {
      statuses.forEach(s => {
        html += `<span class="tick">${s.label} — ${s.value()}</span><span class="tick-dot">+</span>`;
      });
    }
    track.innerHTML = html;
  }
  buildTicker();

  /* ── PROCEDURAL PARTICLE ENGINE ── */
  (function () {
    const canvas = document.getElementById('particle-canvas');
    const ctx    = canvas.getContext('2d');

    // A slight 1.15x scale, not massive
    const W = 460; 
    const H = 575; 
    canvas.width  = W;
    canvas.height = H;

    const SPACING       = 6;   
    const RADIUS        = 1.3;  
    const BEAT_INTERVAL = 1.2;  

    let particles = [];
    let time      = 0;
    let lastTs    = null;

    const heartCX = W / 2 - 29; 
    const heartCY = H / 2 + 12;

    function createProceduralHuman() {
      const off  = document.createElement('canvas');
      off.width  = W;
      off.height = H;
      const octx = off.getContext('2d');

      octx.fillStyle = '#000000'; 

      // Scale the procedural path drawing up slightly
      octx.translate(W / 2, H / 2);
      octx.scale(1.15, 1.15);
      octx.translate(-W / 2, -H / 2);

      octx.beginPath();
      octx.arc(W / 2, H / 2 - 100, 35, 0, Math.PI * 2);
      octx.fill();

      octx.beginPath();
      octx.moveTo(W / 2 - 15, H / 2 - 65);
      octx.quadraticCurveTo(W / 2 - 110, H / 2 - 10, W / 2 - 140, H / 2 + 180); 
      octx.lineTo(W / 2 + 140, H / 2 + 180); 
      octx.quadraticCurveTo(W / 2 + 110, H / 2 - 10, W / 2 + 15, H / 2 - 65); 
      octx.fill();

      return off;
    }

    function initParticles() {
      const offCanvas = createProceduralHuman();
      const octx = offCanvas.getContext('2d');
      const { data } = octx.getImageData(0, 0, W, H);

      particles = [];
      
      for (let y = 0; y < H; y += SPACING) {
        for (let x = 0; x < W; x += SPACING) {
          const i = (y * W + x) * 4;
          const alpha = data[i + 3];
          
          if (alpha > 128) { 
            
            const dx = x - heartCX;
            const dy = y - heartCY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            const isHeart = dist < 25;

            particles.push({
              ox: x, 
              oy: y,
              x: x,  
              y: y,
              isHeart: isHeart,
              distToHeart: dist,
              phaseX: Math.random() * Math.PI * 2,
              phaseY: Math.random() * Math.PI * 2,
              driftSpeed: 0.5 + Math.random() * 0.5,
            });
          }
        }
      }
    }

    function getHeartbeat(t) {
      const p = t % BEAT_INTERVAL;
      if (p < 0.12) return Math.sin((p / 0.12) * Math.PI);
      if (p > 0.22 && p < 0.34) return Math.sin(((p - 0.22) / 0.12) * Math.PI) * 0.5;
      return 0;
    }

    function animate(ts) {
      requestAnimationFrame(animate);
      if (!lastTs) lastTs = ts || 0;
      const dt = Math.min(((ts || 0) - lastTs) / 1000, 0.05);
      lastTs = ts || 0;
      time += dt;

      ctx.clearRect(0, 0, W, H);
      if (!particles.length) return;

      const beat = getHeartbeat(time);

      // Body Particles
      ctx.beginPath();
      ctx.fillStyle = `rgba(15, 15, 15, 0.8)`; 

      particles.forEach(p => {
        if (p.isHeart) return; 

        const driftX = Math.sin(time * p.driftSpeed + p.phaseX) * 1.7;
        const driftY = Math.cos(time * p.driftSpeed + p.phaseY) * 1.7;

        let pushX = 0, pushY = 0;
        if (beat > 0) {
          const force = Math.max(0, 1 - (p.distToHeart / 175)); 
          const dx = p.ox - heartCX;
          const dy = p.oy - heartCY;
          const pushAmount = beat * force * 4.0;
          pushX = (dx / p.distToHeart) * pushAmount;
          pushY = (dy / p.distToHeart) * pushAmount;
        }

        p.x = p.ox + driftX + pushX;
        p.y = p.oy + driftY + pushY;

        ctx.moveTo(p.x + RADIUS, p.y);
        ctx.arc(p.x, p.y, RADIUS, 0, Math.PI * 2);
      });
      ctx.fill();

      // Heart Particles
      ctx.beginPath();
      const heartOpacity = 0.6 + (beat * 0.4); 
      ctx.fillStyle = `rgba(210, 10, 10, ${heartOpacity})`;

      particles.forEach(p => {
        if (!p.isHeart) return;

        const dx = p.ox - heartCX;
        const dy = p.oy - heartCY;
        const expand = beat * 4.6; 
        
        p.x = p.ox + (dx / p.distToHeart) * expand;
        p.y = p.oy + (dy / p.distToHeart) * expand;

        const currentRadius = RADIUS + (beat * 0.9); 
        ctx.moveTo(p.x + currentRadius, p.y);
        ctx.arc(p.x, p.y, currentRadius, 0, Math.PI * 2);
      });
      ctx.fill();
    }

    initParticles();
    requestAnimationFrame(animate);

  })();
</script>
</body>
