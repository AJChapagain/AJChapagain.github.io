<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJChapa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #020308;
      font-family: 'DM Mono', monospace;
      color: #e8eaf0;
      cursor: crosshair;
      overflow: hidden;
    }
    #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; transition: opacity 1s ease-in-out; }
    .nebula {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse 60% 40% at 25% 70%, rgba(15,25,60,0.12) 0%, transparent 65%),
                  radial-gradient(ellipse 50% 50% at 80% 30%, rgba(10,15,45,0.15) 0%, transparent 65%),
                  radial-gradient(ellipse 40% 40% at 50% 50%, rgba(20,25,40,0.08) 0%, transparent 70%);
      animation: pulseNebula 20s infinite alternate ease-in-out;
      transition: opacity 1s ease-in-out;
    }
    .fade-out { opacity: 0 !important; pointer-events: none !important; }
    @keyframes pulseNebula { 0%{opacity:0.8;transform:scale(1)} 100%{opacity:1;transform:scale(1.05)} }

    .uu-badge {
      position: fixed; top: 1.5rem; right: 2rem; z-index: 20; opacity: 0;
      animation: fadeDown 1.4s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
      text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
      transition: opacity 1s ease-in-out;
    }
    .uu-badge svg { width: 26px; height: 26px; filter: drop-shadow(0 0 5px rgba(190,20,20,0.35)); transition: filter 0.3s; }
    .uu-badge:hover svg { filter: drop-shadow(0 0 11px rgba(220,40,40,0.7)); }
    .uu-text { font-size: 0.37rem; letter-spacing: 0.26em; text-transform: uppercase; color: #321010; transition: color 0.3s; }
    .uu-badge:hover .uu-text { color: #7a2828; }

    .life-badge {
      position: fixed; top: 1.5rem; left: 2rem; z-index: 20; opacity: 0;
      animation: fadeDown 1.4s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
      text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: transparent; border: 1px solid rgba(74,127,193,0.3); padding: 0.5rem 1rem;
      color: #eef0f8; font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s ease, opacity 1s ease-in-out;
    }
    .life-badge:hover { background: rgba(74,127,193,0.1); border-color: rgba(74,127,193,0.8); box-shadow: 0 0 15px rgba(74,127,193,0.2); }

    .top-header {
      position: fixed; top: 3rem; left: 50%; transform: translateX(-50%); z-index: 10;
      display: flex; flex-direction: column; align-items: center; pointer-events: none;
      transition: opacity 1s ease-in-out;
    }
    .top-header > * { pointer-events: auto; }
    .name {
      font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(1.5rem, 4vw, 2.5rem);
      letter-spacing: 0.24em; text-transform: uppercase; color: #eef0f8; text-align: center;
      opacity: 0; animation: fadeDown 1.4s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
      text-shadow: 0 0 30px rgba(180,200,255,0.2); white-space: nowrap;
    }
    .name::after { content:''; display:block; width:60%; height:1px; background:linear-gradient(90deg,transparent,rgba(74,127,193,0.38),transparent); margin:0.4rem auto 0; }

    .bottom-nav {
      position: fixed; bottom: 3.5rem; left: 0; width: 100%; z-index: 10;
      display: flex; align-items: center; justify-content: center; gap: 0 2rem;
      opacity: 0; animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
      transition: opacity 1s ease-in-out;
    }
    .link-item {
      display: flex; align-items: center; gap: 0.36rem; text-decoration: none; color: #5a6285;
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; transition: color 0.3s; position: relative; white-space: nowrap;
    }
    .link-item:hover { color: #aeb6d4; }
    .link-item svg { width: 12px; height: 12px; flex-shrink: 0; opacity: 0.45; transition: opacity 0.3s; }
    .link-item:hover svg { opacity: 0.9; }
    .link-item::after { content:''; position:absolute; bottom:-4px; left:0; width:0; height:1px; background:rgba(74,127,193,0.5); transition:width 0.3s; }
    .link-item:hover::after { width: 100%; }
    .link-divider { width: 1px; height: 10px; background: #161a2b; flex-shrink: 0; }

    /* ══ LIFE DIMENSION ══ */
    #life-dimension {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 30;
      opacity: 0; pointer-events: none; transition: opacity 1.5s ease-in-out;
      background: #020308; overflow: hidden;
    }
    #life-dimension.active { opacity: 1; pointer-events: auto; }

    .way-back-btn {
      position: fixed; top: 1.5rem; left: 2rem; z-index: 50;
      background: transparent; border: 1px solid rgba(180,200,255,0.25); padding: 0.5rem 1rem;
      color: rgba(238,240,248,0.5); font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s ease;
    }
    .way-back-btn:hover { background: rgba(180,200,255,0.07); border-color: rgba(180,200,255,0.6); color: #eef0f8; }

    #sim-grid {
      position: absolute; top: 3.5rem; left: 0; right: 0; bottom: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 1px;
      background: rgba(255,255,255,0.025);
    }
    .sim-cell {
      position: relative; overflow: hidden; background: #020308; cursor: pointer;
    }
    .sim-cell:last-child { grid-column: span 2; }
    .sim-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
    .sim-label {
      position: absolute; bottom: 0.8rem; left: 1rem;
      font-size: 0.5rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(255,255,255,0.2); pointer-events: none; transition: color 0.3s;
    }
    .sim-cell:hover .sim-label { color: rgba(255,255,255,0.5); }
    .sim-cell::after {
      content: ''; position: absolute; inset: 0; border: 1px solid rgba(255,255,255,0);
      transition: border-color 0.3s; pointer-events: none;
    }
    .sim-cell:hover::after { border-color: rgba(255,255,255,0.06); }

    /* Expanded overlay */
    #sim-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 60;
      background: #020308; opacity: 0; pointer-events: none; transition: opacity 0.6s ease;
    }
    #sim-overlay.open { opacity: 1; pointer-events: auto; }
    #sim-overlay-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #overlay-ui {
      position: absolute; top: 1.4rem; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between; padding: 0 2rem;
    }
    #sim-overlay-label {
      font-size: 0.55rem; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(255,255,255,0.25);
    }
    #sim-overlay-close {
      background: none; border: none; color: rgba(255,255,255,0.2);
      font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.15em;
      cursor: pointer; text-transform: uppercase; transition: color 0.2s;
    }
    #sim-overlay-close:hover { color: rgba(255,255,255,0.65); }

    @media (max-width: 700px) {
      #sim-grid { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(4, 1fr); }
      .sim-cell:last-child { grid-column: span 2; }
    }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-15px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(15px)}  to{opacity:1;transform:translateY(0)} }
  </style>
</head>

<script>
// ═══════════════════════════════════════════════════════
// UTILITY
// ═══════════════════════════════════════════════════════
function rand(a,b){return a+Math.random()*(b-a);}

// ═══════════════════════════════════════════════════════
// VOID PAGE — COMPLETELY ORIGINAL
// ═══════════════════════════════════════════════════════
const vCanvas=document.getElementById('starfield');
const vCtx=vCanvas.getContext('2d');
let vW,vH,stars=[],shootingStars=[],starDust=[];
const BH={rx:0.5,ry:0.5}; let bhX,bhY; const BH_RADIUS=24;
let isWarping=false;
function vResize(){vW=vCanvas.width=window.innerWidth;vH=vCanvas.height=window.innerHeight;bhX=vW*BH.rx;bhY=vH*BH.ry;}
const STELLAR_COLORS=[{h:220,s:80,l:85},{h:200,s:40,l:95},{h:60,s:20,l:95},{h:35,s:70,l:80},{h:15,s:80,l:75}];
function spawnStarAtEdge(){const e=Math.floor(rand(0,4));let x,y;if(e===0){x=rand(0,vW);y=-20;}else if(e===1){x=vW+20;y=rand(0,vH);}else if(e===2){x=rand(0,vW);y=vH+20;}else{x=-20;y=rand(0,vH);}const c=STELLAR_COLORS[Math.floor(Math.random()*STELLAR_COLORS.length)];const ib=Math.random()>0.85;return{x,y,vx:0,vy:0,r:ib?rand(0.8,1.4):rand(0.3,0.7),baseOpacity:ib?rand(0.5,0.9):rand(0.1,0.4),twinkleSpeed:rand(0.002,0.01),twinkleOffset:rand(0,Math.PI*2),h:c.h,s:c.s,l:c.l,trail:[],isBright:ib};}
function initStars(){stars=[];shootingStars=[];starDust=[];for(let i=0;i<450;i++){const s=spawnStarAtEdge();s.x=rand(0,vW);s.y=rand(0,vH);stars.push(s);}}
function drawVoidStar(s,a){vCtx.beginPath();vCtx.arc(s.x,s.y,s.r,0,Math.PI*2);vCtx.fillStyle=`hsla(${s.h},${s.s}%,${s.l}%,${a})`;vCtx.fill();if(s.isBright&&a>0.4){const g=vCtx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4);g.addColorStop(0,`hsla(${s.h},${s.s}%,${s.l}%,${a*0.4})`);g.addColorStop(1,`hsla(${s.h},${s.s}%,${s.l}%,0)`);vCtx.beginPath();vCtx.arc(s.x,s.y,s.r*4,0,Math.PI*2);vCtx.fillStyle=g;vCtx.fill();}}
function drawTrail(s){if(s.trail.length<2)return;vCtx.save();for(let i=1;i<s.trail.length;i++){const a=(i/s.trail.length)*0.3;vCtx.beginPath();vCtx.moveTo(s.trail[i-1].x,s.trail[i-1].y);vCtx.lineTo(s.trail[i].x,s.trail[i].y);vCtx.strokeStyle=`hsla(${s.h},${s.s}%,${s.l}%,${a})`;vCtx.lineWidth=s.r*0.5;vCtx.lineCap='round';vCtx.stroke();}vCtx.restore();}
function drawBlackHole(){const l=vCtx.createRadialGradient(bhX,bhY,BH_RADIUS,bhX,bhY,BH_RADIUS*7);l.addColorStop(0,'rgba(0,0,0,0.95)');l.addColorStop(0.3,'rgba(3,5,12,0.4)');l.addColorStop(1,'rgba(0,0,0,0)');vCtx.beginPath();vCtx.arc(bhX,bhY,BH_RADIUS*7,0,Math.PI*2);vCtx.fillStyle=l;vCtx.fill();vCtx.beginPath();vCtx.arc(bhX,bhY,BH_RADIUS,0,Math.PI*2);vCtx.fillStyle='#000';vCtx.fill();const pr=vCtx.createLinearGradient(bhX-BH_RADIUS,bhY-BH_RADIUS,bhX+BH_RADIUS,bhY+BH_RADIUS);pr.addColorStop(0,'rgba(255,230,200,0.6)');pr.addColorStop(0.5,'rgba(200,150,100,0.15)');pr.addColorStop(1,'rgba(255,230,200,0.05)');vCtx.beginPath();vCtx.arc(bhX,bhY,BH_RADIUS+0.5,0,Math.PI*2);vCtx.strokeStyle=pr;vCtx.lineWidth=1.2;vCtx.stroke();}
const MT=[{h:15,s:90,l:70,w:[1.2,2.0],len:[100,220]},{h:195,s:80,l:85,w:[1.0,1.8],len:[120,250]},{h:210,s:20,l:95,w:[0.8,1.5],len:[80,150]}];
function createShootingStar(){const t=MT[Math.floor(Math.random()*MT.length)];const ss=Math.floor(rand(0,4));let sx,sy,tx,ty;if(ss===0){sx=rand(0,vW);sy=-20;tx=rand(0,vW);ty=vH+20;}else if(ss===1){sx=vW+20;sy=rand(0,vH);tx=-20;ty=rand(0,vH);}else if(ss===2){sx=rand(0,vW);sy=vH+20;tx=rand(0,vW);ty=-20;}else{sx=-20;sy=rand(0,vH);tx=vW+20;ty=rand(0,vH);}const ang=Math.atan2(ty-sy,tx-sx);const spd=rand(28,50);return{x:sx,y:sy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,len:rand(t.len[0],t.len[1]),alpha:1.0,fade:rand(0.015,0.03),width:rand(t.w[0],t.w[1]),h:t.h,s:t.s,l:t.l};}
let vFrame=0,nextShoot=rand(20,80),voidRAF;

class SimMathematics {
  constructor(){this.t=0;this.zoom=0.0032;this.panX=-0.7;this.panY=0.0;this.MAXITER=60;}
  init(canvas){this.c=canvas;this.x=canvas.getContext('2d');this.W=canvas.width;this.H=canvas.height;}
  draw(){
    this.t++;
    const W=this.W,H=this.H,ctx=this.x;
    const z=this.zoom*(1+0.04*Math.sin(this.t*0.007));
    const id=ctx.createImageData(W,H);const d=id.data;
    for(let px=0;px<W;px+=2){for(let py=0;py<H;py+=2){
      const x0=(px-W/2)*z+this.panX,y0=(py-H/2)*z+this.panY;
      let rx=0,ry=0,iter=0;
      while(rx*rx+ry*ry<=4&&iter<this.MAXITER){const xn=rx*rx-ry*ry+x0;ry=2*rx*ry+y0;rx=xn;iter++;}
      let r=0,g=0,b=0;
      if(iter<this.MAXITER){
        const smooth=iter+1-Math.log2(Math.log2(rx*rx+ry*ry+0.001));
        const n=smooth/this.MAXITER;
        const h=(n*400+this.t*0.4)%360;
        const bright=Math.pow(n,0.5);
        r=Math.floor(bright*80*(0.5+0.5*Math.sin(h*Math.PI/180)));
        g=Math.floor(bright*140*(0.5+0.5*Math.sin((h+100)*Math.PI/180)));
        b=Math.floor(bright*255*(0.5+0.5*Math.sin((h+230)*Math.PI/180)));
      }
      for(let ox=0;ox<2&&px+ox<W;ox++)for(let oy=0;oy<2&&py+oy<H;oy++){const idx=((py+oy)*W+(px+ox))*4;d[idx]=r;d[idx+1]=g;d[idx+2]=b;d[idx+3]=255;}
    }}
    ctx.putImageData(id,0,0);
    // Rotating polygons overlay
    const cx=W/2,cy=H/2;
    for(let k=3;k<=8;k++){
      ctx.beginPath();
      for(let i=0;i<=k;i++){const a=(i/k)*Math.PI*2+this.t*0.003*(k%2===0?1:-1);const rr=Math.min(W,H)*0.055*k;ctx.lineTo(cx+rr*Math.cos(a),cy+rr*Math.sin(a));}
      ctx.closePath();ctx.strokeStyle=`hsla(${k*45+this.t*0.5},70%,70%,0.06)`;ctx.lineWidth=0.5;ctx.stroke();
    }
    // Slowly spiral into interesting region
    this.zoom*=0.9998;this.panX+=0.000008*Math.sin(this.t*0.0015);this.panY+=0.000005*Math.cos(this.t*0.002);
    if(this.zoom<0.000005){this.zoom=0.0032;this.panX=-0.5+rand(-0.4,0.4);this.panY=rand(-0.25,0.25);}
  }
}

class SimBiology {
  constructor(){this.t=0;this.pulses=[];}
  init(canvas){
    this.c=canvas;this.x=canvas.getContext('2d');this.W=canvas.width;this.H=canvas.height;
    this.neurons=Array.from({length:30},()=>({x:rand(this.W*0.05,this.W*0.95),y:rand(this.H*0.05,this.H*0.95),vx:rand(-0.2,0.2),vy:rand(-0.2,0.2),r:rand(2,5),pt:rand(0,Math.PI*2)}));
  }
  drawHelix(ctx,cx,t,W,H,c1,c2){
    const stride=16,amp=Math.min(W,H)*0.08;
    ctx.save();

    ctx.beginPath();

    ctx.strokeStyle=ga;ctx.lineWidth=1.5;ctx.stroke();
    // strand B
    ctx.beginPath();
    for(let y=0;y<=H;y+=3){const ph=(y/stride)*Math.PI*2+t*0.035+Math.PI;const x=cx+Math.sin(ph)*amp;y===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    const gb=ctx.createLinearGradient(0,0,0,H);gb.addColorStop(0,c2+'0)');gb.addColorStop(0.2,c2+'0.8)');gb.addColorStop(0.8,c2+'0.8)');gb.addColorStop(1,c2+'0)');
    ctx.strokeStyle=gb;ctx.lineWidth=1.5;ctx.stroke();
    // rungs
    for(let y=stride*0.5;y<H;y+=stride){
      const ph=(y/stride)*Math.PI*2+t*0.035;
      const x1=cx+Math.sin(ph)*amp,x2=cx+Math.sin(ph+Math.PI)*amp;
      const depth=Math.sin(ph)*0.5+0.5;
      ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);
      ctx.strokeStyle=`rgba(200,255,210,${0.08+0.22*depth})`;ctx.lineWidth=1;ctx.stroke();
      ctx.beginPath();ctx.arc(x1,y,2,0,Math.PI*2);ctx.fillStyle=c1+(0.5+0.4*depth)+')';ctx.fill();
      ctx.beginPath();ctx.arc(x2,y,2,0,Math.PI*2);ctx.fillStyle=c2+(0.5+0.4*depth)+')';ctx.fill();
    }
    ctx.restore();
  }
  draw(){
    this.t++;const ctx=this.x;const W=this.W,H=this.H;
    ctx.fillStyle='rgba(2,3,8,0.3)';ctx.fillRect(0,0,W,H);
    this.drawHelix(ctx,W*0.28,this.t,W,H,'rgba(60,220,140,','rgba(120,60,200,');
    this.drawHelix(ctx,W*0.72,this.t+60,W,H,'rgba(60,160,255,','rgba(255,100,160,');
    // Synapse pulses
    if(this.t%35===0){const a=this.neurons[Math.floor(rand(0,this.neurons.length))],b=this.neurons[Math.floor(rand(0,this.neurons.length))];this.pulses.push({x:a.x,y:a.y,tx:b.x,ty:b.y,t:0,s:rand(0.018,0.045)});}
    this.pulses=this.pulses.filter(p=>p.t<=1);
    for(const p of this.pulses){const px=p.x+(p.tx-p.x)*p.t,py=p.y+(p.ty-p.y)*p.t;const g=ctx.createRadialGradient(px,py,0,px,py,7);g.addColorStop(0,'rgba(100,255,180,0.9)');g.addColorStop(1,'rgba(100,255,180,0)');ctx.beginPath();ctx.arc(px,py,7,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();p.t+=p.s;}
    for(const n of this.neurons){n.x+=n.vx;n.y+=n.vy;if(n.x<W*0.05||n.x>W*0.95)n.vx*=-1;if(n.y<H*0.05||n.y>H*0.95)n.vy*=-1;n.pt+=0.04;const a=0.2+0.2*Math.sin(n.pt);ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle=`rgba(80,220,140,${a})`;ctx.fill();}
  }
}

      let ne=null,nd=Infinity;
      for(const b of all){if(b.f===a.f)continue;const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy);if(d<nd){nd=d;ne=b;}}
      if(ne){const dx=ne.x-a.x,dy=ne.y-a.y,d=nd;if(d>28){a.vx+=(dx/d)*0.09;a.vy+=(dy/d)*0.09;}else{ne.hp-=0.009;if(ne.hp<=0)this.blasts.push({x:ne.x,y:ne.y,r:2,max:rand(12,32)});}}
      a.vx+=rand(-0.08,0.08);a.vy+=rand(-0.08,0.08);const spd=Math.sqrt(a.vx*a.vx+a.vy*a.vy);if(spd>2){a.vx=(a.vx/spd)*2;a.vy=(a.vy/spd)*2;}
      a.x+=a.vx;a.y+=a.vy;if(a.x<0)a.x=W;if(a.x>W)a.x=0;if(a.y<0)a.y=H;if(a.y>H)a.y=0;
      ctx.beginPath();ctx.arc(a.x,a.y,2.5,0,Math.PI*2);ctx.fillStyle=`rgba(${a.f.col},${0.4+a.hp*0.5})`;ctx.fill();
    }
    for(const f of this.factions){const alive=f.agents.filter(a=>a.hp>0).length;if(alive<6)for(let i=0;i<18;i++)f.agents.push({x:rand(0,W),y:rand(0,H),vx:rand(-1,1),vy:rand(-1,1),hp:1,f});}
    // Strategy lines
    for(let i=0;i<4;i++){const f=this.factions[i%2];const av=f.agents.filter(a=>a.hp>0);if(av.length<2)continue;const s=av[Math.floor(rand(0,av.length))],e=av[Math.floor(rand(0,av.length))];ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(e.x,e.y);ctx.strokeStyle=`rgba(${f.col},0.035)`;ctx.lineWidth=0.5;ctx.stroke();}
  }
}

class SimLove {
  init(canvas){
    this.c=canvas;this.x=canvas.getContext('2d');this.W=canvas.width;this.H=canvas.height;this.t=0;
    const cx=this.W/2,cy=this.H/2;
    this.bodies=[
      {x:cx-this.W*0.16,y:cy,vx:0,vy:-0.5,mass:7,hue:340,trail:[],moons:[]},
      {x:cx+this.W*0.16,y:cy,vx:0,vy:0.5, mass:7,hue:200,trail:[],moons:[]}
    ];
    for(const b of this.bodies)for(let i=0;i<6;i++){const ang=rand(0,Math.PI*2),r=rand(22,52);b.moons.push({a:ang,r,spd:rand(0.025,0.055)*(Math.random()>0.5?1:-1),sz:rand(1.5,3)});}
    this.resonance=Array.from({length:70},()=>({x:rand(0,this.W),y:rand(0,this.H),vx:rand(-0.35,0.35),vy:rand(-0.35,0.35),hue:rand(320,380),alpha:rand(0.1,0.5)}));
  }
  draw(){
    this.t++;const ctx=this.x;const W=this.W,H=this.H;
    ctx.fillStyle='rgba(2,3,8,0.22)';ctx.fillRect(0,0,W,H);
    const [A,B]=this.bodies;
    const dx=B.x-A.x,dy=B.y-A.y,dist=Math.sqrt(dx*dx+dy*dy);
    const gf=0.9/(dist+1);
    A.vx+=(dx/dist)*gf;A.vy+=(dy/dist)*gf;B.vx-=(dx/dist)*gf;B.vy-=(dy/dist)*gf;
    for(const b of this.bodies){const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);if(spd>1.6){b.vx=(b.vx/spd)*1.6;b.vy=(b.vy/spd)*1.6;}b.x+=b.vx;b.y+=b.vy;b.x=Math.max(55,Math.min(W-55,b.x));b.y=Math.max(55,Math.min(H-55,b.y));b.trail.push({x:b.x,y:b.y});if(b.trail.length>90)b.trail.shift();}
    // Trails
    for(const b of this.bodies){if(b.trail.length<2)continue;ctx.beginPath();for(let i=0;i<b.trail.length;i++){i===0?ctx.moveTo(b.trail[i].x,b.trail[i].y):ctx.lineTo(b.trail[i].x,b.trail[i].y);}ctx.strokeStyle=`hsla(${b.hue},75%,65%,0.12)`;ctx.lineWidth=1.5;ctx.stroke();}
    // Love thread
    const mx=(A.x+B.x)/2,my=(A.y+B.y)/2;
    const th=ctx.createLinearGradient(A.x,A.y,B.x,B.y);
    th.addColorStop(0,`hsla(${A.hue},80%,70%,0.4)`);th.addColorStop(0.5,'rgba(255,230,240,0.55)');th.addColorStop(1,`hsla(${B.hue},80%,70%,0.4)`);
    ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.quadraticCurveTo(mx,my-dist*0.15,B.x,B.y);ctx.strokeStyle=th;ctx.lineWidth=1;ctx.stroke();
    // Resonance ring when close
    if(dist<120){const ra=(1-dist/120)*0.45;ctx.beginPath();ctx.arc(mx,my,dist*0.5,0,Math.PI*2);ctx.strokeStyle=`rgba(255,200,220,${ra})`;ctx.lineWidth=1;ctx.stroke();}
    // Resonance particles drawn to midpoint
    for(const p of this.resonance){const pmx=mx-p.x,pmy=my-p.y,pd=Math.sqrt(pmx*pmx+pmy*pmy);p.vx+=(pmx/pd)*0.018;p.vy+=(pmy/pd)*0.018;const s2=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(s2>0.7){p.vx=(p.vx/s2)*0.7;p.vy=(p.vy/s2)*0.7;}p.x+=p.vx;p.y+=p.vy;ctx.beginPath();ctx.arc(p.x,p.y,1.2,0,Math.PI*2);ctx.fillStyle=`hsla(${p.hue},80%,75%,${p.alpha*0.45})`;ctx.fill();}
    // Moons
    for(const b of this.bodies){for(const m of b.moons){m.a+=m.spd;const mx2=b.x+Math.cos(m.a)*m.r,my2=b.y+Math.sin(m.a)*m.r;ctx.beginPath();ctx.arc(mx2,my2,m.sz,0,Math.PI*2);ctx.fillStyle=`hsla(${b.hue},60%,75%,0.7)`;ctx.fill();}}
    // Bodies
    for(const b of this.bodies){const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.mass*4.5);g.addColorStop(0,`hsla(${b.hue},90%,92%,1)`);g.addColorStop(0.4,`hsla(${b.hue},80%,65%,0.8)`);g.addColorStop(1,`hsla(${b.hue},70%,50%,0)`);ctx.beginPath();ctx.arc(b.x,b.y,b.mass*4,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
  }
}

// ═══════════════════════════════════════════════════════
// SIMULATION MANAGER
// ═══════════════════════════════════════════════════════
const SIM_MAP={mathematics:SimMathematics,biology:SimBiology,energy:SimEnergy,humans:SimHumans,markets:SimMarkets,war:SimWar,love:SimLove};
const LABELS={mathematics:'Mathematics',biology:'Biology',energy:'Energy',humans:'Humans',markets:'Markets',war:'War',love:'Love'};
const activeSims={},simRAFs={};

function startSim(key,canvas){
  if(activeSims[key])stopSim(key);
  canvas.width=canvas.offsetWidth||canvas.parentElement.offsetWidth||200;
  canvas.height=canvas.offsetHeight||canvas.parentElement.offsetHeight||150;
  if(canvas.width<2||canvas.height<2)return;
  const sim=new SIM_MAP[key]();sim.init(canvas);activeSims[key]=sim;
  function tick(){sim.draw();simRAFs[key]=requestAnimationFrame(tick);}
  tick();
}
function stopSim(key){cancelAnimationFrame(simRAFs[key]);delete activeSims[key];delete simRAFs[key];}
function stopAllSims(){for(const k of Object.keys(activeSims))stopSim(k);}

// Overlay
const overlay=document.getElementById('sim-overlay');
const oc=document.getElementById('sim-overlay-canvas');
const olabel=document.getElementById('sim-overlay-label');

document.querySelectorAll('.sim-cell').forEach(cell=>{
  cell.addEventListener('click',()=>{
    const key=cell.dataset.sim;
    olabel.textContent=LABELS[key];
    oc.width=window.innerWidth;oc.height=window.innerHeight;
    overlay.classList.add('open');
    stopSim('__ov__');
    const sim=new SIM_MAP[key]();sim.init(oc);activeSims['__ov__']=sim;
    function tick(){sim.draw();simRAFs['__ov__']=requestAnimationFrame(tick);}
    tick();
  });
});
document.getElementById('sim-overlay-close').addEventListener('click',()=>{overlay.classList.remove('open');stopSim('__ov__');});

function startAllGridSims(){
  document.querySelectorAll('.sim-cell').forEach(cell=>{
    const key=cell.dataset.sim;const canvas=cell.querySelector('.sim-canvas');
    setTimeout(()=>startSim(key,canvas),80);
  });
}

// ═══════════════════════════════════════════════════════
// PAGE TRANSITIONS
// ═══════════════════════════════════════════════════════
const UI=['starfield','void-nebula','void-uu','void-header','void-nav','btn-life'];
const LD=document.getElementById('life-dimension');

document.getElementById('btn-life').addEventListener('click',()=>{
  isWarping=true;
  setTimeout(()=>{UI.forEach(id=>document.getElementById(id).classList.add('fade-out'));LD.classList.add('active');startAllGridSims();},1200);
});
document.getElementById('btn-return').addEventListener('click',()=>{
  stopSim('__ov__');overlay.classList.remove('open');LD.classList.remove('active');
  setTimeout(()=>{stopAllSims();isWarping=false;initStars();UI.forEach(id=>document.getElementById(id).classList.remove('fade-out'));},1000);
});
window.addEventListener('resize',()=>{
  vResize();
  if(LD.classList.contains('active')){
    document.querySelectorAll('.sim-cell').forEach(cell=>{
      const key=cell.dataset.sim;const canvas=cell.querySelector('.sim-canvas');
      if(activeSims[key]){stopSim(key);setTimeout(()=>startSim(key,canvas),50);}
    });
  }
});

vResize();initStars();vLoop();
</script>
