<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJChapa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #020308;
      font-family: 'DM Mono', monospace;
      color: #e8eaf0;
      cursor: crosshair;
      overflow: hidden;
    }

    #starfield {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .nebula {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 25% 70%, rgba(15, 25, 60, 0.12) 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 80% 30%, rgba(10, 15, 45, 0.15) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(20, 25, 40, 0.08) 0%, transparent 70%);
      animation: pulseNebula 20s infinite alternate ease-in-out;
    }

    @keyframes pulseNebula {
      0% { opacity: 0.8; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.05); }
    }

    /* ── U OF UTAH — top right ── */
    .uu-badge {
      position: fixed;
      top: 1.5rem;
      right: 2rem;
      z-index: 20;
      opacity: 0;
      animation: fadeDown 1.4s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }
    .uu-badge svg {
      width: 26px; height: 26px;
      filter: drop-shadow(0 0 5px rgba(190,20,20,0.35));
      transition: filter 0.3s;
    }
    .uu-badge:hover svg { filter: drop-shadow(0 0 11px rgba(220,40,40,0.7)); }
    .uu-text {
      font-size: 0.37rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: #321010;
      transition: color 0.3s;
    }
    .uu-badge:hover .uu-text { color: #7a2828; }

    /* ── NAME — top center ── */
    .top-header {
      position: fixed;
      top: 3rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }
    .top-header > * { pointer-events: auto; }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #eef0f8;
      text-align: center;
      opacity: 0;
      animation: fadeDown 1.4s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
      text-shadow: 0 0 30px rgba(180,200,255,0.2);
      white-space: nowrap;
    }
    .name::after {
      content: '';
      display: block;
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(74,127,193,0.38), transparent);
      margin: 0.4rem auto 0;
    }

    /* ── LINKS — PERFECTLY CENTERED at bottom ── */
    .bottom-nav {
      position: fixed;
      bottom: 3.5rem;
      left: 0;
      width: 100%; /* Force full width for perfect flex centering */
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0 2rem;
      opacity: 0;
      animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
    }
    
    .link-item {
      display: flex;
      align-items: center;
      gap: 0.36rem;
      text-decoration: none;
      color: #5a6285;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: color 0.3s;
      position: relative;
      white-space: nowrap;
    }
    .link-item:hover { color: #aeb6d4; }
    .link-item svg { width: 12px; height: 12px; flex-shrink: 0; opacity: 0.45; transition: opacity 0.3s; }
    .link-item:hover svg { opacity: 0.9; }
    .link-item::after {
      content: ''; position: absolute; bottom: -4px; left: 0;
      width: 0; height: 1px;
      background: rgba(74,127,193,0.5); transition: width 0.3s;
    }
    .link-item:hover::after { width: 100%; }
    .link-divider { width: 1px; height: 10px; background: #161a2b; flex-shrink: 0; }

    @media (max-width:600px){
      .link-divider { display:none; }
      .bottom-nav { gap: 0 1rem; flex-wrap: wrap; row-gap: 0.8rem; bottom: 2rem; }
      .top-header { top: 2rem; }
      .uu-badge { top: 1rem; right: 1rem; }
    }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-15px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(15px)}  to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>

<script>
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [], shootingStars = [], starDust = [];

  const BH = { rx: 0.50, ry: 0.50 };
  let bhX, bhY;
  
  const BH_RADIUS = 24;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    bhX = W * BH.rx;
    bhY = H * BH.ry;
  }

  function rand(a, b) { return a + Math.random() * (b - a); }

  // ── REALISTIC STARS ──
  const STELLAR_COLORS = [
    {h: 220, s: 80, l: 85}, // Hot blue-white
    {h: 200, s: 40, l: 95}, // White
    {h: 60,  s: 20, l: 95}, // Yellow-white
    {h: 35,  s: 70, l: 80}, // Light Orange
    {h: 15,  s: 80, l: 75}  // Red Dwarf
  ];

  function spawnStarAtEdge() {
    const edge = Math.floor(rand(0,4));
    let x, y;
    if      (edge===0){x=rand(0,W);y=-20;}
    else if (edge===1){x=W+20;y=rand(0,H);}
    else if (edge===2){x=rand(0,W);y=H+20;}
    else              {x=-20;y=rand(0,H);}
    
    const colorType = STELLAR_COLORS[Math.floor(Math.random() * STELLAR_COLORS.length)];
    const isBright = Math.random() > 0.85;

    return {
      x, y,
      vx: 0, vy: 0, // Velocity is now entirely dictated by gravity
      r: isBright ? rand(0.8, 1.4) : rand(0.3, 0.7),
      baseOpacity: isBright ? rand(0.5, 0.9) : rand(0.1, 0.4),
      twinkleSpeed: rand(0.002, 0.01),
      twinkleOffset: rand(0, Math.PI*2),
      h: colorType.h, s: colorType.s, l: colorType.l,
      trail: [],
      isBright
    };
  }

  function initStars() {
    stars=[];
    for(let i=0;i<450;i++){const s=spawnStarAtEdge();s.x=rand(0,W);s.y=rand(0,H);stars.push(s);}
  }

  function drawStar(s, alpha) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${s.h}, ${s.s}%, ${s.l}%, ${alpha})`;
    ctx.fill();

    if (s.isBright && alpha > 0.4) {
      const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 4);
      g.addColorStop(0, `hsla(${s.h}, ${s.s}%, ${s.l}%, ${alpha * 0.4})`);
      g.addColorStop(1, `hsla(${s.h}, ${s.s}%, ${s.l}%, 0)`);
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r * 4, 0, Math.PI*2);
      ctx.fillStyle = g; ctx.fill();
    }
  }

  function drawTrail(s) {
    if(s.trail.length<2)return;
    ctx.save();
    for(let i=1;i<s.trail.length;i++){
      const a=(i/s.trail.length)*0.3;
      ctx.beginPath();ctx.moveTo(s.trail[i-1].x,s.trail[i-1].y);ctx.lineTo(s.trail[i].x,s.trail[i].y);
      ctx.strokeStyle=`hsla(${s.h}, ${s.s}%, ${s.l}%, ${a})`;
      ctx.lineWidth=s.r*0.5;ctx.lineCap='round';ctx.stroke();
    }
    ctx.restore();
  }

  // ── REALISTIC EVENT HORIZON ──
  function drawBlackHole() {
    const lens = ctx.createRadialGradient(bhX, bhY, BH_RADIUS, bhX, bhY, BH_RADIUS * 7);
    lens.addColorStop(0, 'rgba(0, 0, 0, 0.95)');
    lens.addColorStop(0.3, 'rgba(3, 5, 12, 0.4)');
    lens.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.beginPath(); ctx.arc(bhX, bhY, BH_RADIUS * 7, 0, Math.PI * 2);
    ctx.fillStyle = lens; ctx.fill();

    ctx.beginPath(); 
    ctx.arc(bhX, bhY, BH_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = '#000000'; 
    ctx.fill();

    const photonRing = ctx.createLinearGradient(bhX - BH_RADIUS, bhY - BH_RADIUS, bhX + BH_RADIUS, bhY + BH_RADIUS);
    photonRing.addColorStop(0, 'rgba(255, 230, 200, 0.6)');
    photonRing.addColorStop(0.5, 'rgba(200, 150, 100, 0.15)');
    photonRing.addColorStop(1, 'rgba(255, 230, 200, 0.05)');
    
    ctx.beginPath(); 
    ctx.arc(bhX, bhY, BH_RADIUS + 0.5, 0, Math.PI * 2);
    ctx.strokeStyle = photonRing; 
    ctx.lineWidth = 1.2; 
    ctx.stroke();
  }

  // ── MORE PROMINENT & COMPLEX SHOOTING STARS ──
  const METEOR_TYPES=[
    {h:15,  s:90, l:70, w:[1.2, 2.0], len:[100, 220]}, // Fiery Orange
    {h:195, s:80, l:85, w:[1.0, 1.8], len:[120, 250]}, // Icy Cyan/Blue
    {h:210, s:20, l:95, w:[0.8, 1.5], len:[80,  150]}  // Fast White
  ];

  function createShootingStar(){
    const t = METEOR_TYPES[Math.floor(Math.random()*METEOR_TYPES.length)];
    const startSide = Math.floor(rand(0,4));
    let sx, sy, tx, ty;
    
    if (startSide === 0) { sx = rand(0, W); sy = -20; tx = rand(0, W); ty = H + 20; } 
    else if (startSide === 1) { sx = W + 20; sy = rand(0, H); tx = -20; ty = rand(0, H); } 
    else if (startSide === 2) { sx = rand(0, W); sy = H + 20; tx = rand(0, W); ty = -20; } 
    else { sx = -20; sy = rand(0, H); tx = W + 20; ty = rand(0, H); } 

    // Add slight curve towards the black hole for realism
    const angle = Math.atan2(ty - sy, tx - sx);
    const speed = rand(28, 50); 
    
    return {
      x:sx, y:sy, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
      len:rand(t.len[0],t.len[1]), alpha: 1.0, fade:rand(0.015, 0.03), 
      width:rand(t.w[0],t.w[1]), h:t.h, s:t.s, l:t.l
    };
  }

  let frame=0, nextShoot=rand(20, 80); // Made them much more frequent

  function loop(){
    ctx.clearRect(0,0,W,H);
    frame++;

    drawBlackHole();

    // ── SHOOTING STARS & PARTICLE DUST LOOP ──
    if(frame>=nextShoot){
      shootingStars.push(createShootingStar());
      if(Math.random()<0.4) shootingStars.push(createShootingStar()); // High chance of double meteors
      nextShoot=frame+rand(30, 100); 
    }
    
    shootingStars=shootingStars.filter(s=>s.alpha>0);
    for(const s of shootingStars){
      ctx.save();
      const tailX = s.x - s.vx * (s.len/20);
      const tailY = s.y - s.vy * (s.len/20);
      
      const g = ctx.createLinearGradient(s.x, s.y, tailX, tailY);
      g.addColorStop(0, `hsla(0, 0%, 100%, ${s.alpha})`); // Bright white-hot head
      g.addColorStop(0.1, `hsla(${s.h}, ${s.s}%, ${s.l}%, ${s.alpha * 0.9})`); 
      g.addColorStop(1, `hsla(${s.h}, ${s.s}%, ${s.l}%, 0)`); 
      
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(tailX, tailY);
      ctx.strokeStyle = g;
      ctx.lineWidth = s.width;
      ctx.lineCap = 'round';
      ctx.stroke();

      // Emit glowing dust particles
      if (Math.random() > 0.3) {
        starDust.push({
          x: s.x, y: s.y,
          vx: s.vx * 0.05 + rand(-1, 1),
          vy: s.vy * 0.05 + rand(-1, 1),
          alpha: s.alpha * 0.8,
          decay: rand(0.02, 0.06),
          size: rand(0.5, 2),
          h: s.h, s: s.s, l: s.l
        });
      }
      
      ctx.restore();
      
      // Meteors slightly curve toward the black hole
      const dx = bhX - s.x, dy = bhY - s.y, dist = Math.sqrt(dx*dx+dy*dy);
      s.vx += (dx/dist) * 0.5;
      s.vy += (dy/dist) * 0.5;

      s.x += s.vx; s.y += s.vy; s.alpha -= s.fade;
    }

    // Render Dust Particles
    starDust = starDust.filter(p => p.alpha > 0);
    for (const p of starDust) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${p.h}, ${p.s}%, ${p.l}%, ${p.alpha})`;
      ctx.fill();
      p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
    }

    // ── GLOBAL GRAVITY FOR ALL STARS ──
    for(let i=stars.length-1;i>=0;i--){
      const s=stars[i];
      const dx=bhX-s.x, dy=bhY-s.y, dist=Math.sqrt(dx*dx+dy*dy);
      
      if(dist < BH_RADIUS){stars[i]=spawnStarAtEdge();continue;}
      
      // GLOBAL PULL: Everything moves toward the center, accelerating as it gets closer
      const globalPull = 0.001 + (150 / (dist + 50)) * 0.015; 
      s.vx += (dx/dist) * globalPull; 
      s.vy += (dy/dist) * globalPull;
      
      const spd = Math.sqrt(s.vx*s.vx+s.vy*s.vy);
      
      // Dynamic max speed based on distance to black hole
      const maxSpeed = 0.2 + (800 / (dist + 10)) * 2;
      if(spd > maxSpeed){s.vx=(s.vx/spd)*maxSpeed; s.vy=(s.vy/spd)*maxSpeed;}
      
      if(dist < 300){
        s.trail.push({x:s.x,y:s.y});
        if(s.trail.length > 20) s.trail.shift();
      } else { 
        if (s.trail.length > 0) s.trail.shift(); 
      }

      const twinkle = Math.sin(frame*s.twinkleSpeed + s.twinkleOffset);
      let alpha = Math.max(0.01, (s.baseOpacity + twinkle * s.baseOpacity * 0.4));

      s.x += s.vx; s.y += s.vy;
      
      drawTrail(s);
      drawStar(s, alpha);
    }

    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', () => { resize(); initStars(); });
  resize();
  initStars();
  loop();
</script>
