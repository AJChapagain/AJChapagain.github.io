<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJChapa</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #020308;
      font-family: 'DM Mono', monospace;
      color: #e8eaf0;
      cursor: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    @media(hover:none){ body { cursor: auto; } }

    #custom-cursor {
      position: fixed; width: 5px; height: 5px; border-radius: 50%;
      pointer-events: none; z-index: 999999; transform: translate(-50%,-50%);
      background: rgba(255,100,60,0.85); box-shadow: 0 0 8px rgba(255,60,20,0.7);
    }
    .fx-scan {
      position: fixed; inset: 0; pointer-events: none; z-index: 99998;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
    }
    .fx-vig {
      position: fixed; inset: 0; pointer-events: none; z-index: 99997;
      background: radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.88) 100%);
    }
    .fx-noise {
      position: fixed; inset: 0; opacity: 0.028; pointer-events: none; z-index: 99996;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 128px;
    }
    #collapse-overlay {
      position: fixed; inset: 0; z-index: 99994;
      pointer-events: none; opacity: 0;
      background: radial-gradient(ellipse at center, rgba(60,0,0,0.0) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,1) 100%);
    }

    /* ── HERO INTRO CANVAS (full screen, intro sequence only) ─────────────── */
    #hero-canvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 30; pointer-events: none;
    }

    /* ── DOCKED STAR BUTTON (hidden until intro finishes) ─────────────────── */
    #star-nav {
      position: fixed; top: 0; left: 0; z-index: 25;
      opacity: 0; pointer-events: none;
      transition: opacity 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    #star-nav.docked {
      opacity: 1; pointer-events: all;
    }
    #star-btn {
      display: block; position: relative;
      width: 180px; height: 180px;
      background: none; border: none; padding: 0; cursor: none;
      /* Canvas origin sits at top-left; star center is at (90,90) inside it */
      transform: translate(-24px, -24px);
    }
    @media(hover:none){ #star-btn { cursor: pointer; } }
    #star-canvas { display: block; }
    #star-hitarea {
      position: absolute;
      top: 58px; left: 58px;
      width: 64px; height: 64px;
      border-radius: 50%;
      z-index: 10;
    }

    /* ── STAGE ──────────────────────────────────────────────────────────────── */
    #stage-landing { position: fixed; inset: 0; z-index: 10; }
    #starfield { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }

    .nebula {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 25% 70%, rgba(40,5,5,0.16) 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 80% 30%, rgba(30,5,5,0.12) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(20,5,5,0.1) 0%, transparent 70%);
      animation: pulseNeb 20s infinite alternate ease-in-out;
    }
    @keyframes pulseNeb { 0%{opacity:.8;transform:scale(1)} 100%{opacity:1;transform:scale(1.05)} }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-15px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(15px)}  to{opacity:1;transform:translateY(0)} }

    /* ── SITE NAME ──────────────────────────────────────────────────────────── */
    .top-header {
      position: absolute; top: 3rem; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; flex-direction: column; align-items: center; pointer-events: none;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .site-name {
      font-family: 'Cormorant Garamond', serif; font-weight: 300;
      font-size: clamp(1.5rem, 4vw, 2.5rem); letter-spacing: 0.28em;
      text-transform: uppercase; color: #eef0f8; text-align: center; white-space: nowrap;
      opacity: 0; animation: fadeDown 1.4s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
      text-shadow: 0 0 40px rgba(255,60,20,0.08);
    }
    .site-name::after {
      content:''; display:block; width:60%; height:1px;
      background: linear-gradient(90deg, transparent, rgba(160,30,10,0.35), transparent);
      margin: 0.5rem auto 0;
    }

    /* ── BOTTOM NAV ─────────────────────────────────────────────────────────── */
    .bottom-nav {
      position: absolute; bottom: 3.5rem; left: 0; width: 100%;
      z-index: 10; display: flex; align-items: center; justify-content: center; gap: 0 2rem;
      opacity: 0; animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .link-item {
      display: flex; align-items: center; gap: 0.36rem; text-decoration: none; color: #8892b0;
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      transition: color 0.3s; position: relative; white-space: nowrap; cursor: none;
    }
    .link-item:hover { color: #e0e6ff; }
    .link-item svg { width: 12px; height: 12px; opacity: 0.7; transition: opacity 0.3s; }
    .link-item:hover svg { opacity: 0.9; }
    .link-item::after {
      content:''; position:absolute; bottom:-4px; left:0; width:0; height:1px;
      background: rgba(180,40,20,0.5); transition: width 0.3s;
    }
    .link-item:hover::after { width:100%; }
    .link-divider { width:1px; height:10px; background:#2a2f4a; }

    /* ── COLLAPSE STATE ─────────────────────────────────────────────────────── */
    body.collapsing .top-header { opacity: 0; transform: translateX(-50%) scale(0.9); }
    body.collapsing .bottom-nav { opacity: 0; transform: translateY(16px); }
    body.collapsing #star-nav   { opacity: 0 !important; transition: opacity 0.4s ease; }

    /* ── RESPONSIVE ─────────────────────────────────────────────────────────── */
    @media(max-width:768px){
      #custom-cursor { display: none; }
      .site-name { font-size: 1.5rem; letter-spacing: 0.18em; }
      .top-header { top: 2.2rem; }
      .bottom-nav { bottom: 2rem; gap: 0 1.2rem; flex-wrap: wrap; justify-content: center; padding: 0 1rem; }
      .link-item { font-size: 0.58rem; letter-spacing: 0.12em; gap: 0.28rem; cursor: pointer; }
      .link-item svg { width: 10px; height: 10px; }
      .link-divider { display: none; }
    }
    @media(max-width:390px){
      .site-name { font-size: 1.1rem; letter-spacing: 0.1em; }
      .link-item { font-size: 0.48rem; }
    }
  </style>
</head>

<script>
// ── CURSOR ───────────────────────────────────────────────────────────────────
const cur = document.getElementById('custom-cursor');
window.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

// ═══════════════════════════════════════════════════════════════════════════════
// DOCKED RED STAR (static flare star shown after intro lands)
// ═══════════════════════════════════════════════════════════════════════════════
const cv  = document.getElementById('star-canvas');
const ctx = cv.getContext('2d');
const CX = 90, CY = 90; // canvas center = star position

let starFrame = 0;
let isCollapsing = false;
let starLoopRunning = false;

function drawDockedStar() {
  // ── Soft glow behind the star ──────────────────────────────────────────
  const glow1 = ctx.createRadialGradient(CX, CY, 0, CX, CY, 52);
  glow1.addColorStop(0,   'rgba(255,255,255,0.18)');
  glow1.addColorStop(0.35,'rgba(255,255,255,0.06)');
  glow1.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.arc(CX, CY, 52, 0, Math.PI*2);
  ctx.fillStyle = glow1; ctx.fill();

  // ── 5-pointed star polygon ─────────────────────────────────────────────
  const outerR = 28;   // tip radius
  const innerR = 11.2; // inner notch radius (classic ratio ≈ 0.382)
  const pts    = 5;
  const startA = -Math.PI / 2; // point straight up

  ctx.beginPath();
  for (let i = 0; i < pts * 2; i++) {
    const r   = i % 2 === 0 ? outerR : innerR;
    const ang = startA + (i * Math.PI) / pts;
    const x   = CX + Math.cos(ang) * r;
    const y   = CY + Math.sin(ang) * r;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();

  // Fill: white with very subtle warm centre
  const fill = ctx.createRadialGradient(CX, CY - 4, 0, CX, CY, outerR);
  fill.addColorStop(0,   'rgba(255,255,255,1)');
  fill.addColorStop(0.55,'rgba(255,250,240,0.97)');
  fill.addColorStop(1,   'rgba(240,235,255,0.85)');
  ctx.fillStyle = fill;
  ctx.fill();

  // Crisp white stroke — gives it that clean, drawn-star edge
  ctx.strokeStyle = 'rgba(255,255,255,0.95)';
  ctx.lineWidth   = 1;
  ctx.lineJoin    = 'miter';
  ctx.miterLimit  = 10;
  ctx.stroke();

  // ── CSS multi-layer glow (tight white core + wider blue-white halo) ───
  cv.style.filter = [
    'drop-shadow(0 0 3px rgba(255,255,255,1))',
    'drop-shadow(0 0 8px rgba(220,235,255,0.9))',
    'drop-shadow(0 0 20px rgba(200,220,255,0.6))',
    'drop-shadow(0 0 40px rgba(180,210,255,0.3))'
  ].join(' ');
}

function runDockedStarLoop() {
  ctx.clearRect(0, 0, 180, 180);
  starFrame++;
  drawDockedStar();
  requestAnimationFrame(runDockedStarLoop);
}

// ═══════════════════════════════════════════════════════════════════════════════
// HERO INTRO SEQUENCE — orbiting star that slingshots to top-left
// ═══════════════════════════════════════════════════════════════════════════════
const heroCv  = document.getElementById('hero-canvas');
const heroCtx = heroCv.getContext('2d');
let hW, hH;

function heroResize() {
  hW = heroCv.width  = window.innerWidth;
  hH = heroCv.height = window.innerHeight;
}
heroResize();

// Determine where the docked star center lives on screen
function getDockTarget() {
  // star-btn: fixed top:0 left:0, transform translate(-24,-24)
  // canvas is 180×180, CX=CY=90, so star sits at 90-24=66 from each edge
  return { x: 66, y: 66 };
}

const Intro = {
  phase: 'spawning',   // spawning → orbiting → launching → done
  x: 0, y: 0,
  angle: 0,
  orbitR: 0,           // current orbit radius (starts at BH radius, spirals out then in)
  speed: 0.015,        // angular speed
  trail: [],
  maxTrail: 55,
  orbitsDone: 0,
  launchDX: 0, launchDY: 0,
  spawnProgress: 0,    // 0→1 for spawn-in phase

  // Tiny sparkle particles emitted during flight
  sparks: [],

  init: function() {
    // Start at BH position (screen center), angle = random
    this.angle  = Math.random() * Math.PI * 2;
    this.orbitR = 45;  // tight initial orbit near BH
    this.x = hW * 0.5 + Math.cos(this.angle) * this.orbitR;
    this.y = hH * 0.5 + Math.sin(this.angle) * (this.orbitR * 0.38);
    this.phase  = 'spawning';
    this.spawnProgress = 0;
  },

  update: function() {
    const cx = hW * 0.5, cy = hH * 0.5;

    if (this.phase === 'spawning') {
      this.spawnProgress += 0.025;
      if (this.spawnProgress >= 1) {
        this.spawnProgress = 1;
        this.phase = 'orbiting';
      }
      // stay at initial position during spawn-in
      return;
    }

    if (this.phase === 'orbiting') {
      // Gradually accelerate and widen orbit for cinematic spiral-out
      this.speed += 0.00012;
      this.angle -= this.speed;

      // Orbit expands up to ~180px then starts contracting for slingshot
      const targetR = this.orbitsDone < 2.5 ? 180 : 55;
      this.orbitR += (targetR - this.orbitR) * 0.012;

      // Slightly elliptical to match BH disk tilt
      this.x = cx + Math.cos(this.angle) * this.orbitR;
      this.y = cy + Math.sin(this.angle) * (this.orbitR * 0.38);

      // Count full orbits
      this.orbitsDone = Math.abs(this.angle) / (Math.PI * 2);

      // After 3.5 orbits, slingshot to dock
      if (this.orbitsDone >= 3.5) {
        this.phase = 'launching';
        this.speed = 0.04; // no longer used as angle speed — used as lerp factor
      }
    }

    if (this.phase === 'launching') {
      const dock = getDockTarget();
      const dx = dock.x - this.x;
      const dy = dock.y - this.y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      // Ease-out lerp — fast at first, gentle landing
      const lerpT = 0.072 + Math.min(0.18, dist * 0.0008);
      this.x += dx * lerpT;
      this.y += dy * lerpT;

      if (dist < 3.5) {
        this.phase = 'done';
        this.onDocked();
      }
    }

    // Trail
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > this.maxTrail) this.trail.shift();

    // Emit sparks
    if (Math.random() < 0.55) {
      const a = Math.random() * Math.PI * 2;
      const spd = 0.4 + Math.random() * 1.1;
      this.sparks.push({
        x: this.x, y: this.y,
        vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
        life: 0.8 + Math.random()*0.2,
        decay: 0.025 + Math.random()*0.025,
        size: 0.6 + Math.random()*1.2
      });
    }
    this.sparks = this.sparks.filter(s => s.life > 0);
    for (const s of this.sparks) {
      s.x += s.vx; s.y += s.vy;
      s.vx *= 0.94; s.vy *= 0.94;
      s.life -= s.decay;
    }
  },

  draw: function() {
    heroCtx.clearRect(0, 0, hW, hH);
    if (this.phase === 'done') return;

    // ── Spawn-in glow burst ──
    if (this.phase === 'spawning') {
      const p = this.spawnProgress;
      const burstR = p * 60;
      const burst = heroCtx.createRadialGradient(this.x,this.y,0,this.x,this.y,burstR);
      burst.addColorStop(0,   `rgba(255,200,150,${(1-p)*0.7})`);
      burst.addColorStop(0.4, `rgba(220,60,10,${(1-p)*0.4})`);
      burst.addColorStop(1,   'rgba(150,10,0,0)');
      heroCtx.beginPath(); heroCtx.arc(this.x,this.y,burstR,0,Math.PI*2);
      heroCtx.fillStyle=burst; heroCtx.fill();
    }

    // ── Trail ──
    if (this.trail.length > 1) {
      heroCtx.save();
      for (let j = 1; j < this.trail.length; j++) {
        const t  = j / this.trail.length;
        const p0 = this.trail[j-1], p1 = this.trail[j];
        const w  = t * 5.5;
        // Color: deep red near tail → bright orange-white near head
        const r = Math.round(180 + t * 75);
        const g = Math.round(20  + t * 80);
        const b = Math.round(5   + t * 20);
        heroCtx.beginPath();
        heroCtx.moveTo(p0.x, p0.y); heroCtx.lineTo(p1.x, p1.y);
        heroCtx.strokeStyle = `rgba(${r},${g},${b},${t * 0.85})`;
        heroCtx.lineWidth = w; heroCtx.lineCap = 'round'; heroCtx.stroke();
      }
      // Bright core line on top
      heroCtx.beginPath();
      heroCtx.moveTo(this.trail[Math.max(0,this.trail.length-12)].x, this.trail[Math.max(0,this.trail.length-12)].y);
      heroCtx.lineTo(this.x, this.y);
      heroCtx.strokeStyle = 'rgba(255,220,180,0.6)';
      heroCtx.lineWidth = 1.5; heroCtx.stroke();
      heroCtx.restore();
    }

    // ── Spark particles ──
    for (const s of this.sparks) {
      heroCtx.save();
      heroCtx.globalAlpha = s.life;
      const sg = heroCtx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.size*3);
      sg.addColorStop(0, `rgba(255,180,100,${s.life})`);
      sg.addColorStop(1, 'rgba(200,40,0,0)');
      heroCtx.beginPath(); heroCtx.arc(s.x,s.y,s.size*3,0,Math.PI*2);
      heroCtx.fillStyle=sg; heroCtx.fill();
      heroCtx.restore();
    }

    // ── Star body ──
    const baseAlpha = this.phase === 'spawning' ? this.spawnProgress : 1;
    const x = this.x, y = this.y;

    // Soft glow behind
    const bloom = heroCtx.createRadialGradient(x,y,0,x,y,18);
    bloom.addColorStop(0,  `rgba(255,255,255,${0.25*baseAlpha})`);
    bloom.addColorStop(0.5,`rgba(220,235,255,${0.08*baseAlpha})`);
    bloom.addColorStop(1,  'rgba(255,255,255,0)');
    heroCtx.beginPath(); heroCtx.arc(x,y,18,0,Math.PI*2);
    heroCtx.fillStyle=bloom; heroCtx.fill();

    // 5-pointed star (smaller, for the flying intro version)
    const oR = 7, iR = 2.8, pts = 5, sa = -Math.PI/2;
    heroCtx.beginPath();
    for (let i = 0; i < pts*2; i++) {
      const r   = i%2===0 ? oR : iR;
      const ang = sa + (i*Math.PI)/pts;
      i===0 ? heroCtx.moveTo(x+Math.cos(ang)*r, y+Math.sin(ang)*r)
            : heroCtx.lineTo(x+Math.cos(ang)*r, y+Math.sin(ang)*r);
    }
    heroCtx.closePath();
    heroCtx.fillStyle = `rgba(255,255,255,${baseAlpha})`;
    heroCtx.fill();
    heroCtx.strokeStyle = `rgba(255,255,255,${0.9*baseAlpha})`;
    heroCtx.lineWidth = 0.5; heroCtx.lineJoin = 'miter'; heroCtx.miterLimit = 10;
    heroCtx.stroke();
  },

  onDocked: function() {
    // Hide hero canvas, reveal docked star button, start its loop
    heroCv.style.opacity = '0';
    heroCv.style.transition = 'opacity 0.5s ease';
    document.getElementById('star-nav').classList.add('docked');
    if (!starLoopRunning) {
      starLoopRunning = true;
      runDockedStarLoop();
    }
  }
};

function heroLoop() {
  Intro.update();
  Intro.draw();
  if (Intro.phase !== 'done') requestAnimationFrame(heroLoop);
}

Intro.init();
requestAnimationFrame(heroLoop);

// ── CLICK → BH COLLAPSE ──────────────────────────────────────────────────────
const starBtn = document.getElementById('star-btn');
const overlay = document.getElementById('collapse-overlay');

starBtn.addEventListener('click', startCollapse);
starBtn.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') startCollapse();
});

function startCollapse() {
  if (isCollapsing) return;
  isCollapsing = true;
  document.body.classList.add('collapsing');
  window._bhCollapse = true;
  window._bhCollapseStart = performance.now();
  let ov = 0;
  const fadeOv = setInterval(() => {
    ov = Math.min(1, ov + 0.016);
    overlay.style.opacity = ov;
    if (ov >= 1) clearInterval(fadeOv);
  }, 16);
  setTimeout(() => { window.location.href = 'archive.html'; }, 2300);
}

// ═══════════════════════════════════════════════════════════════════════════════
// STARFIELD + BLACK HOLE
// ═══════════════════════════════════════════════════════════════════════════════
function rand(a,b){ return a+Math.random()*(b-a); }
const isMobile = window.innerWidth < 768;
const vCv  = document.getElementById('starfield');
const vCtx = vCv.getContext('2d');
let vW, vH, vStars=[], vShoot=[], vDust=[];
const BH = {rx:.5, ry:.5};
let bhX, bhY, bhPulse=0, vFr=0, vNextS;
const BH_BASE_R=28;
let bhR=BH_BASE_R, gravMult=1, collapseProgress=0;
const STAR_COUNT=isMobile?100:130, S_MIN=isMobile?60:40, S_MAX=isMobile?160:110;
const GRAVITY_RADIUS=isMobile?220:300, MAX_TRAIL=isMobile?10:18;
const SCOLS=[{h:220,s:80,l:88},{h:200,s:40,l:96},{h:55,s:20,l:95},{h:30,s:65,l:82},{h:10,s:75,l:77}];
const MT=[{h:15,s:90,l:70,w:[1.2,2],len:[100,220]},{h:195,s:80,l:85,w:[1,1.8],len:[120,250]},{h:210,s:20,l:96,w:[.8,1.5],len:[80,150]}];

function vResize(){
  vW=vCv.width=window.innerWidth; vH=vCv.height=window.innerHeight;
  bhX=vW*BH.rx; bhY=vH*BH.ry;
}
function spawnStar(){
  const e=Math.floor(rand(0,4)); let x,y;
  if(e===0){x=rand(0,vW);y=-20;}else if(e===1){x=vW+20;y=rand(0,vH);}
  else if(e===2){x=rand(0,vW);y=vH+20;}else{x=-20;y=rand(0,vH);}
  const c=SCOLS[Math.floor(Math.random()*SCOLS.length)]; const ib=Math.random()>.84;
  return{x,y,vx:0,vy:0,r:ib?rand(.8,1.4):rand(.3,.7),baseOpacity:ib?rand(.5,.9):rand(.1,.4),
    twinkleSpeed:rand(.002,.01),twinkleOffset:rand(0,Math.PI*2),h:c.h,s:c.s,l:c.l,trail:[],isBright:ib};
}
function initStars(){
  vStars=[];vShoot=[];vDust=[];
  for(let i=0;i<STAR_COUNT;i++){const s=spawnStar();s.x=rand(0,vW);s.y=rand(0,vH);vStars.push(s);}
  vNextS=rand(S_MIN,S_MAX);
}
function drawBH(){
  bhPulse+=0.018; const pulse=Math.sin(bhPulse);
  if(window._bhCollapse){
    const el=performance.now()-window._bhCollapseStart;
    collapseProgress=Math.min(1,el/2000);
    bhR=BH_BASE_R+collapseProgress*110; gravMult=1+collapseProgress*24;
  }
  const wellR=bhR*(14+collapseProgress*5);
  const well=vCtx.createRadialGradient(bhX,bhY,bhR*.8,bhX,bhY,wellR);
  well.addColorStop(0,'rgba(0,0,0,1)');well.addColorStop(0.18,'rgba(1,2,6,0.96)');
  well.addColorStop(0.4,'rgba(2,4,10,0.7)');well.addColorStop(0.7,'rgba(3,5,14,0.3)');
  well.addColorStop(1,'rgba(0,0,0,0)');
  vCtx.beginPath();vCtx.arc(bhX,bhY,wellR,0,Math.PI*2);vCtx.fillStyle=well;vCtx.fill();
  vCtx.save();vCtx.translate(bhX,bhY);vCtx.scale(1,0.28);
  const diskR=bhR*2.8+pulse*2;
  const da=Math.min(1,0.55+collapseProgress*0.8);
  const disk=vCtx.createRadialGradient(0,0,bhR*1.05,0,0,diskR);
  disk.addColorStop(0,'rgba(255,240,200,0)');disk.addColorStop(0.2,`rgba(255,200,120,${da})`);
  disk.addColorStop(0.5,`rgba(255,140,60,${da*.7})`);disk.addColorStop(0.8,'rgba(180,80,20,0.18)');
  disk.addColorStop(1,'rgba(0,0,0,0)');
  vCtx.beginPath();vCtx.arc(0,0,diskR,0,Math.PI*2);vCtx.fillStyle=disk;vCtx.fill();vCtx.restore();
  vCtx.beginPath();vCtx.arc(bhX,bhY,bhR*1.5,0,Math.PI*2);
  vCtx.strokeStyle=`rgba(255,210,140,${0.25+pulse*.12+collapseProgress*.4})`;
  vCtx.lineWidth=1+collapseProgress*3;vCtx.stroke();
  vCtx.beginPath();vCtx.arc(bhX,bhY,bhR*1.15,0,Math.PI*2);
  vCtx.strokeStyle=`rgba(255,180,80,${0.15+pulse*.08+collapseProgress*.3})`;
  vCtx.lineWidth=2.5+collapseProgress*6;vCtx.stroke();
  vCtx.beginPath();vCtx.arc(bhX,bhY,bhR,0,Math.PI*2);vCtx.fillStyle='#000';vCtx.fill();
}
function mkShoot(){
  const t=MT[Math.floor(Math.random()*MT.length)];const ss=Math.floor(rand(0,4));
  let sx,sy,tx,ty;
  if(ss===0){sx=rand(0,vW);sy=-20;tx=rand(0,vW);ty=vH+20;}
  else if(ss===1){sx=vW+20;sy=rand(0,vH);tx=-20;ty=rand(0,vH);}
  else if(ss===2){sx=rand(0,vW);sy=vH+20;tx=rand(0,vW);ty=-20;}
  else{sx=-20;sy=rand(0,vH);tx=vW+20;ty=rand(0,vH);}
  const ang=Math.atan2(ty-sy,tx-sx),spd=rand(28,50);
  return{x:sx,y:sy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
    len:rand(t.len[0],t.len[1]),alpha:1,fade:rand(.015,.03),width:rand(t.w[0],t.w[1]),h:t.h,s:t.s,l:t.l};
}
function vLoop(){
  vCtx.clearRect(0,0,vW,vH); vFr++; drawBH();
  if(vFr>=vNextS){vShoot.push(mkShoot());if(!isMobile&&Math.random()<.4)vShoot.push(mkShoot());vNextS=vFr+rand(S_MIN,S_MAX);}
  if(window._bhCollapse&&vFr%5===0)vShoot.push(mkShoot());
  vShoot=vShoot.filter(s=>s.alpha>0&&s.x>-500&&s.x<vW+500&&s.y>-500&&s.y<vH+500);
  for(const s of vShoot){
    vCtx.save();
    const tx2=s.x-s.vx*(s.len/20),ty2=s.y-s.vy*(s.len/20);
    const g=vCtx.createLinearGradient(s.x,s.y,tx2,ty2);
    g.addColorStop(0,`hsla(0,0%,100%,${s.alpha})`);g.addColorStop(.1,`hsla(${s.h},${s.s}%,${s.l}%,${s.alpha*.9})`);
    g.addColorStop(1,`hsla(${s.h},${s.s}%,${s.l}%,0)`);
    vCtx.beginPath();vCtx.moveTo(s.x,s.y);vCtx.lineTo(tx2,ty2);
    vCtx.strokeStyle=g;vCtx.lineWidth=s.width;vCtx.lineCap='round';vCtx.stroke();
    if(Math.random()<.04)vDust.push({x:s.x,y:s.y,vx:s.vx*.05+rand(-1,1),vy:s.vy*.05+rand(-1,1),
      alpha:s.alpha*.8,decay:rand(.02,.06),size:rand(.5,2),h:s.h,s:s.s,l:s.l});
    vCtx.restore();
    const dx=bhX-s.x,dy=bhY-s.y,dist=Math.sqrt(dx*dx+dy*dy);
    s.vx+=(dx/dist)*(.9*gravMult);s.vy+=(dy/dist)*(.9*gravMult);
    s.x+=s.vx;s.y+=s.vy;s.alpha-=s.fade*(window._bhCollapse?2.5:1);
  }
  vDust=vDust.filter(p=>p.alpha>0);
  for(const p of vDust){
    vCtx.beginPath();vCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
    vCtx.fillStyle=`hsla(${p.h},${p.s}%,${p.l}%,${p.alpha})`;vCtx.fill();
    p.x+=p.vx;p.y+=p.vy;p.alpha-=p.decay;
  }
  for(let i=vStars.length-1;i>=0;i--){
    const s=vStars[i];
    const dx=bhX-s.x,dy=bhY-s.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<bhR){vStars[i]=spawnStar();continue;}
    const gp=(.001+(220/(dist+40))*.022)*gravMult;
    s.vx+=(dx/dist)*gp;s.vy+=(dy/dist)*gp;
    const sp=Math.sqrt(s.vx*s.vx+s.vy*s.vy);
    const maxSpd=(0.25+(1100/(dist+8))*2.4)*(window._bhCollapse?4+collapseProgress*9:1);
    if(sp>maxSpd){s.vx=(s.vx/sp)*maxSpd;s.vy=(s.vy/sp)*maxSpd;}
    const trailR=window._bhCollapse?vW:GRAVITY_RADIUS;
    if(dist<trailR){s.trail.push({x:s.x,y:s.y});if(s.trail.length>MAX_TRAIL)s.trail.shift();}
    else if(s.trail.length)s.trail.shift();
    s.x+=s.vx;s.y+=s.vy;
    const tw=Math.sin(vFr*s.twinkleSpeed+s.twinkleOffset);
    const a=Math.max(.01,s.baseOpacity+tw*s.baseOpacity*.4);
    if(s.trail.length>1){
      vCtx.save();
      for(let j=1;j<s.trail.length;j++){
        const ta=(j/s.trail.length)*.3;
        vCtx.beginPath();vCtx.moveTo(s.trail[j-1].x,s.trail[j-1].y);
        vCtx.lineTo(s.trail[j].x,s.trail[j].y);
        vCtx.strokeStyle=`hsla(${s.h},${s.s}%,${s.l}%,${ta})`;
        vCtx.lineWidth=s.r*.5;vCtx.lineCap='round';vCtx.stroke();
      }vCtx.restore();
    }
    vCtx.beginPath();vCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    vCtx.fillStyle=`hsla(${s.h},${s.s}%,${s.l}%,${a})`;vCtx.fill();
    if(s.isBright&&a>.4){
      const gg=vCtx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4.5);
      gg.addColorStop(0,`hsla(${s.h},${s.s}%,${s.l}%,${a*.35})`);
      gg.addColorStop(1,`hsla(${s.h},${s.s}%,${s.l}%,0)`);
      vCtx.beginPath();vCtx.arc(s.x,s.y,s.r*4.5,0,Math.PI*2);
      vCtx.fillStyle=gg;vCtx.fill();
    }
  }
  requestAnimationFrame(vLoop);
}
window.addEventListener('resize',()=>{vResize();initStars();heroResize();});
vResize();initStars();vLoop();
</script>
