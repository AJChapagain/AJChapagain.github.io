<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJChapa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #020308;
      font-family: 'DM Mono', monospace;
      color: #e8eaf0;
      cursor: crosshair;
      overflow: hidden;
    }
    #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; transition: opacity 1s ease-in-out; }
    .nebula {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse 60% 40% at 25% 70%, rgba(15,25,60,0.12) 0%, transparent 65%),
                  radial-gradient(ellipse 50% 50% at 80% 30%, rgba(10,15,45,0.15) 0%, transparent 65%),
                  radial-gradient(ellipse 40% 40% at 50% 50%, rgba(20,25,40,0.08) 0%, transparent 70%);
      animation: pulseNebula 20s infinite alternate ease-in-out;
      transition: opacity 1s ease-in-out;
    }
    .fade-out { opacity: 0 !important; pointer-events: none !important; }
    @keyframes pulseNebula { 0%{opacity:0.8;transform:scale(1)} 100%{opacity:1;transform:scale(1.05)} }

    .uu-badge {
      position: fixed; top: 1.5rem; right: 2rem; z-index: 20; opacity: 0;
      animation: fadeDown 1.4s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
      text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
      transition: opacity 1s ease-in-out;
    }
    .uu-badge svg { width: 26px; height: 26px; filter: drop-shadow(0 0 5px rgba(190,20,20,0.35)); transition: filter 0.3s; }
    .uu-badge:hover svg { filter: drop-shadow(0 0 11px rgba(220,40,40,0.7)); }
    .uu-text { font-size: 0.37rem; letter-spacing: 0.26em; text-transform: uppercase; color: #321010; transition: color 0.3s; }
    .uu-badge:hover .uu-text { color: #7a2828; }

    .life-badge {
      position: fixed; top: 1.5rem; left: 2rem; z-index: 20; opacity: 0;
      animation: fadeDown 1.4s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
      text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: transparent; border: 1px solid rgba(74,127,193,0.3); padding: 0.5rem 1rem;
      color: #eef0f8; font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s ease, opacity 1s ease-in-out;
    }
    .life-badge:hover { background: rgba(74,127,193,0.1); border-color: rgba(74,127,193,0.8); box-shadow: 0 0 15px rgba(74,127,193,0.2); }

    .top-header {
      position: fixed; top: 3rem; left: 50%; transform: translateX(-50%); z-index: 10;
      display: flex; flex-direction: column; align-items: center; pointer-events: none;
      transition: opacity 1s ease-in-out;
    }
    .top-header > * { pointer-events: auto; }
    .name {
      font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(1.5rem, 4vw, 2.5rem);
      letter-spacing: 0.24em; text-transform: uppercase; color: #eef0f8; text-align: center;
      opacity: 0; animation: fadeDown 1.4s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
      text-shadow: 0 0 30px rgba(180,200,255,0.2); white-space: nowrap;
    }
    .name::after { content:''; display:block; width:60%; height:1px; background:linear-gradient(90deg,transparent,rgba(74,127,193,0.38),transparent); margin:0.4rem auto 0; }

    .bottom-nav {
      position: fixed; bottom: 3.5rem; left: 0; width: 100%; z-index: 10;
      display: flex; align-items: center; justify-content: center; gap: 0 2rem;
      opacity: 0; animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
      transition: opacity 1s ease-in-out;
    }
    .link-item {
      display: flex; align-items: center; gap: 0.36rem; text-decoration: none; color: #5a6285;
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; transition: color 0.3s; position: relative; white-space: nowrap;
    }
    .link-item:hover { color: #aeb6d4; }
    .link-item svg { width: 12px; height: 12px; flex-shrink: 0; opacity: 0.45; transition: opacity 0.3s; }
    .link-item:hover svg { opacity: 0.9; }
    .link-item::after { content:''; position:absolute; bottom:-4px; left:0; width:0; height:1px; background:rgba(74,127,193,0.5); transition:width 0.3s; }
    .link-item:hover::after { width: 100%; }
    .link-divider { width: 1px; height: 10px; background: #161a2b; flex-shrink: 0; }

    /* ══ LIFE DIMENSION ══ */
    #life-dimension {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 30;
      opacity: 0; pointer-events: none; transition: opacity 1.8s ease-in-out;
      background: #020308; overflow: hidden;
    }
    #life-dimension.active { opacity: 1; pointer-events: auto; }

    #constellation-canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: block; cursor: crosshair;
    }

    #focus-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0; pointer-events: none;
      transition: opacity 1.2s cubic-bezier(0.4,0,0.2,1);
    }
    #focus-layer.open { opacity: 1; pointer-events: auto; }
    #focus-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }

    /* Focus UI — desktop: title centered, return far right */
    #focus-ui {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: flex-end;
      padding: 1.4rem 2rem; pointer-events: none; z-index: 2;
    }
    #focus-title {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-family: 'Cormorant Garamond', serif; font-weight: 300;
      font-size: clamp(0.9rem, 2.5vw, 1.4rem); letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(238,240,248,0.4); white-space: nowrap; pointer-events: none;
    }
    #focus-return {
      pointer-events: auto;
      background: transparent; border: 1px solid rgba(180,200,255,0.2); padding: 0.4rem 0.9rem;
      color: rgba(238,240,248,0.35); font-family: 'DM Mono', monospace; font-size: 0.52rem;
      letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease;
      white-space: nowrap;
    }
    #focus-return:hover { border-color: rgba(180,200,255,0.6); color: rgba(238,240,248,0.9); }

    /* Way back — constellation overview button */
    .way-back-btn {
      position: absolute; top: 1.4rem; left: 2rem; z-index: 10;
      background: transparent; border: 1px solid rgba(180,200,255,0.2); padding: 0.4rem 0.9rem;
      color: rgba(238,240,248,0.35); font-family: 'DM Mono', monospace; font-size: 0.52rem;
      letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease;
    }
    .way-back-btn:hover { border-color: rgba(180,200,255,0.55); color: rgba(238,240,248,0.8); }
    /* Hide way-back when focus sim is open — avoid triple button collision */
    #focus-layer.open ~ .way-back-btn,
    .way-back-hidden { opacity: 0; pointer-events: none; }

    /* Mobile overrides */
    @media (max-width: 600px) {
      #focus-ui {
        /* Stack: title top-center, return button bottom-center */
        flex-direction: column; justify-content: flex-start; align-items: center;
        padding: 1.1rem 1rem 0;
        pointer-events: none;
      }
      #focus-title {
        position: static; transform: none;
        font-size: 0.75rem; letter-spacing: 0.28em;
        margin-bottom: 0;
      }
      #focus-return {
        /* Move return to bottom of screen on mobile */
        position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
        font-size: 0.5rem; padding: 0.55rem 1.4rem; z-index: 99;
        background: rgba(2,3,8,0.75); backdrop-filter: blur(6px);
      }
      .way-back-btn {
        top: 1rem; left: 1rem; font-size: 0.45rem; padding: 0.4rem 0.7rem;
      }
    }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-15px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(15px)}  to{opacity:1;transform:translateY(0)} }
  </style>
</head>

<div id="life-dimension">

  <!-- Focus mode: fullscreen simulation -->

<script>
// ═══════════════════════════════════════════════════════
// UTILITY
// ═══════════════════════════════════════════════════════
function rand(a,b){return a+Math.random()*(b-a);}

// ═══════════════════════════════════════════════════════
// VOID PAGE — COMPLETELY ORIGINAL
// ═══════════════════════════════════════════════════════
const vCanvas=document.getElementById('starfield');
const vCtx=vCanvas.getContext('2d');
let vW,vH,stars=[],shootingStars=[],starDust=[];
const BH={rx:0.5,ry:0.5}; let bhX,bhY; const BH_RADIUS=24;
let isWarping=false;
function vResize(){vW=vCanvas.width=window.innerWidth;vH=vCanvas.height=window.innerHeight;bhX=vW*BH.rx;bhY=vH*BH.ry;}
const STELLAR_COLORS=[{h:220,s:80,l:85},{h:200,s:40,l:95},{h:60,s:20,l:95},{h:35,s:70,l:80},{h:15,s:80,l:75}];
function spawnStarAtEdge(){const e=Math.floor(rand(0,4));let x,y;if(e===0){x=rand(0,vW);y=-20;}else if(e===1){x=vW+20;y=rand(0,vH);}else if(e===2){x=rand(0,vW);y=vH+20;}else{x=-20;y=rand(0,vH);}const c=STELLAR_COLORS[Math.floor(Math.random()*STELLAR_COLORS.length)];const ib=Math.random()>0.85;return{x,y,vx:0,vy:0,r:ib?rand(0.8,1.4):rand(0.3,0.7),baseOpacity:ib?rand(0.5,0.9):rand(0.1,0.4),twinkleSpeed:rand(0.002,0.01),twinkleOffset:rand(0,Math.PI*2),h:c.h,s:c.s,l:c.l,trail:[],isBright:ib};}
function initStars(){stars=[];shootingStars=[];starDust=[];for(let i=0;i<450;i++){const s=spawnStarAtEdge();s.x=rand(0,vW);s.y=rand(0,vH);stars.push(s);}}
function drawVoidStar(s,a){vCtx.beginPath();vCtx.arc(s.x,s.y,s.r,0,Math.PI*2);vCtx.fillStyle=`hsla(${s.h},${s.s}%,${s.l}%,${a})`;vCtx.fill();if(s.isBright&&a>0.4){const g=vCtx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4);g.addColorStop(0,`hsla(${s.h},${s.s}%,${s.l}%,${a*0.4})`);g.addColorStop(1,`hsla(${s.h},${s.s}%,${s.l}%,0)`);vCtx.beginPath();vCtx.arc(s.x,s.y,s.r*4,0,Math.PI*2);vCtx.fillStyle=g;vCtx.fill();}}
function drawTrail(s){if(s.trail.length<2)return;vCtx.save();for(let i=1;i<s.trail.length;i++){const a=(i/s.trail.length)*0.3;vCtx.beginPath();vCtx.moveTo(s.trail[i-1].x,s.trail[i-1].y);vCtx.lineTo(s.trail[i].x,s.trail[i].y);vCtx.strokeStyle=`hsla(${s.h},${s.s}%,${s.l}%,${a})`;vCtx.lineWidth=s.r*0.5;vCtx.lineCap='round';vCtx.stroke();}vCtx.restore();}
function drawBlackHole(){const l=vCtx.createRadialGradient(bhX,bhY,BH_RADIUS,bhX,bhY,BH_RADIUS*7);l.addColorStop(0,'rgba(0,0,0,0.95)');l.addColorStop(0.3,'rgba(3,5,12,0.4)');l.addColorStop(1,'rgba(0,0,0,0)');vCtx.beginPath();vCtx.arc(bhX,bhY,BH_RADIUS*7,0,Math.PI*2);vCtx.fillStyle=l;vCtx.fill();vCtx.beginPath();vCtx.arc(bhX,bhY,BH_RADIUS,0,Math.PI*2);vCtx.fillStyle='#000';vCtx.fill();const pr=vCtx.createLinearGradient(bhX-BH_RADIUS,bhY-BH_RADIUS,bhX+BH_RADIUS,bhY+BH_RADIUS);pr.addColorStop(0,'rgba(255,230,200,0.6)');pr.addColorStop(0.5,'rgba(200,150,100,0.15)');pr.addColorStop(1,'rgba(255,230,200,0.05)');vCtx.beginPath();vCtx.arc(bhX,bhY,BH_RADIUS+0.5,0,Math.PI*2);vCtx.strokeStyle=pr;vCtx.lineWidth=1.2;vCtx.stroke();}
const MT=[{h:15,s:90,l:70,w:[1.2,2.0],len:[100,220]},{h:195,s:80,l:85,w:[1.0,1.8],len:[120,250]},{h:210,s:20,l:95,w:[0.8,1.5],len:[80,150]}];
function createShootingStar(){const t=MT[Math.floor(Math.random()*MT.length)];const ss=Math.floor(rand(0,4));let sx,sy,tx,ty;if(ss===0){sx=rand(0,vW);sy=-20;tx=rand(0,vW);ty=vH+20;}else if(ss===1){sx=vW+20;sy=rand(0,vH);tx=-20;ty=rand(0,vH);}else if(ss===2){sx=rand(0,vW);sy=vH+20;tx=rand(0,vW);ty=-20;}else{sx=-20;sy=rand(0,vH);tx=vW+20;ty=rand(0,vH);}const ang=Math.atan2(ty-sy,tx-sx);const spd=rand(28,50);return{x:sx,y:sy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,len:rand(t.len[0],t.len[1]),alpha:1.0,fade:rand(0.015,0.03),width:rand(t.w[0],t.w[1]),h:t.h,s:t.s,l:t.l};}
let vFrame=0,nextShoot=rand(20,80),voidRAF;
function vLoop(){vCtx.clearRect(0,0,vW,vH);vFrame++;drawBlackHole();if(vFrame>=nextShoot&&!isWarping){shootingStars.push(createShootingStar());if(Math.random()<0.4)shootingStars.push(createShootingStar());nextShoot=vFrame+rand(30,100);}shootingStars=shootingStars.filter(s=>s.alpha>0&&s.x>-500&&s.x<vW+500&&s.y>-500&&s.y<vH+500);for(const s of shootingStars){vCtx.save();const tx2=s.x-s.vx*(s.len/20),ty2=s.y-s.vy*(s.len/20);const g=vCtx.createLinearGradient(s.x,s.y,tx2,ty2);g.addColorStop(0,`hsla(0,0%,100%,${s.alpha})`);g.addColorStop(0.1,`hsla(${s.h},${s.s}%,${s.l}%,${s.alpha*0.9})`);g.addColorStop(1,`hsla(${s.h},${s.s}%,${s.l}%,0)`);vCtx.beginPath();vCtx.moveTo(s.x,s.y);vCtx.lineTo(tx2,ty2);vCtx.strokeStyle=g;vCtx.lineWidth=s.width;vCtx.lineCap='round';vCtx.stroke();if(Math.random()>0.3)starDust.push({x:s.x,y:s.y,vx:s.vx*0.05+rand(-1,1),vy:s.vy*0.05+rand(-1,1),alpha:s.alpha*0.8,decay:rand(0.02,0.06),size:rand(0.5,2),h:s.h,s:s.s,l:s.l});vCtx.restore();const dx=bhX-s.x,dy=bhY-s.y,dist=Math.sqrt(dx*dx+dy*dy);if(isWarping){s.vx-=(dx/dist)*8;s.vy-=(dy/dist)*8;}else{s.vx+=(dx/dist)*0.5;s.vy+=(dy/dist)*0.5;}s.x+=s.vx;s.y+=s.vy;s.alpha-=s.fade;}starDust=starDust.filter(p=>p.alpha>0&&p.x>-200&&p.x<vW+200&&p.y>-200&&p.y<vH+200);for(const p of starDust){vCtx.beginPath();vCtx.arc(p.x,p.y,p.size,0,Math.PI*2);vCtx.fillStyle=`hsla(${p.h},${p.s}%,${p.l}%,${p.alpha})`;vCtx.fill();if(isWarping){const dx=bhX-p.x,dy=bhY-p.y,dist=Math.sqrt(dx*dx+dy*dy);p.vx-=(dx/dist)*2;p.vy-=(dy/dist)*2;}p.x+=p.vx;p.y+=p.vy;p.alpha-=p.decay;}for(let i=stars.length-1;i>=0;i--){const s=stars[i];const dx=bhX-s.x,dy=bhY-s.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<BH_RADIUS&&!isWarping){stars[i]=spawnStarAtEdge();continue;}if(isWarping){s.vx-=(dx/dist)*3.5;s.vy-=(dy/dist)*3.5;s.trail.push({x:s.x,y:s.y});if(s.trail.length>50)s.trail.shift();}else{const gp=0.001+(150/(dist+50))*0.015;s.vx+=(dx/dist)*gp;s.vy+=(dy/dist)*gp;const spd2=Math.sqrt(s.vx*s.vx+s.vy*s.vy);const ms=0.2+(800/(dist+10))*2;if(spd2>ms){s.vx=(s.vx/spd2)*ms;s.vy=(s.vy/spd2)*ms;}if(dist<300){s.trail.push({x:s.x,y:s.y});if(s.trail.length>20)s.trail.shift();}else{if(s.trail.length>0)s.trail.shift();}}const tw=Math.sin(vFrame*s.twinkleSpeed+s.twinkleOffset);let a=Math.max(0.01,s.baseOpacity+tw*s.baseOpacity*0.4);s.x+=s.vx;s.y+=s.vy;drawTrail(s);drawVoidStar(s,a);}voidRAF=requestAnimationFrame(vLoop);}


// ═══════════════════════════════════════════════════════
// CONSTELLATION — IDEA MAP
// ═══════════════════════════════════════════════════════

const CC = document.getElementById('constellation-canvas');
const CX = CC.getContext('2d');
let CW, CH;

// Star concept definitions — positioned as a sparse constellation
const CONCEPTS = [
  { id:'mathematics', label:'Mathematics', rx:0.50, ry:0.16, hue:210, size:3.5, driftA:0.0,  driftR:8  },
  { id:'energy',      label:'Energy',      rx:0.18, ry:0.35, hue:45,  size:3.0, driftA:1.1,  driftR:10 },
  { id:'biology',     label:'Biology',     rx:0.80, ry:0.32, hue:140, size:3.0, driftA:2.3,  driftR:9  },
  { id:'humans',      label:'Humans',      rx:0.50, ry:0.52, hue:270, size:4.0, driftA:0.7,  driftR:7  },
  { id:'markets',     label:'Markets',     rx:0.22, ry:0.70, hue:30,  size:2.8, driftA:3.8,  driftR:11 },
  { id:'war',         label:'War',         rx:0.78, ry:0.70, hue:0,   size:2.8, driftA:5.1,  driftR:9  },
  { id:'love',        label:'Love',        rx:0.50, ry:0.84, hue:340, size:3.5, driftA:2.0,  driftR:8  },
];

// Constellation edges
const EDGES = [
  [0,1],[0,2],[0,3],[1,3],[2,3],[3,4],[3,5],[3,6],[4,6],[5,6],[1,4],[2,5]
];

// Background dust stars
let dustStars = [];
let constellationT = 0;
let hoveredConcept = null;
let constellationRAF = null;

function initConstellation() {
  CW = CC.width = window.innerWidth;
  CH = CC.height = window.innerHeight;
  dustStars = Array.from({length: 280}, () => ({
    x: rand(0, CW), y: rand(0, CH),
    r: rand(0.2, 0.9),
    opacity: rand(0.04, 0.28),
    twinkle: rand(0, Math.PI * 2),
    twinkleSpd: rand(0.004, 0.018)
  }));
  for (const c of CONCEPTS) {
    c.bx = c.rx * CW;
    c.by = c.ry * CH;
    c.wx = c.bx;
    c.wy = c.by;
  }
  initMiniSims();
}

function getConceptPos(c, t) {
  // Slow elliptical drift
  const dx = Math.sin(t * 0.0004 + c.driftA) * c.driftR;
  const dy = Math.cos(t * 0.0006 + c.driftA * 1.3) * c.driftR * 0.6;
  return { x: c.bx + dx, y: c.by + dy };
}

function drawConstellation() {
  constellationT++;
  CX.clearRect(0, 0, CW, CH);

  // Update live positions
  for (const c of CONCEPTS) {
    const p = getConceptPos(c, constellationT);
    c.wx = p.x; c.wy = p.y;
  }

  // Dust stars
  for (const s of dustStars) {
    const tw = Math.sin(constellationT * s.twinkleSpd + s.twinkle);
    const a = s.opacity * (0.7 + 0.3 * tw);
    CX.beginPath();
    CX.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    CX.fillStyle = `rgba(200,210,255,${a})`;
    CX.fill();
  }

  const isAnyHovered = hoveredConcept !== null;

  // Constellation edges
  for (const [ai, bi] of EDGES) {
    const a = CONCEPTS[ai], b = CONCEPTS[bi];
    const isConnected = isAnyHovered && (hoveredConcept === a || hoveredConcept === b);
    const alpha = isAnyHovered ? (isConnected ? 0.18 : 0.03) : 0.08;

    const grad = CX.createLinearGradient(a.wx, a.wy, b.wx, b.wy);
    grad.addColorStop(0, `hsla(${a.hue},60%,75%,${alpha})`);
    grad.addColorStop(1, `hsla(${b.hue},60%,75%,${alpha})`);
    CX.beginPath();
    CX.moveTo(a.wx, a.wy);
    CX.lineTo(b.wx, b.wy);
    CX.strokeStyle = grad;
    CX.lineWidth = 0.7;
    CX.stroke();
  }

  // Concept stars
  for (const c of CONCEPTS) {
    const isHov = hoveredConcept === c;
    const dimmed = isAnyHovered && !isHov;
    const pulse = Math.sin(constellationT * 0.018 + c.driftA) * 0.25 + 1;

    // Outer glow
    const glowR = c.size * (isHov ? 16 : 8) * pulse;
    const glowA = isHov ? 0.18 : (dimmed ? 0.02 : 0.07);
    const glow = CX.createRadialGradient(c.wx, c.wy, 0, c.wx, c.wy, glowR);
    glow.addColorStop(0, `hsla(${c.hue},70%,80%,${glowA * 3})`);
    glow.addColorStop(1, `hsla(${c.hue},70%,70%,0)`);
    CX.beginPath();
    CX.arc(c.wx, c.wy, glowR, 0, Math.PI * 2);
    CX.fillStyle = glow;
    CX.fill();

    // Star core
    const coreA = dimmed ? 0.2 : (isHov ? 1.0 : 0.75);
    const coreR = c.size * (isHov ? 1.5 : 1) * pulse;
    CX.beginPath();
    CX.arc(c.wx, c.wy, coreR, 0, Math.PI * 2);
    CX.fillStyle = `hsla(${c.hue},80%,88%,${coreA})`;
    CX.fill();

    // Label — appears on hover, fades otherwise
    const labelA = isHov ? 0.8 : (dimmed ? 0 : 0.18);
    if (labelA > 0.01) {
      CX.font = `${Math.round(CW * 0.009 + 9)}px 'DM Mono', monospace`;
      CX.textAlign = 'center';
      CX.textBaseline = 'top';
      CX.fillStyle = `hsla(${c.hue},50%,85%,${labelA})`;
      CX.fillText(c.label.toUpperCase(), c.wx, c.wy + coreR + 10);
    }
  }

  // Mini preview — fades in on hover
  previewAlpha += ((isAnyHovered ? 1 : 0) - previewAlpha) * 0.09;
  if (isAnyHovered && previewAlpha > 0.02) {
    drawMiniPreview(hoveredConcept);
  }

  constellationRAF = requestAnimationFrame(drawConstellation);
}

// ── Hover detection ──
CC.addEventListener('mousemove', e => {
  const rect = CC.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  let found = null;
  for (const c of CONCEPTS) {
    const dx = mx - c.wx, dy = my - c.wy;
    if (Math.sqrt(dx*dx + dy*dy) < Math.max(c.size * 5, 28)) { found = c; break; }
  }
  hoveredConcept = found;
  CC.style.cursor = found ? 'pointer' : 'crosshair';
});
CC.addEventListener('mouseleave', () => { hoveredConcept = null; CC.style.cursor = 'crosshair'; });

// Touch support
CC.addEventListener('touchstart', e => {
  const t = e.touches[0];
  const rect = CC.getBoundingClientRect();
  const mx = t.clientX - rect.left, my = t.clientY - rect.top;
  for (const c of CONCEPTS) {
    const dx = mx - c.wx, dy = my - c.wy;
    if (Math.sqrt(dx*dx + dy*dy) < Math.max(c.size * 6, 36)) {
      e.preventDefault(); openFocus(c); return;
    }
  }
}, { passive: false });

CC.addEventListener('click', e => {
  if (!hoveredConcept) return;
  openFocus(hoveredConcept);
});

// ═══════════════════════════════════════════════════════
// FOCUS MODE — FULLSCREEN SIMULATIONS
// ═══════════════════════════════════════════════════════

const focusLayer = document.getElementById('focus-layer');
const focusCanvas = document.getElementById('focus-canvas');
const focusCtx = focusCanvas.getContext('2d');
const focusTitle = document.getElementById('focus-title');
let focusRAF = null;
let focusSim = null;

const btnReturn = document.getElementById('btn-return');

function openFocus(concept) {
  focusCanvas.width = window.innerWidth;
  focusCanvas.height = window.innerHeight;
  focusTitle.textContent = concept.label;
  focusLayer.classList.add('open');
  btnReturn.classList.add('way-back-hidden');
  stopFocus();
  focusSim = buildSim(concept.id, focusCanvas, focusCtx);
  function tick() { if (focusSim) focusSim(); focusRAF = requestAnimationFrame(tick); }
  tick();
}

function stopFocus() {
  cancelAnimationFrame(focusRAF);
  focusRAF = null; focusSim = null;
  focusCtx.clearRect(0, 0, focusCanvas.width, focusCanvas.height);
}

document.getElementById('focus-return').addEventListener('click', () => {
  focusLayer.classList.remove('open');
  btnReturn.classList.remove('way-back-hidden');
  setTimeout(stopFocus, 1200);
});

// ═══════════════════════════════════════════════════════
// MINI HOVER PREVIEWS — tiny sims drawn on constellation canvas around each star
// ═══════════════════════════════════════════════════════

// Each concept gets a lightweight off-screen mini canvas that runs a tiny sim
const miniSims = {};
const miniCanvases = {};
const MINI_SIZE = 110;

function buildMiniSim(id, w, h) {
  // Very stripped down — few particles, no heavy computation
  if (id === 'mathematics') {
    const nums = Array.from({length:12}, () => ({
      x: rand(0,w), y: rand(0,h), angle: rand(0,Math.PI*2),
      speed: rand(0.008,0.02), num: Math.floor(rand(0,10)), r: rand(7,14)
    }));
    let t = 0;
    return (ctx) => {
      t++;
      ctx.clearRect(0,0,w,h);
      nums.forEach(n => {
        n.angle += n.speed;
        const x = n.x + Math.sin(n.angle)*18, y = n.y + Math.cos(n.angle)*18;
        ctx.font = `${n.r}px 'DM Mono', monospace`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = `hsla(210,80%,85%,${0.3+0.3*Math.sin(t*0.04+n.angle)})`;
        ctx.fillText(n.num, x, y);
      });
    };
  }
  if (id === 'biology') {
    const cells = Array.from({length:7}, () => ({x:rand(10,w-10),y:rand(10,h-10),r:rand(5,14),dx:rand(-0.3,0.3),dy:rand(-0.3,0.3)}));
    return (ctx) => {
      ctx.clearRect(0,0,w,h);
      cells.forEach(c => {
        c.x+=c.dx; c.y+=c.dy;
        if(c.x<c.r||c.x>w-c.r)c.dx*=-1; if(c.y<c.r||c.y>h-c.r)c.dy*=-1;
        const g=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r);
        g.addColorStop(0,'hsla(140,60%,65%,0.45)'); g.addColorStop(1,'hsla(140,60%,40%,0)');
        ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      });
    };
  }
  if (id === 'energy') {
    const orbs = Array.from({length:14}, () => ({x:rand(0,w),y:rand(0,h),vx:rand(-0.8,0.8),vy:rand(-0.8,0.8),hue:rand(28,58),r:rand(2,5)}));
    let t = 0;
    return (ctx) => {
      t++;
      ctx.clearRect(0,0,w,h);
      orbs.forEach(o => {
        o.x+=o.vx; o.y+=o.vy;
        if(o.x<0||o.x>w)o.vx*=-1; if(o.y<0||o.y>h)o.vy*=-1;
        const p = Math.sin(t*0.06+o.vx)*0.5+0.5;
        ctx.beginPath();ctx.arc(o.x,o.y,o.r*(0.7+0.6*p),0,Math.PI*2);
        ctx.fillStyle=`hsla(${o.hue},90%,70%,${0.4+0.4*p})`;ctx.fill();
      });
    };
  }
  if (id === 'humans') {
    const dots = Array.from({length:18}, () => ({x:rand(0,w),y:rand(0,h),vx:rand(-0.4,0.4),vy:rand(-0.4,0.4)}));
    return (ctx) => {
      ctx.clearRect(0,0,w,h);
      dots.forEach(d=>{d.x+=d.vx;d.y+=d.vy;if(d.x<0||d.x>w)d.vx*=-1;if(d.y<0||d.y>h)d.vy*=-1;});
      for(let i=0;i<dots.length;i++)for(let j=i+1;j<dots.length;j++){const dx=dots[i].x-dots[j].x,dy=dots[i].y-dots[j].y,dd=Math.sqrt(dx*dx+dy*dy);if(dd<45){ctx.beginPath();ctx.moveTo(dots[i].x,dots[i].y);ctx.lineTo(dots[j].x,dots[j].y);ctx.strokeStyle=`rgba(190,130,255,${0.18-dd*0.003})`;ctx.lineWidth=0.8;ctx.stroke();}}
      dots.forEach(d=>{ctx.beginPath();ctx.arc(d.x,d.y,2.5,0,Math.PI*2);ctx.fillStyle='rgba(190,130,255,0.7)';ctx.fill();});
    };
  }
  if (id === 'markets') {
    const bars = Array.from({length:18}, (_,i) => ({x:i*(w/18),h:rand(8,h*0.55),dir:Math.random()>0.5?1:-1}));
    return (ctx) => {
      ctx.clearRect(0,0,w,h);
      bars.forEach(b=>{b.h+=b.dir*0.4;if(b.h<8||b.h>h*0.6)b.dir*=-1;ctx.fillStyle='hsla(30,80%,60%,0.55)';ctx.fillRect(b.x,h-b.h,(w/18)*0.7,b.h);});
    };
  }
  if (id === 'war') {
    const sparks = Array.from({length:20}, () => ({x:rand(0,w),y:rand(0,h),vx:rand(-1.2,1.2),vy:rand(-1.2,1.2),r:rand(1.5,3.5)}));
    return (ctx) => {
      ctx.clearRect(0,0,w,h);
      sparks.forEach(s=>{s.x+=s.vx;s.y+=s.vy;if(s.x<0||s.x>w)s.vx*=-1;if(s.y<0||s.y>h)s.vy*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='hsla(0,90%,62%,0.6)';ctx.fill();});
    };
  }
  if (id === 'love') {
    const hearts = Array.from({length:10}, () => ({x:rand(5,w-5),y:rand(h*0.2,h),size:rand(4,9),dy:rand(0.2,0.5)}));
    function drawHeart(ctx,hx,hy,s){ctx.beginPath();ctx.moveTo(hx,hy);ctx.bezierCurveTo(hx+s/2,hy-s/2,hx+s*1.5,hy+s/2,hx,hy+s);ctx.bezierCurveTo(hx-s*1.5,hy+s/2,hx-s/2,hy-s/2,hx,hy);ctx.fill();}
    return (ctx) => {
      ctx.clearRect(0,0,w,h);
      hearts.forEach(ht=>{ht.y-=ht.dy;if(ht.y<-15)ht.y=h+15;ctx.fillStyle='hsla(340,80%,72%,0.45)';drawHeart(ctx,ht.x,ht.y,ht.size);});
    };
  }
  return (ctx) => ctx.clearRect(0,0,w,h);
}

// Init all mini-sims (off-screen canvases)
function initMiniSims() {
  for (const c of CONCEPTS) {
    const mc = document.createElement('canvas');
    mc.width = MINI_SIZE; mc.height = MINI_SIZE;
    miniCanvases[c.id] = mc;
    miniSims[c.id] = buildMiniSim(c.id, MINI_SIZE, MINI_SIZE);
  }
}

// Run a mini-sim tick and blit it onto the constellation canvas around a star
function drawMiniPreview(concept) {
  const mc = miniCanvases[concept.id];
  const mctx = mc.getContext('2d');
  if (miniSims[concept.id]) miniSims[concept.id](mctx);

  const hw = MINI_SIZE / 2;
  // Position preview centered on star, nudged to stay on screen
  let px = concept.wx - hw;
  let py = concept.wy - hw - 10;
  px = Math.max(8, Math.min(CW - MINI_SIZE - 8, px));
  py = Math.max(8, Math.min(CH - MINI_SIZE - 8, py));

  // Soft rounded clipping mask
  CX.save();
  const radius = 10;
  CX.beginPath();
  CX.moveTo(px+radius, py);
  CX.arcTo(px+MINI_SIZE,py, px+MINI_SIZE,py+MINI_SIZE, radius);
  CX.arcTo(px+MINI_SIZE,py+MINI_SIZE, px,py+MINI_SIZE, radius);
  CX.arcTo(px,py+MINI_SIZE, px,py, radius);
  CX.arcTo(px,py, px+MINI_SIZE,py, radius);
  CX.closePath();
  CX.clip();

  // Dark bg tint
  CX.fillStyle = 'rgba(4,6,18,0.82)';
  CX.fillRect(px, py, MINI_SIZE, MINI_SIZE);

  // Blit mini canvas
  CX.globalAlpha = previewAlpha;
  CX.drawImage(mc, px, py);
  CX.globalAlpha = 1;
  CX.restore();

  // Thin border (manual roundRect for Safari compat)
  CX.save();
  CX.beginPath();
  CX.moveTo(px+radius, py);
  CX.arcTo(px+MINI_SIZE,py, px+MINI_SIZE,py+MINI_SIZE, radius);
  CX.arcTo(px+MINI_SIZE,py+MINI_SIZE, px,py+MINI_SIZE, radius);
  CX.arcTo(px,py+MINI_SIZE, px,py, radius);
  CX.arcTo(px,py, px+MINI_SIZE,py, radius);
  CX.closePath();
  CX.strokeStyle = `hsla(${concept.hue},60%,70%,${previewAlpha * 0.35})`;
  CX.lineWidth = 0.8;
  CX.stroke();
  CX.restore();
}

let previewAlpha = 0; // fades in/out smoothly

// ─────────────────────────────────────────────
// SIM BUILDER — returns a draw() closure
// ─────────────────────────────────────────────
function buildSim(id, canvas, ctx) {
  const W = canvas.width, H = canvas.height;
  let t = 0;

  if (id === 'mathematics') {
    let zoom = 0.0028, panX = -0.5, panY = 0, MAXITER = 72;
    // Floating digits layered over fractal
    const nums = Array.from({length:55}, () => ({
      x: rand(0,W), y: rand(0,H), r: rand(11,26),
      angle: rand(0,Math.PI*2), speed: rand(0.002,0.007), num: Math.floor(rand(0,10))
    }));
    return function() {
      t++;
      // Mandelbrot base
      const z = zoom * (1 + 0.035 * Math.sin(t * 0.006));
      const id2 = ctx.createImageData(W, H);
      const d = id2.data;
      for (let px=0;px<W;px+=2) { for (let py=0;py<H;py+=2) {
        const x0=(px-W/2)*z+panX, y0=(py-H/2)*z+panY;
        let rx=0,ry=0,iter=0;
        while(rx*rx+ry*ry<=4&&iter<MAXITER){const xn=rx*rx-ry*ry+x0;ry=2*rx*ry+y0;rx=xn;iter++;}
        let r=0,g=0,b=0;

      A.vx+=(dx/dist)*gf;A.vy+=(dy/dist)*gf;B.vx-=(dx/dist)*gf;B.vy-=(dy/dist)*gf;
      for(const b of bodies){const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);if(spd>1.6){b.vx=(b.vx/spd)*1.6;b.vy=(b.vy/spd)*1.6;}b.x+=b.vx;b.y+=b.vy;b.x=Math.max(55,Math.min(W-55,b.x));b.y=Math.max(55,Math.min(H-55,b.y));b.trail.push({x:b.x,y:b.y});if(b.trail.length>90)b.trail.shift();}
      for(const b of bodies){if(b.trail.length<2)continue;ctx.beginPath();for(let i=0;i<b.trail.length;i++){i===0?ctx.moveTo(b.trail[i].x,b.trail[i].y):ctx.lineTo(b.trail[i].x,b.trail[i].y);}ctx.strokeStyle=`hsla(${b.hue},75%,65%,0.11)`;ctx.lineWidth=1.5;ctx.stroke();}
      const mx=(A.x+B.x)/2,my=(A.y+B.y)/2;
      const th=ctx.createLinearGradient(A.x,A.y,B.x,B.y);th.addColorStop(0,`hsla(${A.hue},80%,70%,0.38)`);th.addColorStop(0.5,'rgba(255,230,240,0.52)');th.addColorStop(1,`hsla(${B.hue},80%,70%,0.38)`);
      ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.quadraticCurveTo(mx,my-dist*0.14,B.x,B.y);ctx.strokeStyle=th;ctx.lineWidth=1;ctx.stroke();
      if(dist<130){const ra=(1-dist/130)*0.42;ctx.beginPath();ctx.arc(mx,my,dist*0.5,0,Math.PI*2);ctx.strokeStyle=`rgba(255,200,220,${ra})`;ctx.lineWidth=1;ctx.stroke();}
      for(const p of resonance){const pmx=mx-p.x,pmy=my-p.y,pd=Math.sqrt(pmx*pmx+pmy*pmy);p.vx+=(pmx/pd)*0.016;p.vy+=(pmy/pd)*0.016;const s2=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(s2>0.7){p.vx=(p.vx/s2)*0.7;p.vy=(p.vy/s2)*0.7;}p.x+=p.vx;p.y+=p.vy;ctx.beginPath();ctx.arc(p.x,p.y,1.2,0,Math.PI*2);ctx.fillStyle=`hsla(${p.hue},80%,75%,${p.alpha*0.42})`;ctx.fill();}
      for(const b of bodies){for(const m of b.moons){m.a+=m.spd;const mx2=b.x+Math.cos(m.a)*m.r,my2=b.y+Math.sin(m.a)*m.r;ctx.beginPath();ctx.arc(mx2,my2,m.sz,0,Math.PI*2);ctx.fillStyle=`hsla(${b.hue},60%,75%,0.7)`;ctx.fill();}}
      for(const b of bodies){const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.mass*4.5);g.addColorStop(0,`hsla(${b.hue},90%,92%,1)`);g.addColorStop(0.4,`hsla(${b.hue},80%,65%,0.8)`);g.addColorStop(1,`hsla(${b.hue},70%,50%,0)`);ctx.beginPath();ctx.arc(b.x,b.y,b.mass*4,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
    };
  }

  // Fallback
  return function() {
    ctx.fillStyle='rgba(2,3,8,0.5)'; ctx.fillRect(0,0,W,H);
  };
}

// ═══════════════════════════════════════════════════════
// PAGE TRANSITIONS
// ═══════════════════════════════════════════════════════
const UI=['starfield','void-nebula','void-uu','void-header','void-nav','btn-life'];
const LD=document.getElementById('life-dimension');

document.getElementById('btn-life').addEventListener('click', () => {
  isWarping = true;
  setTimeout(() => {
    UI.forEach(id => document.getElementById(id).classList.add('fade-out'));
    LD.classList.add('active');
    initConstellation();
    cancelAnimationFrame(constellationRAF);
    drawConstellation();
  }, 1200);
});

document.getElementById('btn-return').addEventListener('click', () => {
  // Close focus simulation if open
  focusLayer.classList.remove('open');
  setTimeout(stopFocus, 1200);
  // Leave life dimension
  LD.classList.remove('active');
  // Stop constellation loop (life page only)
  cancelAnimationFrame(constellationRAF);
  constellationRAF = null;
  // Restore void UI and repopulate stars
  UI.forEach(id => document.getElementById(id).classList.remove('fade-out'));
  isWarping = false;
  initStars();
});

window.addEventListener('resize', () => {
  vResize();
  if (LD.classList.contains('active')) {
    initConstellation();
    if (focusLayer.classList.contains('open')) {
      focusCanvas.width = window.innerWidth;
      focusCanvas.height = window.innerHeight;
    }
  }
});

// Start void simulation
vResize();
initStars();
vLoop();

</script>
