<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJChapa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #04060f;
      min-height: 100vh;
      font-family: 'DM Mono', monospace;
      color: #e8eaf0;
      cursor: crosshair;
      overflow-x: hidden;
    }

    #starfield {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .nebula {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 15% 70%, rgba(20,40,110,0.2) 0%, transparent 65%),
        radial-gradient(ellipse 50% 60% at 85% 25%, rgba(8,20,80,0.25) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 50% 90%, rgba(15,35,95,0.15) 0%, transparent 60%);
    }

    /* ── PAGE ── */
    .page {
      position: relative;
      z-index: 10;
    }

    /* ── HERO ── */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 3rem 2rem;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.8rem, 5vw, 4rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #f0f2f8;
      text-align: center;
      opacity: 0;
      animation: fadeDown 1.4s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
    }

    .name::after {
      content: '';
      display: block;
      width: 50%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(74,127,193,0.5), transparent);
      margin: 0.4rem auto 0;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.8rem 2rem;
      opacity: 0;
      animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: #6b7499;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 0.3s ease;
      position: relative;
    }
    .link-item:hover { color: #c8ccdd; }
    .link-item svg { width: 13px; height: 13px; flex-shrink: 0; opacity: 0.5; transition: opacity 0.3s ease; }
    .link-item:hover svg { opacity: 1; }
    .link-item::after {
      content: ''; position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 1px;
      background: rgba(74,127,193,0.6);
      transition: width 0.3s ease;
    }
    .link-item:hover::after { width: 100%; }
    .link-divider { width: 1px; height: 10px; background: #1e2240; }

    /* ── PORTFOLIO SECTION ── */
    .portfolio {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem;
      gap: 3rem;
    }

    .portfolio-label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #2e3558;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      max-width: 700px;
      width: 100%;
    }

    .card {
      position: relative;
      width: 120px;
      height: 140px;
      border: 1px solid #0e1228;
      background: rgba(8, 11, 28, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      cursor: pointer;
      transition: border-color 0.3s ease, transform 0.3s ease, background 0.3s ease;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(74,127,193,0.08) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover {
      border-color: rgba(74,127,193,0.35);
      transform: translateY(-4px);
      background: rgba(10, 14, 35, 0.85);
    }

    .card:hover::before { opacity: 1; }

    .card-ticker {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: #c8ccdd;
      transition: color 0.3s ease;
    }

    .card:hover .card-ticker { color: #fff; }

    .card-name {
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      color: #3a4060;
      text-transform: uppercase;
      text-align: center;
      padding: 0 0.5rem;
      transition: color 0.3s ease;
    }

    .card:hover .card-name { color: #6b7499; }

    /* hover info panel */
    .card-info {
      position: absolute;
      inset: 0;
      background: rgba(6, 9, 24, 0.95);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.8rem;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }

    .card:hover .card-info {
      opacity: 1;
      transform: translateY(0);
    }

    .info-ticker {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: #9aafd4;
    }

    .info-price {
      font-size: 1rem;
      color: #e8eaf0;
      letter-spacing: 0.05em;
    }

    .info-change {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      padding: 0.15rem 0.5rem;
      border-radius: 2px;
    }

    .info-change.up {
      color: #4ec994;
      background: rgba(78,201,148,0.08);
    }

    .info-change.down {
      color: #e05c6a;
      background: rgba(224,92,106,0.08);
    }

    .info-status {
      font-size: 0.48rem;
      letter-spacing: 0.12em;
      color: #2e3558;
      text-transform: uppercase;
    }

    /* loading shimmer */
    .shimmer {
      width: 60px; height: 8px;
      background: linear-gradient(90deg, #0e1228 25%, #1a2040 50%, #0e1228 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 2px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 480px) {
      .link-divider { display: none; }
      .card { width: 100px; height: 120px; }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="starfield"></canvas>
  <div class="nebula"></div>

  <div class="page">

    <!-- HERO -->
    <section class="hero">
      <h1 class="name">AJChapa</h1>
      <nav class="links">
        <a class="link-item" href="https://www.linkedin.com/in/aj-chapagain" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          LinkedIn
        </a>
        <div class="link-divider"></div>
        <a class="link-item" href="https://www.instagram.com/aapplejuce/" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
          Instagram

        <div class="link-divider"></div>
        <a class="link-item" href="https://steamcommunity.com/profiles/76561198343184351/" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.979 0C5.678 0 .511 4.86.022 11.037l6.432 2.658c.545-.371 1.203-.59 1.912-.59.063 0 .125.004.188.006l2.861-4.142V8.91c0-2.495 2.028-4.524 4.524-4.524 2.494 0 4.524 2.031 4.524 4.527s-2.03 4.525-4.524 4.525h-.105l-4.076 2.911c0 .052.004.105.004.159 0 1.875-1.515 3.396-3.39 3.396-1.635 0-3.016-1.173-3.331-2.727L.436 15.27C1.862 20.307 6.486 24 11.979 24c6.627 0 11.999-5.373 11.999-12S18.605 0 11.979 0zM7.54 18.21l-1.473-.61c.262.543.714.999 1.314 1.25 1.297.539 2.793-.076 3.332-1.375.263-.63.264-1.319.005-1.949s-.75-1.121-1.377-1.383c-.624-.26-1.29-.249-1.878-.03l1.523.63c.956.4 1.409 1.5 1.009 2.455-.397.957-1.497 1.41-2.454 1.012H7.54zm11.415-9.303c0-1.662-1.353-3.015-3.015-3.015-1.665 0-3.015 1.353-3.015 3.015 0 1.665 1.35 3.015 3.015 3.015 1.663 0 3.015-1.35 3.015-3.015zm-5.273.012c0-1.252 1.013-2.266 2.265-2.266 1.249 0 2.266 1.014 2.266 2.266 0 1.251-1.017 2.265-2.266 2.265-1.253 0-2.265-1.014-2.265-2.265z"/></svg>
          Steam
        </a>
      </nav>
    </section>

    <!-- PORTFOLIO -->
    <section class="portfolio">
      <p class="portfolio-label">Positions</p>
      <div class="cards" id="cards"></div>
    </section>

  </div>

  <script>
    // ── STARFIELD ──
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let W, H, stars = [], shootingStars = [], flashes = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function rand(a, b) { return a + Math.random() * (b - a); }

    // Draw a 4-point star shape
    function drawStar(ctx, x, y, r, color) {
      const spikes = 4;
      const inner = r * 0.38;
      ctx.beginPath();
      for (let i = 0; i < spikes * 2; i++) {
        const radius = i % 2 === 0 ? r : inner;
        const angle = (i * Math.PI) / spikes - Math.PI / 2;
        const px = x + Math.cos(angle) * radius;
        const py = y + Math.sin(angle) * radius;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    function createStar() {
      return {
        x: rand(0, W), y: rand(0, H),
        r: rand(0.6, 2.2),
        opacity: rand(0.1, 0.85),
        twinkleSpeed: rand(0.008, 0.025),
        twinkleOffset: rand(0, Math.PI * 2),
        rotation: rand(0, Math.PI),
        rotSpeed: rand(-0.005, 0.005),
        vx: rand(-0.15, 0.15),
        vy: rand(-0.08, 0.08),
        hue: Math.random() > 0.8 ? rand(30, 55) : rand(195, 235),
        fourPoint: Math.random() > 0.4,
      };
    }

    function initStars() { stars = Array.from({ length: 300 }, createStar); }

    function createShootingStar() {
      const angle = rand(15, 45) * Math.PI / 180;
      const speed = rand(14, 24);
      return {
        x: rand(0, W * 0.7), y: rand(0, H * 0.4),
        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        len: rand(90, 220), alpha: 1,
        fade: rand(0.012, 0.022),
        width: rand(1, 2.2),
        hue: rand(195, 230),
      };
    }

    function checkCollisions() {
      for (let i = 0; i < stars.length; i++) {
        for (let j = i + 1; j < stars.length; j++) {
          const dx = stars[i].x - stars[j].x;
          const dy = stars[i].y - stars[j].y;
          if (Math.sqrt(dx*dx + dy*dy) < 3) {
            const tmp = { vx: stars[i].vx, vy: stars[i].vy };
            stars[i].vx = stars[j].vx; stars[i].vy = stars[j].vy;
            stars[j].vx = tmp.vx; stars[j].vy = tmp.vy;
            flashes.push({ x: (stars[i].x+stars[j].x)/2, y: (stars[i].y+stars[j].y)/2, alpha: 0.9, r: rand(2,5) });
          }
        }
      }
    }

    let frame = 0, nextShoot = rand(60, 180);
    function loop() {
      ctx.clearRect(0, 0, W, H);
      frame++;

      // shooting stars
      if (frame >= nextShoot) { shootingStars.push(createShootingStar()); nextShoot = frame + rand(80, 220); }
      shootingStars = shootingStars.filter(s => s.alpha > 0);
      for (let s of shootingStars) {
        ctx.save();
        const g = ctx.createLinearGradient(s.x, s.y, s.x - s.vx*(s.len/15), s.y - s.vy*(s.len/15));
        g.addColorStop(0, `hsla(${s.hue},80%,97%,${s.alpha})`);
        g.addColorStop(1, `hsla(${s.hue},80%,97%,0)`);
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x - s.vx*(s.len/15), s.y - s.vy*(s.len/15));
        ctx.strokeStyle = g; ctx.lineWidth = s.width; ctx.lineCap = 'round'; ctx.stroke();
        ctx.restore();
        s.x += s.vx; s.y += s.vy; s.alpha -= s.fade;
      }

      // collision flashes
      flashes = flashes.filter(f => f.alpha > 0);
      for (let f of flashes) {
        ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(180,210,255,${f.alpha})`; ctx.fill();
        f.alpha -= 0.07; f.r += 0.3;
      }

      // stars
      for (let s of stars) {
        const twinkle = Math.sin(frame * s.twinkleSpeed + s.twinkleOffset);
        const alpha = Math.max(0.04, s.opacity + twinkle * 0.38);
        s.x += s.vx; s.y += s.vy;
        s.rotation += s.rotSpeed;
        if (s.x < -4) s.x = W+4; if (s.x > W+4) s.x = -4;
        if (s.y < -4) s.y = H+4; if (s.y > H+4) s.y = -4;

        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.rotate(s.rotation);

        if (s.fourPoint) {
          // 4-point star
          const spikes = 4;
          const inner = s.r * 0.35;
          ctx.beginPath();
          for (let i = 0; i < spikes * 2; i++) {
            const radius = i % 2 === 0 ? s.r : inner;
            const angle = (i * Math.PI) / spikes - Math.PI / 4;
            i === 0 ? ctx.moveTo(Math.cos(angle)*radius, Math.sin(angle)*radius)
                    : ctx.lineTo(Math.cos(angle)*radius, Math.sin(angle)*radius);
          }
          ctx.closePath();
          ctx.fillStyle = `hsla(${s.hue},60%,92%,${alpha})`;
          ctx.fill();
          // cross glow lines
          if (s.r > 1.4 && alpha > 0.5) {
            ctx.strokeStyle = `hsla(${s.hue},70%,95%,${alpha*0.5})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath(); ctx.moveTo(0, -s.r*2.5); ctx.lineTo(0, s.r*2.5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-s.r*2.5, 0); ctx.lineTo(s.r*2.5, 0); ctx.stroke();
          }
        } else {
          // simple circle for smaller/dimmer ones
          ctx.beginPath();
          ctx.arc(0, 0, s.r * 0.6, 0, Math.PI*2);
          ctx.fillStyle = `hsla(${s.hue},55%,92%,${alpha})`;
          ctx.fill();
        }

        // glow
        if (s.r > 1.2 && alpha > 0.45) {
          ctx.beginPath();
          ctx.arc(0, 0, s.r * 4, 0, Math.PI*2);
          ctx.fillStyle = `hsla(${s.hue},70%,85%,${alpha*0.06})`;
          ctx.fill();
        }

        ctx.restore();
      }

      if (frame % 3 === 0) checkCollisions();
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => { resize(); initStars(); });
    resize(); initStars(); loop();

    // ── PORTFOLIO CARDS ──
    const tickers = [
      { symbol: 'NVDA',  name: 'Nvidia' },
      { symbol: 'META',  name: 'Meta' },
      { symbol: 'NVO',   name: 'Novo Nordisk' },
      { symbol: 'INTC',  name: 'Intel' },
      { symbol: 'SOFI',  name: 'SoFi' },
    ];

    const container = document.getElementById('cards');

    tickers.forEach(t => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <span class="card-ticker">${t.symbol}</span>
        <span class="card-name">${t.name}</span>
        <div class="card-info">
          <span class="info-ticker">${t.symbol}</span>
          <span class="info-price shimmer" id="price-${t.symbol}"></span>
          <span class="info-change" id="change-${t.symbol}"></span>
          <span class="info-status">live data</span>
        </div>
      `;
      container.appendChild(card);

      // fetch on hover
      let fetched = false;
      card.addEventListener('mouseenter', () => {
        if (fetched) return;
        fetched = true;
        fetchQuote(t.symbol);
      });
    });

    async function fetchQuote(symbol) {
      try {
        const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`);
        const data = await res.json();
        const meta = data.chart.result[0].meta;
        const price = meta.regularMarketPrice.toFixed(2);
        const prev  = meta.chartPreviousClose;
        const change = ((price - prev) / prev * 100).toFixed(2);
        const up = change >= 0;

        const priceEl  = document.getElementById(`price-${symbol}`);
        const changeEl = document.getElementById(`change-${symbol}`);

        priceEl.textContent = `$${price}`;
        priceEl.classList.remove('shimmer');

        changeEl.textContent = `${up ? '+' : ''}${change}%`;
        changeEl.classList.add(up ? 'up' : 'down');
      } catch {
        const priceEl = document.getElementById(`price-${symbol}`);
        priceEl.textContent = '—';
        priceEl.classList.remove('shimmer');
      }
    }
  </script>
</body>
