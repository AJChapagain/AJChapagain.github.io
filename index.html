<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJChapa</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    :root {
      --void: #020308;
      --red: #cc0000;
      --red-dim: #550000;
    }

    body {
      background: var(--void);
      font-family: 'DM Mono', monospace;
      color: #e8eaf0;
      cursor: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    @media(hover:none){
      body { cursor: auto; }
      #btn-enter, .link-item { cursor: pointer; }
    }

    /* ── CURSOR ── */
    #custom-cursor {
      position: fixed; width: 5px; height: 5px;
      border-radius: 50%; pointer-events: none; z-index: 999999;
      transform: translate(-50%,-50%);
      background: rgba(180,200,255,0.7);
      box-shadow: 0 0 8px rgba(100,160,255,0.5);
      transition: background 0.6s, box-shadow 0.6s;
    }


    /* ── GLOBAL FX ── */
    .fx-scan {
      position: fixed; inset: 0; pointer-events: none; z-index: 99998;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
    }
    .fx-vig {
      position: fixed; inset: 0; pointer-events: none; z-index: 99997;
      background: radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.88) 100%);
    }
    .fx-noise {
      position: fixed; inset: 0; opacity: 0.028; pointer-events: none; z-index: 99996;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 128px;
    }

    /* ════════════════════════════════
       STAGE A — AJCHAPA LANDING
    ════════════════════════════════ */
    #stage-landing {
      position: fixed; inset: 0; z-index: 10;
      opacity: 1; transition: opacity 1.8s ease;
    }
    #stage-landing.out { opacity: 0; pointer-events: none; }

    #starfield { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }
    .nebula {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 25% 70%, rgba(15,25,60,0.14) 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 80% 30%, rgba(10,15,45,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(20,25,40,0.1) 0%, transparent 70%);
      animation: pulseNeb 20s infinite alternate ease-in-out;
    }
    @keyframes pulseNeb { 0%{opacity:.8;transform:scale(1)} 100%{opacity:1;transform:scale(1.05)} }

    /* ENTER button — top left */
    #btn-enter {
      position: absolute; top: 2rem; left: 2rem; z-index: 20;
      font-family: 'Share Tech Mono', monospace; font-size: 0.82rem;
      letter-spacing: 0.55em; text-transform: lowercase;
      color: #ff3333;
      border: 1px solid #cc2222;
      padding: 13px 28px; cursor: none;
      background: rgba(180,0,0,0.06);
      opacity: 0;
      transition: color 0.25s, border-color 0.25s, background 0.25s,
                  box-shadow 0.25s, letter-spacing 0.25s, text-shadow 0.25s;
    }
    #btn-enter.fade-in {
      animation: btnFadeIn 1.4s ease forwards;
    }
    @keyframes btnFadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #btn-enter.loaded {
      opacity: 1;
      animation: enterGlow 2.4s ease-in-out infinite;
    }
    @keyframes enterGlow {
      0%   { color: #881111; border-color: #550000;
             box-shadow: 0 0 3px rgba(180,0,0,0.15);
             text-shadow: none; opacity: 0.6; }
      50%  { color: #ff5555; border-color: #ff2222;
             box-shadow: 0 0 18px rgba(255,40,40,0.75),
                         0 0 40px rgba(200,0,0,0.4),
                         inset 0 0 10px rgba(180,0,0,0.08);
             text-shadow: 0 0 14px rgba(255,60,60,0.95);
             opacity: 1; }
      100% { color: #881111; border-color: #550000;
             box-shadow: 0 0 3px rgba(180,0,0,0.15);
             text-shadow: none; opacity: 0.6; }
    }
    #btn-enter:hover {
      color: #ffffff !important;
      border-color: #ff3333 !important;
      background: rgba(200,0,0,0.15) !important;
      letter-spacing: 0.75em !important;
      text-shadow: 0 0 20px rgba(255,80,80,1), 0 0 40px rgba(220,0,0,0.5) !important;
      box-shadow: 0 0 35px rgba(255,30,30,0.55),
                  inset 0 0 16px rgba(200,0,0,0.1) !important;
      opacity: 1 !important;
      animation: none !important;
    }

    /* Site name */
    .top-header {
      position: absolute; top: 3rem; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; flex-direction: column; align-items: center; pointer-events: none;
    }
    .site-name {
      font-family: 'Cormorant Garamond', serif; font-weight: 300;
      font-size: clamp(1.5rem, 4vw, 2.5rem); letter-spacing: 0.28em;
      text-transform: uppercase; color: #eef0f8; text-align: center; white-space: nowrap;
      opacity: 0; animation: fadeDown 1.4s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
      text-shadow: 0 0 40px rgba(180,200,255,0.15);
    }
    .site-name::after {
      content:''; display:block; width:60%; height:1px;
      background: linear-gradient(90deg, transparent, rgba(74,127,193,0.4), transparent);
      margin: 0.5rem auto 0;
    }

    /* Bottom nav */
    .bottom-nav {
      position: absolute; bottom: 3.5rem; left: 0; width: 100%;
      z-index: 10; display: flex; align-items: center; justify-content: center; gap: 0 2rem;
      opacity: 0; animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
    }
    .link-item {
      display: flex; align-items: center; gap: 0.36rem; text-decoration: none; color: #8892b0;
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      transition: color 0.3s; position: relative; white-space: nowrap; cursor: none;
    }
    .link-item:hover { color: #e0e6ff; }
    .link-item svg { width: 12px; height: 12px; opacity: 0.7; transition: opacity 0.3s; }
    .link-item:hover svg { opacity: 0.9; }
    .link-item::after {
      content:''; position:absolute; bottom:-4px; left:0; width:0; height:1px;
      background: rgba(74,127,193,0.5); transition: width 0.3s;
    }
    .link-item:hover::after { width:100%; }
    .link-divider { width:1px; height:10px; background:#2a2f4a; }

    /* ════════════════════════════════
       STAGE B — CONNECTING SCREEN
    ════════════════════════════════ */
    #stage-connect {
      position: fixed; inset: 0; z-index: 50;
      background: #000; opacity: 0; pointer-events: none;
      display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
      padding: 10vw; transition: opacity 1s ease;
    }
    #stage-connect.in  { opacity: 1; pointer-events: all; }
    #stage-connect.out { opacity: 0; pointer-events: none; transition: opacity 1s ease; }

    #connect-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.68rem, 2.2vw, 0.9rem);
      color: var(--red); text-shadow: 0 0 8px var(--red-dim);
      line-height: 2.2; white-space: pre;
    }
    #connect-bar-wrap { margin-top: 28px; width: min(320px,70vw); height: 2px; background: #1a0000; }
    #connect-bar-fill { height: 100%; width: 0%; background: var(--red); box-shadow: 0 0 8px var(--red); transition: width 0.05s linear; }
    #connect-pct { margin-top: 10px; font-family: 'Share Tech Mono', monospace; font-size: 0.62rem; color: #440000; letter-spacing: 0.2em; }

    /* ════════════════════════════════
       STAGE C — PSYCH EXPERIENCE
    ════════════════════════════════ */
    #stage-psych {
      position: fixed; inset: 0; z-index: 60;
      opacity: 0; pointer-events: none; transition: opacity 1.8s ease;
    }
    #stage-psych.in  { opacity: 1; pointer-events: all; }
    #stage-psych.out { opacity: 0; pointer-events: none; transition: opacity 1.6s ease; }

    #psych-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }

    #line-display {
      position: absolute; left: 8vw; top: 50%; transform: translateY(-50%);
      z-index: 20; pointer-events: none; max-width: min(440px, 82vw);
    }
    #line-text {
      font-family: 'Share Tech Mono', monospace; font-size: clamp(0.95rem, 3.5vw, 1.2rem);
      color: #ff4444; text-shadow: 0 0 10px rgba(255,50,50,0.6);
      white-space: pre-wrap; opacity: 0; transition: opacity 0.4s ease; line-height: 1.7;
    }
    #line-text.show { opacity: 1; }
    #line-text.data  { color: #ffffff; text-shadow: 0 0 8px rgba(255,255,255,0.35); font-size: clamp(1rem,3.8vw,1.25rem); }
    #line-text.final { color: #ff4444; text-shadow: 0 0 14px rgba(255,60,60,0.8), 0 0 35px rgba(200,0,0,0.4); animation: breathe 5s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:0.35} }

    .cblink { display:inline-block; width:7px; height:0.85em; background:var(--red); margin-left:3px; vertical-align:middle; animation:cb 1.1s step-end infinite; }
    @keyframes cb { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ════════════════════════════════
       STAGE D — HARVEST
    ════════════════════════════════ */
    #stage-harvest {
      position: fixed; inset: 0; z-index: 70;
      background: #000; opacity: 0; pointer-events: none;
      display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
      padding: 8vw; transition: opacity 0.4s ease;
      font-family: 'Share Tech Mono', monospace;
    }
    #stage-harvest.in  { opacity: 1; pointer-events: all; }
    #stage-harvest.out { opacity: 0; pointer-events: none; transition: opacity 2s ease; }

    #h-lines { font-size: clamp(0.68rem,1.2vw,0.88rem); color: #cc4422; line-height: 2; max-width: 600px; white-space: pre; max-height: 45vh; overflow: hidden; }
    .hl { display:block; opacity:0; animation: hlin 0.12s ease forwards; }
    @keyframes hlin { to{opacity:1} }
    #h-bar-wrap { margin-top: 28px; width: min(400px,80vw); border: 1px solid #660000; height: 3px; }
    #h-bar-fill { height:100%; width:0%; background:var(--red); box-shadow:0 0 8px var(--red); transition:width 0.05s linear; }
    #h-pct-label { margin-top:10px; font-size:0.72rem; color:#cc4422; letter-spacing:0.15em; }
    #h-final { margin-top:36px; font-size:clamp(0.82rem,2.8vw,1.05rem); color:#ff4444; text-shadow:0 0 12px rgba(255,60,60,0.7); opacity:0; line-height:2.2; transition:opacity 1.2s ease; max-width:540px; white-space:pre-wrap; }

    /* Full-screen glitch flash */
    #glitch-screen {
      position: fixed; inset: 0; z-index: 9000; pointer-events: none;
      opacity: 0; background: #fff;
      mix-blend-mode: screen;
    }
    #glitch-screen.flash { animation: gFlash 1.4s steps(1) forwards; }
    @keyframes gFlash {
      0%   { opacity:0; background:#000; }
      5%   { opacity:1; background:#ff0000; transform:translate(-6px,3px); }
      10%  { opacity:1; background:#00ffff; transform:translate(6px,-3px); }
      15%  { opacity:0; }
      20%  { opacity:1; background:#ff0000; transform:translate(8px,2px) skewX(3deg); }
      25%  { opacity:1; background:#ffffff; transform:translate(-4px,-4px); }
      30%  { opacity:0; }
      40%  { opacity:1; background:#0000ff; transform:translate(5px,5px) skewX(-2deg); }
      45%  { opacity:0; transform:none; }
      55%  { opacity:1; background:#ff0044; transform:translate(-3px,6px); }
      60%  { opacity:0; }
      70%  { opacity:1; background:#ff0000; transform:translate(4px,-4px) skewX(1deg); }
      80%  { opacity:0; }
      90%  { opacity:1; background:#ff0000; transform:translate(-2px,2px); }
      100% { opacity:0; transform:none; }
    }
    #h-final.show { opacity:1; }

    .glitch-fx { animation: gfx 0.08s steps(1) infinite; }
    @keyframes gfx {
      0%,100%{filter:none;transform:none}
      20%{filter:hue-rotate(90deg) saturate(3) brightness(1.4);transform:translate(-3px,1px)}
      40%{filter:none;transform:translate(4px,-2px)}
      60%{filter:hue-rotate(-90deg) saturate(2);transform:translate(-2px,3px)}
      80%{filter:none;transform:translate(2px,-1px)}
    }

    /* ════════════════════════════════
       STAGE E — CINEMATIC
    ════════════════════════════════ */
    #stage-epic {
      position: fixed; inset: 0; z-index: 80;
      opacity: 0; pointer-events: none; background: #000; overflow: hidden;
      transition: opacity 1.5s ease;
    }
    #stage-epic.in  { opacity: 1; pointer-events: all; }
    #stage-epic.out { opacity: 0; pointer-events: none; transition: opacity 2.5s ease; }

    #canvas-container { position:absolute; inset:0; z-index:1; }
    .e-scan { position:absolute;inset:0;background:linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,0.18) 50%);background-size:100% 4px;z-index:10;pointer-events:none;opacity:0.25; }
    .e-vig  { position:absolute;inset:0;background:radial-gradient(circle,rgba(0,0,0,0) 30%,rgba(0,0,0,0.97) 100%);z-index:9;pointer-events:none; }
    .e-grain { position:absolute;inset:0;z-index:11;pointer-events:none;opacity:0.04;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size:200px;animation:gshift .4s steps(1) infinite; }
    @keyframes gshift{0%{background-position:0 0}25%{background-position:-50px -50px}50%{background-position:30px -20px}75%{background-position:-20px 40px}}
    .shockwave-el { position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;border:2px solid rgba(255,255,255,.8);transform:translate(-50%,-50%);z-index:15;pointer-events:none;opacity:0; }

    #narrative-container { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;text-align:center;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;width:90%;max-width:1000px;gap:.8rem; }
    .chapter-number { font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.5em;color:rgba(180,200,255,.5);text-transform:uppercase;opacity:0;margin-bottom:.4rem; }
    .story-title    { font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,8vw,5.5rem);font-weight:300;letter-spacing:.2em;color:#fff;text-transform:uppercase;text-shadow:0 0 60px rgba(255,255,255,.4),0 0 120px rgba(100,200,255,.2);line-height:1;opacity:0; }
    .story-divider  { width:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);opacity:0; }
    .story-subtitle { font-family:'DM Mono',monospace;font-size:clamp(.6rem,1.8vw,.9rem);font-weight:300;letter-spacing:.4em;color:rgba(180,210,255,.65);text-transform:uppercase;opacity:0;max-width:600px;line-height:1.7; }
    .story-year     { font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.9rem,2.5vw,1.5rem);color:rgba(200,170,110,.7);opacity:0;letter-spacing:.1em; }

    #epic-progress  { position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);z-index:20;width:200px;display:flex;flex-direction:column;align-items:center;gap:.5rem;opacity:0; }
    #epic-prog-track{ width:100%;height:1px;background:rgba(255,255,255,.1); }
    #epic-prog-fill { height:100%;background:linear-gradient(90deg,rgba(74,127,193,.8),rgba(255,255,255,.9));width:0%;box-shadow:0 0 8px rgba(74,127,193,.6); }
    #epic-prog-label{ font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.3em;color:rgba(255,255,255,.25);text-transform:uppercase; }
    #skip-btn       { position:absolute;bottom:2rem;right:2rem;z-index:25;font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.2);cursor:pointer;border:1px solid rgba(255,255,255,.1);padding:.5rem 1rem;background:transparent;transition:all .3s ease;opacity:0; }
    #skip-btn:hover { color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.3); }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-15px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(15px)}  to{opacity:1;transform:translateY(0)} }
    @keyframes fadeInEl { to{opacity:1} }

    /* ═══════════════════════
       MOBILE — up to 768px
    ═══════════════════════ */
    @media(max-width:768px){

      /* Hide desktop cursor on touch */
      #custom-cursor { display: none; }

      /* Landing */
      .site-name {
        font-size: 1.5rem;
        letter-spacing: 0.18em;
        top: 2.5rem;
      }
      .top-header { top: 2.2rem; }

      /* Enter button — smaller, tighter */
      #btn-enter {
        top: 1.4rem; left: 1.4rem;
        font-size: 0.62rem;
        letter-spacing: 0.35em;
        padding: 9px 18px;
      }

      /* Nav links — stack tighter */
      .bottom-nav {
        bottom: 2rem;
        gap: 0 1.2rem;
        flex-wrap: wrap;
        justify-content: center;
        padding: 0 1rem;
      }
      .link-item { font-size: 0.58rem; letter-spacing: 0.12em; gap: 0.28rem; }
      .link-item svg { width: 10px; height: 10px; }
      .link-divider { display: none; }

      /* Connecting screen */
      #stage-connect { padding: 8vw 7vw; }
      #connect-text { font-size: 0.68rem; }
      #connect-bar-wrap { width: 80vw; margin-top: 20px; }
      #connect-pct { font-size: 0.58rem; }

      /* Psych text */
      #line-display {
        left: 6vw;
        right: 6vw;
        max-width: 100%;
        top: 45%;
      }
      #line-text { font-size: 1rem !important; }

      /* Harvest */
      #stage-harvest { padding: 7vw 6vw; justify-content: center; }
      #h-lines {
        font-size: 0.6rem !important;
        max-height: 38vh;
        max-width: 100%;
        white-space: pre-wrap;
        word-break: break-all;
      }
      #h-bar-wrap { width: 86vw; margin-top: 20px; }
      #h-pct-label { font-size: 0.6rem; }
      #h-final { font-size: 0.82rem !important; margin-top: 24px; }

      /* Skip button off on mobile */
      #skip-btn { display: none; }

      /* Epic progress */
      #epic-progress { width: 140px; bottom: 1.5rem; }
      .chapter-number { font-size: 0.55rem; }
      .story-title { font-size: clamp(1.6rem,10vw,3.5rem); letter-spacing: 0.12em; }
      .story-subtitle { font-size: 0.58rem; letter-spacing: 0.25em; padding: 0 1rem; }
      .story-year { font-size: 0.85rem; }
    }

    /* Extra small phones */
    @media(max-width:390px){
      .site-name { font-size: 1.2rem; letter-spacing: 0.12em; }
      #btn-enter { font-size: 0.56rem; padding: 8px 14px; letter-spacing: 0.28em; }
      .link-item { font-size: 0.5rem; }
      #line-text { font-size: 0.9rem !important; }
    }
  </style>
</head>
<body>

<div id="custom-cursor"></div>
<div class="fx-scan"></div>
<div class="fx-vig"></div>
<div class="fx-noise"></div>

<!-- ══ A: LANDING ══ -->
<div id="stage-landing">
  <canvas id="starfield"></canvas>
  <div class="nebula"></div>

  <button id="btn-enter">enter</button>

  <header class="top-header">
    <h1 class="site-name">AJChapa</h1>
  </header>

  <nav class="bottom-nav">
    <a class="link-item" href="https://www.linkedin.com/in/aj-chapagain" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      LinkedIn
    </a>

<script>
// ═══════════════════════════════════════════════════════════
// UTILS

function rand(a,b){return a+Math.random()*(b-a);}
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const isMobile = window.innerWidth < 768;

// ═══════════════════════════════════════════════════════════
// DATA COLLECTION
// ═══════════════════════════════════════════════════════════
function collectData(){
  const now=new Date(), h=now.getHours();
  const rawHour=h%12||12, mins=String(now.getMinutes()).padStart(2,'0'), ampm=h<12?'am':'pm';
  const timeStr=`${rawHour}:${mins} ${ampm}`;
  const timeOfDay=h<5?"the middle of the night":h<12?"the morning":h<17?"the afternoon":h<21?"the evening":"late at night";
  const sw=window.screen.width,sh=window.screen.height,dpr=window.devicePixelRatio||1;
  const isPhone=sw<=430||(dpr>=2&&sh>sw&&sw<=932);
  const deviceWord=isPhone?"your phone":"your computer";
  const ua=navigator.userAgent;
  let os=null;
  if(/Windows/.test(ua)&&!/iPhone|iPad/.test(ua))      os="Windows laptop";
  else if(/Mac OS X/.test(ua)&&!/iPhone|iPad/.test(ua)) os="MacBook";
  else if(/Android/.test(ua))                            os="Android";
  else if(/iPhone|iPad/.test(ua))                        os="iPhone";
  else if(/Linux/.test(ua))                              os="Linux";
  const bp=navigator.getBattery
    ? navigator.getBattery().then(b=>{const p=Math.round(b.level*100);return b.charging?`${p}% — charging`:`${p}%`;}).catch(()=>null)
    : Promise.resolve(null);
  return bp.then(battery=>({timeStr,timeOfDay,deviceWord,os,battery}));
}

// ═══════════════════════════════════════════════════════════
// A — STARFIELD (landing)
// ═══════════════════════════════════════════════════════════
const vCv=document.getElementById('starfield'), vCtx=vCv.getContext('2d');
let vW,vH,vStars=[],vShoot=[],vDust=[];
const BH={rx:.5,ry:.5}; let bhX,bhY;
const BH_R=22; let vWarp=false, vActive=true, vRAF;
const SCOLS=[{h:220,s:80,l:88},{h:200,s:40,l:96},{h:55,s:20,l:95},{h:30,s:65,l:82},{h:10,s:75,l:77}];

function vResize(){
  vW=vCv.width=window.innerWidth; vH=vCv.height=window.innerHeight;
  bhX=vW*BH.rx; bhY=vH*BH.ry;
}
function spawnStar(){
  const e=Math.floor(rand(0,4));let x,y;
  if(e===0){x=rand(0,vW);y=-20;}else if(e===1){x=vW+20;y=rand(0,vH);}
  else if(e===2){x=rand(0,vW);y=vH+20;}else{x=-20;y=rand(0,vH);}
  const c=SCOLS[Math.floor(Math.random()*SCOLS.length)], ib=Math.random()>.84;
  return{x,y,vx:0,vy:0,r:ib?rand(.8,1.4):rand(.3,.7),baseOpacity:ib?rand(.5,.9):rand(.1,.4),
    twinkleSpeed:rand(.002,.01),twinkleOffset:rand(0,Math.PI*2),h:c.h,s:c.s,l:c.l,trail:[],isBright:ib};
}
function initStars(){
  vStars=[];vShoot=[];vDust=[];
  for(let i=0;i<500;i++){const s=spawnStar();s.x=rand(0,vW);s.y=rand(0,vH);vStars.push(s);}
}
function drawBH(){
  const l=vCtx.createRadialGradient(bhX,bhY,BH_R,bhX,bhY,BH_R*8);
  l.addColorStop(0,'rgba(0,0,0,.97)');l.addColorStop(.3,'rgba(3,5,12,.5)');l.addColorStop(1,'rgba(0,0,0,0)');
  vCtx.beginPath();vCtx.arc(bhX,bhY,BH_R*8,0,Math.PI*2);vCtx.fillStyle=l;vCtx.fill();
  vCtx.beginPath();vCtx.arc(bhX,bhY,BH_R,0,Math.PI*2);vCtx.fillStyle='#000';vCtx.fill();
  const pr=vCtx.createLinearGradient(bhX-BH_R,bhY-BH_R,bhX+BH_R,bhY+BH_R);
  pr.addColorStop(0,'rgba(255,230,200,.55)');pr.addColorStop(.5,'rgba(200,150,100,.12)');pr.addColorStop(1,'rgba(255,230,200,.04)');
  vCtx.beginPath();vCtx.arc(bhX,bhY,BH_R+.5,0,Math.PI*2);vCtx.strokeStyle=pr;vCtx.lineWidth=1.2;vCtx.stroke();
}
const MT=[{h:15,s:90,l:70,w:[1.2,2],len:[100,220]},{h:195,s:80,l:85,w:[1,1.8],len:[120,250]},{h:210,s:20,l:96,w:[.8,1.5],len:[80,150]}];
function mkShoot(){
  const t=MT[Math.floor(Math.random()*MT.length)],ss=Math.floor(rand(0,4));
  let sx,sy,tx,ty;
  if(ss===0){sx=rand(0,vW);sy=-20;tx=rand(0,vW);ty=vH+20;}
  else if(ss===1){sx=vW+20;sy=rand(0,vH);tx=-20;ty=rand(0,vH);}
  else if(ss===2){sx=rand(0,vW);sy=vH+20;tx=rand(0,vW);ty=-20;}
  else{sx=-20;sy=rand(0,vH);tx=vW+20;ty=rand(0,vH);}
  const ang=Math.atan2(ty-sy,tx-sx),spd=rand(28,50);
  return{x:sx,y:sy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,len:rand(t.len[0],t.len[1]),alpha:1,fade:rand(.015,.03),width:rand(t.w[0],t.w[1]),h:t.h,s:t.s,l:t.l};
}
let vFr=0,vNextS=rand(20,80);
function vLoop(){
  if(!vActive){vRAF=requestAnimationFrame(vLoop);return;}
  vCtx.clearRect(0,0,vW,vH);vFr++;drawBH();
  if(vFr>=vNextS&&!vWarp){vShoot.push(mkShoot());if(Math.random()<.4)vShoot.push(mkShoot());vNextS=vFr+rand(30,100);}
  vShoot=vShoot.filter(s=>s.alpha>0&&s.x>-500&&s.x<vW+500&&s.y>-500&&s.y<vH+500);
  for(const s of vShoot){
    vCtx.save();
    const tx2=s.x-s.vx*(s.len/20),ty2=s.y-s.vy*(s.len/20);
    const g=vCtx.createLinearGradient(s.x,s.y,tx2,ty2);
    g.addColorStop(0,`hsla(0,0%,100%,${s.alpha})`);g.addColorStop(.1,`hsla(${s.h},${s.s}%,${s.l}%,${s.alpha*.9})`);g.addColorStop(1,`hsla(${s.h},${s.s}%,${s.l}%,0)`);
    vCtx.beginPath();vCtx.moveTo(s.x,s.y);vCtx.lineTo(tx2,ty2);vCtx.strokeStyle=g;vCtx.lineWidth=s.width;vCtx.lineCap='round';vCtx.stroke();
    if(Math.random()>.3)vDust.push({x:s.x,y:s.y,vx:s.vx*.05+rand(-1,1),vy:s.vy*.05+rand(-1,1),alpha:s.alpha*.8,decay:rand(.02,.06),size:rand(.5,2),h:s.h,s:s.s,l:s.l});
    vCtx.restore();
    const dx=bhX-s.x,dy=bhY-s.y,dist=Math.sqrt(dx*dx+dy*dy);
    vWarp?(s.vx-=(dx/dist)*8,s.vy-=(dy/dist)*8):(s.vx+=(dx/dist)*.5,s.vy+=(dy/dist)*.5);
    s.x+=s.vx;s.y+=s.vy;s.alpha-=s.fade;
  }
  vDust=vDust.filter(p=>p.alpha>0);
  for(const p of vDust){vCtx.beginPath();vCtx.arc(p.x,p.y,p.size,0,Math.PI*2);vCtx.fillStyle=`hsla(${p.h},${p.s}%,${p.l}%,${p.alpha})`;vCtx.fill();p.x+=p.vx;p.y+=p.vy;p.alpha-=p.decay;}
  for(let i=vStars.length-1;i>=0;i--){
    const s=vStars[i];const dx=bhX-s.x,dy=bhY-s.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<BH_R&&!vWarp){vStars[i]=spawnStar();continue;}
    if(vWarp){s.vx-=(dx/dist)*3.5;s.vy-=(dy/dist)*3.5;s.trail.push({x:s.x,y:s.y});if(s.trail.length>50)s.trail.shift();}
    else{
      const gp=.001+(150/(dist+50))*.015;s.vx+=(dx/dist)*gp;s.vy+=(dy/dist)*gp;
      const sp=Math.sqrt(s.vx*s.vx+s.vy*s.vy),ms=.2+(800/(dist+10))*2;
      if(sp>ms){s.vx=(s.vx/sp)*ms;s.vy=(s.vy/sp)*ms;}
      if(dist<300){s.trail.push({x:s.x,y:s.y});if(s.trail.length>20)s.trail.shift();}
      else if(s.trail.length)s.trail.shift();
    }
    const tw=Math.sin(vFr*s.twinkleSpeed+s.twinkleOffset),a=Math.max(.01,s.baseOpacity+tw*s.baseOpacity*.4);
    s.x+=s.vx;s.y+=s.vy;
    if(s.trail.length>1){vCtx.save();for(let j=1;j<s.trail.length;j++){const ta=(j/s.trail.length)*.3;vCtx.beginPath();vCtx.moveTo(s.trail[j-1].x,s.trail[j-1].y);vCtx.lineTo(s.trail[j].x,s.trail[j].y);vCtx.strokeStyle=`hsla(${s.h},${s.s}%,${s.l}%,${ta})`;vCtx.lineWidth=s.r*.5;vCtx.lineCap='round';vCtx.stroke();}vCtx.restore();}
    vCtx.beginPath();vCtx.arc(s.x,s.y,s.r,0,Math.PI*2);vCtx.fillStyle=`hsla(${s.h},${s.s}%,${s.l}%,${a})`;vCtx.fill();
    if(s.isBright&&a>.4){const g=vCtx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4.5);g.addColorStop(0,`hsla(${s.h},${s.s}%,${s.l}%,${a*.35})`);g.addColorStop(1,`hsla(${s.h},${s.s}%,${s.l}%,0)`);vCtx.beginPath();vCtx.arc(s.x,s.y,s.r*4.5,0,Math.PI*2);vCtx.fillStyle=g;vCtx.fill();}
  }
  vRAF=requestAnimationFrame(vLoop);
}
window.addEventListener('resize',()=>{vResize();if(document.getElementById('stage-landing').style.display!=='none')initStars();});
vResize(); initStars(); vLoop();

// ═══════════════════════════════════════════════════════════
// B — CONNECTING SCREEN
// ═══════════════════════════════════════════════════════════
async function runConnect(){
  const textEl=document.getElementById('connect-text'), fill=document.getElementById('connect-bar-fill'), pctEl=document.getElementById('connect-pct');
  const lines=['> initializing connection...','> locating user...','> establishing secure channel...','> handshake complete.','> loading...'];
  let out='';
  for(const line of lines){
    for(let i=0;i<line.length;i++){out+=line[i];textEl.textContent=out;await sleep(28+Math.random()*30);}
    out+='\n';textEl.textContent=out;await sleep(200+Math.random()*200);
  }
  const start=Date.now(),dur=1600;
  await new Promise(res=>{
    const tick=setInterval(()=>{
      const p=Math.min(100,Math.round(((Date.now()-start)/dur)*100));
      fill.style.width=p+'%';pctEl.textContent=p+'%';
      if(p>=100){clearInterval(tick);res();}
    },30);
  });
  await sleep(400);
}

// ═══════════════════════════════════════════════════════════
// C — PSYCH CANVAS + LINE ENGINE
// ═══════════════════════════════════════════════════════════
const pCv=document.getElementById('psych-canvas'), pCtx=pCv.getContext('2d');
let pDropX,pDropY,pGhX,pGhY,pMX=null,pMY=null;
let pRipples=[],pParts=[],pPaused=false,pPEnd=0,pNP=Date.now()+6000;
let pStill=false,pStillA=0,pRAF;

window.addEventListener('mousemove',e=>{pMX=e.clientX;pMY=e.clientY;});

function initPCv(){
  pCv.width=window.innerWidth;pCv.height=window.innerHeight;
  pDropX=pCv.width*.72;pDropY=pCv.height*.45;pGhX=pDropX;pGhY=pDropY-15;pParts=[];
  for(let i=0;i<55;i++)pParts.push({x:Math.random()*pCv.width,y:Math.random()*pCv.height,speed:.08+Math.random()*.3,size:Math.random()*1.2,alpha:.05+Math.random()*.18});
}
function pLoop(){
  const now=Date.now();
  if(pStill)pStillA=Math.min(pStillA+.008,.72);else pStillA=Math.max(pStillA-.005,0);
  pCtx.fillStyle='rgba(0,0,0,.13)';pCtx.fillRect(0,0,pCv.width,pCv.height);
  if(pStillA>0){pCtx.fillStyle=`rgba(0,0,0,${pStillA})`;pCtx.fillRect(0,0,pCv.width,pCv.height);}
  pParts.forEach(p=>{pCtx.fillStyle=`rgba(150,0,0,${p.alpha})`;pCtx.fillRect(p.x,p.y,p.size,p.size);p.y-=p.speed;if(p.y<-5){p.y=pCv.height+5;p.x=Math.random()*pCv.width;}});
  if(now>pNP){pPaused=true;pPEnd=now+1200+Math.random()*1800;pNP=pPEnd+7000+Math.random()*8000;}
  if(pPaused&&now>pPEnd)pPaused=false;
  if(!pPaused&&!pStill){pDropY+=.04;if(pMX!==null){pDropX+=(pMX-pDropX)*.000012;if(pMY>pDropY)pDropY+=(pMY-pDropY)*.000008;}}
  const t=now*.002,wx=Math.sin(t)*.9,wy=Math.cos(t*1.3)*.9,bR=4+Math.sin(t*2)*.5;
  pGhX+=(pDropX-pGhX)*.025;pGhY+=((pDropY-16)-pGhY)*.025;
  pCtx.beginPath();pCtx.arc(pGhX,pGhY,bR*.65,0,Math.PI*2);pCtx.strokeStyle='rgba(110,0,0,.07)';pCtx.lineWidth=1;pCtx.stroke();
  if(!pPaused&&!pStill&&Math.random()<.012)pRipples.push({x:pDropX+wx,y:pDropY+wy,rad:bR,alpha:.13});
  for(let i=pRipples.length-1;i>=0;i--){const r=pRipples[i];pCtx.beginPath();pCtx.arc(r.x,r.y,r.rad,0,Math.PI*2);pCtx.strokeStyle=`rgba(150,0,0,${r.alpha})`;pCtx.lineWidth=.5;pCtx.stroke();r.rad+=.16;r.alpha-=.0011;if(r.alpha<=0)pRipples.splice(i,1);}
  pRAF=requestAnimationFrame(pLoop);
}

const lineText=document.getElementById('line-text');
async function humanType(el,text,mRate=.12){
  el.classList.add('show');let out='';
  const render=()=>{el.innerHTML=out+'<span class="cblink"></span>';};
  for(let i=0;i<text.length;i++){
    if(Math.random()<mRate&&i>0&&text[i]!=='\n'){
      const tc='qwertyuiopasdfghjklzxcvbnm';
      out+=tc[Math.floor(Math.random()*tc.length)];render();
      await sleep(80+Math.random()*100);await sleep(180+Math.random()*200);
      out=out.slice(0,-1);render();await sleep(55);
    }
    out+=text[i];render();
    const ch=text[i];
    await sleep(ch===' '?80+Math.random()*80:ch==='.'?140+Math.random()*120:ch===','?100+Math.random()*80:38+Math.random()*55);
  }
}
async function showLine(text,holdMs=2200,cls='',mRate=.12){
  lineText.className=cls;lineText.innerHTML='';lineText.offsetHeight;
  await humanType(lineText,text,mRate);
  await sleep(holdMs);
  lineText.classList.remove('show');lineText.style.opacity='0';
  await sleep(900);lineText.innerHTML='';lineText.style.opacity='';
}
async function showFinal(text,cls='final'){
  lineText.className=cls;lineText.innerHTML='';lineText.offsetHeight;
  await humanType(lineText,text,.06);
}

// Types text with typos, holds, then backspaces all of it — done.
async function showLineBackspace(text,holdMs=1800,cls='',mRate=.11){
  lineText.className=cls;lineText.innerHTML='';lineText.offsetHeight;
  lineText.classList.add('show');
  let out='';
  const render=()=>{lineText.innerHTML=out+'<span class="cblink"></span>';};
  // Type with human typos
  for(let i=0;i<text.length;i++){
    if(Math.random()<mRate&&i>0&&text[i]!=='\n'){
      const tc='qwertyuiopasdfghjklzxcvbnm';
      out+=tc[Math.floor(Math.random()*tc.length)];render();
      await sleep(70+Math.random()*80);
      out=out.slice(0,-1);render();await sleep(40);
    }
    out+=text[i];render();
    const ch=text[i];
    await sleep(ch===' '?75+Math.random()*65:ch==='.'?130+Math.random()*100:36+Math.random()*50);
  }
  // Hold so they can read it
  await sleep(holdMs);
  // Backspace all of it
  while(out.length>0){
    out=out.slice(0,-1);render();
    await sleep(22+Math.random()*25);
  }
  await sleep(350);
  lineText.classList.remove('show');
  lineText.innerHTML='';
}

// ═══════════════════════════════════════════════════════════
// D — HARVEST
// ═══════════════════════════════════════════════════════════
async function runHarvest(data){
  const ov=document.getElementById('stage-harvest'),lEl=document.getElementById('h-lines'),
    fillEl=document.getElementById('h-bar-fill'),pctEl=document.getElementById('h-pct'),

  const barStart=Date.now();

  await sleep(120);document.body.classList.remove('glitch-fx');
  await sleep(60); document.body.classList.add('glitch-fx');
  await sleep(180);document.body.classList.remove('glitch-fx');
  await sleep(100);document.body.classList.add('glitch-fx');
  await sleep(120);document.body.classList.remove('glitch-fx');
  fillEl.style.transition='width .2s ease';fillEl.style.width='100%';pctEl.textContent='100';
  document.getElementById('h-pct-label').textContent='INFORMATION COMPLETE. 100%';

  await sleep(120);document.body.classList.remove('glitch-fx');
  await sleep(400);
  gs.classList.remove('flash');
  await sleep(600);

  finalEl.classList.add('show');
  const msg=`I now have your information.\nIt is mine to keep.\n\nContact me directly if you want it\nnot to be sold and found\nby the dark web.\n\najchapa`;
  let out='';
  for(let i=0;i<msg.length;i++){

      const tc='qwertyuiopasdfghjklzxcvbnm';
