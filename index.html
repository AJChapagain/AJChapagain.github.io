<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJChapa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #04060f;
      font-family: 'DM Mono', monospace;
      color: #e8eaf0;
      cursor: crosshair;
      overflow: hidden; /* single viewport, no scroll */
    }

    #starfield {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .nebula {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 15% 70%, rgba(20,40,110,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 50% 60% at 85% 25%, rgba(8,20,80,0.22) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 50% 90%, rgba(15,35,95,0.12) 0%, transparent 60%);
    }

    /* ── U OF UTAH — fixed top-right ── */
    .uu-badge {
      position: fixed;
      top: 1.4rem;
      right: 1.6rem;
      z-index: 20;
      opacity: 0;
      animation: fadeDown 1.4s cubic-bezier(0.16,1,0.3,1) 0.8s forwards;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      text-decoration: none;
      pointer-events: auto;
    }
    .uu-letter {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 1.35rem;
      color: #cc1e1e;
      letter-spacing: 0.04em;
      line-height: 1;
      text-shadow: 0 0 18px rgba(180,20,20,0.35);
      transition: text-shadow 0.3s, color 0.3s;
    }
    .uu-badge:hover .uu-letter {
      color: #e83232;
      text-shadow: 0 0 28px rgba(220,40,40,0.55);
    }
    .uu-label {
      font-size: 0.42rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #3a1a1a;
      transition: color 0.3s;
    }
    .uu-badge:hover .uu-label { color: #7a3030; }

    
    /* ── HERO — top of page, centered ── */
    .hero {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 2.2rem;
      gap: 1rem;
      pointer-events: none;
    }
    .hero > * { pointer-events: auto; }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 5.5vw, 4.2rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #f0f2f8;
      text-align: center;
      opacity: 0;
      animation: fadeDown 1.4s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
    }
    .name::after {
      content: '';
      display: block;
      width: 55%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(74,127,193,0.45), transparent);
      margin: 0.55rem auto 0;
    }

    .links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0 1.8rem;
      opacity: 0;
      animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 0.42rem;
      text-decoration: none;
      color: #565d80;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: color 0.3s;
      position: relative;
      white-space: nowrap;
    }
    .link-item:hover { color: #b0b8d4; }
    .link-item svg { width: 11px; height: 11px; flex-shrink: 0; opacity: 0.45; transition: opacity 0.3s; }
    .link-item:hover svg { opacity: 0.9; }
    .link-item::after {
      content: ''; position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 1px;
      background: rgba(74,127,193,0.5);
      transition: width 0.3s;
    }
    .link-item:hover::after { width: 100%; }
    .link-divider { width: 1px; height: 9px; background: #141830; flex-shrink: 0; }

    /* ── POSITIONS WIDGET — fixed bottom-right ── */
    .positions {
      position: fixed;
      bottom: 1.6rem;
      right: 1.6rem;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 1.0s forwards;
    }

    .positions-label {
      font-size: 0.42rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #1a1f38;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      align-items: stretch;
    }

    /* ── CARD — single row: ticker · shares · price ── */
    .card {
      display: grid;
      grid-template-columns: 38px 1fr 52px;
      align-items: center;
      gap: 0.5rem;
      padding: 0.28rem 0.55rem;
      border: 1px solid rgba(255,255,255,0.03);
      background: rgba(5,8,20,0.45);
      border-radius: 2px;
      opacity: 0.55;
      transition: opacity 0.3s, border-color 0.3s, background 0.3s;
      cursor: default;
      min-width: 160px;
    }
    .card:hover {
      opacity: 1;
      border-color: rgba(74,127,193,0.18);
      background: rgba(8,12,30,0.7);
    }

    .card-ticker {
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      color: #7880a8;
      transition: color 0.3s;
    }
    .card:hover .card-ticker { color: #b0b8d4; }

    .card-shares {
      font-size: 0.46rem;
      letter-spacing: 0.06em;
      color: #2a304e;
      text-align: center;
      transition: color 0.3s;
    }
    .card:hover .card-shares { color: #4a5280; }

    .card-price {
      font-size: 0.52rem;
      color: #3e4668;
      letter-spacing: 0.04em;
      text-align: right;
      transition: color 0.3s;
    }
    .card:hover .card-price { color: #7880a8; }

    /* shimmer */
    .shimmer {
      display: inline-block;
      width: 40px; height: 5px;
      background: linear-gradient(90deg, #0a0d20 25%, #141830 50%, #0a0d20 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 2px;
      vertical-align: middle;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 520px) {
      .link-divider { display: none; }
      .links { gap: 0 1rem; flex-wrap: wrap; row-gap: 0.7rem; }
      .positions { bottom: 1rem; right: 1rem; }
      .uu-badge { top: 1rem; right: 1rem; }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="starfield"></canvas>
  <div class="nebula"></div>

  <!-- U of Utah badge — top right -->
  <div class="uu-badge">
    <span class="uu-letter">U</span>
    <span class="uu-label">Utah</span>
  </div>

  <!-- Hero — dead center of viewport -->
  <section class="hero">
    <h1 class="name">AJChapa</h1>
    <nav class="links">
      <a class="link-item" href="https://www.linkedin.com/in/aj-chapagain" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>

  <!-- Positions widget — fixed bottom-right -->
  <aside class="positions">
    <span class="positions-label">Positions</span>
    <div class="cards" id="cards"></div>
  </aside>

  <script>
    // ── STARFIELD + BLACK HOLE + SHOOTING STARS ──
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let W, H, stars = [], shootingStars = [];

    // Black hole lives near center-ish, slightly offset for drama
    const BH = { rx: 0.50, ry: 0.54 }; // center-x, slightly below center-y // fractional position, recalc on resize
    let bhX, bhY;
    const BH_PULL      = 0.012;   // gravitational strength
    const BH_RADIUS    = 38;      // event horizon — stars vanish inside this
    const BH_INFLUENCE = 420;     // how far gravity reaches

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      bhX = W * BH.rx;
      bhY = H * BH.ry;
    }

    function rand(a, b) { return a + Math.random() * (b - a); }

    // Spawn a fresh star at the canvas edge (feeds the black hole perpetually)
    function spawnStarAtEdge() {
      const edge = Math.floor(rand(0, 4));
      let x, y;
      if      (edge === 0) { x = rand(0, W); y = -5; }
      else if (edge === 1) { x = W + 5;      y = rand(0, H); }
      else if (edge === 2) { x = rand(0, W); y = H + 5; }
      else                 { x = -5;         y = rand(0, H); }

      const roll = Math.random();
      let shape;
      if      (roll < 0.30) shape = 'circle';
      else if (roll < 0.50) shape = 'fourpoint';
      else if (roll < 0.70) shape = 'glow';
      else                  shape = 'tiny';

      return {
        x, y,
        vx: rand(-0.05, 0.05),
        vy: rand(-0.05, 0.05),
        r: shape === 'tiny' ? rand(0.4, 0.9)
         : shape === 'glow' ? rand(1.2, 2.4)
         : rand(0.7, 1.9),
        baseOpacity: shape === 'glow' ? rand(0.07, 0.22)
                   : shape === 'tiny' ? rand(0.08, 0.30)
                   : rand(0.14, 0.58),
        twinkleSpeed:  rand(0.004, 0.018),
        twinkleOffset: rand(0, Math.PI * 2),
        rotation:  rand(0, Math.PI),
        rotSpeed:  rand(-0.003, 0.003),
        hue: Math.random() > 0.75 ? rand(28, 52) : rand(195, 232),
        shape,
        dead: false,
      };
    }

    function initStars() {
      stars = [];
      for (let i = 0; i < 160; i++) {
        const s = spawnStarAtEdge();
        // scatter them across the canvas initially instead of edge
        s.x = rand(0, W);
        s.y = rand(0, H);
        stars.push(s);
      }
    }

    // ── DRAW INDIVIDUAL STAR ──
    function drawStar(s, alpha) {
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rotation);

      if (s.shape === 'glow') {
        const g = ctx.createRadialGradient(0,0,0, 0,0, s.r * 5);
        g.addColorStop(0,   `hsla(${s.hue},55%,90%,${alpha * 0.7})`);
        g.addColorStop(0.3, `hsla(${s.hue},50%,85%,${alpha * 0.3})`);
        g.addColorStop(1,   `hsla(${s.hue},40%,80%,0)`);
        ctx.beginPath(); ctx.arc(0,0, s.r*5, 0, Math.PI*2);
        ctx.fillStyle = g; ctx.fill();
        ctx.beginPath(); ctx.arc(0,0, s.r*0.4, 0, Math.PI*2);
        ctx.fillStyle = `hsla(${s.hue},65%,96%,${alpha})`; ctx.fill();

      } else if (s.shape === 'fourpoint') {
        const outer = s.r, inner = s.r * 0.28;
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const radius = i % 2 === 0 ? outer : inner;
          const angle  = (i * Math.PI) / 4 - Math.PI / 4;
          i === 0 ? ctx.moveTo(Math.cos(angle)*radius, Math.sin(angle)*radius)
                  : ctx.lineTo(Math.cos(angle)*radius, Math.sin(angle)*radius);
        }
        ctx.closePath();
        ctx.fillStyle = `hsla(${s.hue},55%,92%,${alpha})`; ctx.fill();
        if (s.r > 1.1 && alpha > 0.3) {
          ctx.strokeStyle = `hsla(${s.hue},60%,90%,${alpha*0.25})`;
          ctx.lineWidth = 0.4;
          ctx.beginPath(); ctx.moveTo(0,-s.r*3); ctx.lineTo(0,s.r*3); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(-s.r*3,0); ctx.lineTo(s.r*3,0); ctx.stroke();
        }
        const gg = ctx.createRadialGradient(0,0,0, 0,0, s.r*3.5);
        gg.addColorStop(0, `hsla(${s.hue},60%,88%,${alpha*0.12})`);
        gg.addColorStop(1, `hsla(${s.hue},40%,80%,0)`);
        ctx.beginPath(); ctx.arc(0,0,s.r*3.5,0,Math.PI*2);
        ctx.fillStyle = gg; ctx.fill();

      } else if (s.shape === 'tiny') {
        ctx.beginPath(); ctx.arc(0,0,s.r*0.5,0,Math.PI*2);
        ctx.fillStyle = `hsla(${s.hue},40%,85%,${alpha})`; ctx.fill();

      } else {
        ctx.beginPath(); ctx.arc(0,0,s.r*0.65,0,Math.PI*2);
        ctx.fillStyle = `hsla(${s.hue},50%,90%,${alpha})`; ctx.fill();
        if (s.r > 1.0 && alpha > 0.3) {
          const hg = ctx.createRadialGradient(0,0,0,0,0,s.r*3);
          hg.addColorStop(0,`hsla(${s.hue},55%,85%,${alpha*0.1})`);
          hg.addColorStop(1,`hsla(${s.hue},40%,80%,0)`);
          ctx.beginPath(); ctx.arc(0,0,s.r*3,0,Math.PI*2);
          ctx.fillStyle = hg; ctx.fill();
        }
      }
      ctx.restore();
    }

    // ── DRAW BLACK HOLE ──
    function drawBlackHole() {
      // Accretion disk — layered glowing rings
      const diskColors = [
        { r: BH_RADIUS * 3.8, h: 28,  s: 90, l: 65, a: 0.055 },
        { r: BH_RADIUS * 3.0, h: 18,  s: 95, l: 58, a: 0.08  },
        { r: BH_RADIUS * 2.3, h: 200, s: 70, l: 65, a: 0.05  },
        { r: BH_RADIUS * 1.9, h: 195, s: 80, l: 72, a: 0.07  },
        { r: BH_RADIUS * 1.55,h: 38,  s: 95, l: 72, a: 0.10  },
      ];
      for (const d of diskColors) {
        const g = ctx.createRadialGradient(bhX, bhY, BH_RADIUS * 0.9, bhX, bhY, d.r);
        g.addColorStop(0,   `hsla(${d.h},${d.s}%,${d.l}%,${d.a})`);
        g.addColorStop(0.5, `hsla(${d.h},${d.s}%,${d.l}%,${d.a * 0.4})`);
        g.addColorStop(1,   `hsla(${d.h},${d.s}%,${d.l}%,0)`);
        ctx.beginPath(); ctx.arc(bhX, bhY, d.r, 0, Math.PI*2);
        ctx.fillStyle = g; ctx.fill();
      }
      // The void itself
      const void_ = ctx.createRadialGradient(bhX,bhY,0, bhX,bhY,BH_RADIUS);
      void_.addColorStop(0,   'rgba(0,0,0,1)');
      void_.addColorStop(0.7, 'rgba(0,0,0,0.97)');
      void_.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(bhX,bhY,BH_RADIUS,0,Math.PI*2);
      ctx.fillStyle = void_; ctx.fill();
    }

    // ── SHOOTING STARS — fiery / icy / golden / violet ──
    const TYPES = [
      { name:'fiery',  hue1: 15,  hue2: 40,  sat: 100, lit: 85, width: [1.2, 2.8], len: [120, 260], glow: true  },
      { name:'icy',    hue1: 185, hue2: 210, sat: 90,  lit: 90, width: [0.7, 1.6], len: [100, 220], glow: false },
      { name:'golden', hue1: 42,  hue2: 55,  sat: 100, lit: 88, width: [1.0, 2.2], len: [90,  200], glow: true  },
      { name:'violet', hue1: 270, hue2: 300, sat: 85,  lit: 80, width: [0.8, 1.8], len: [80,  180], glow: false },
      { name:'white',  hue1: 200, hue2: 220, sat: 30,  lit: 98, width: [0.6, 1.4], len: [70,  160], glow: false },
    ];

    function createShootingStar() {
      const t = TYPES[Math.floor(Math.random() * TYPES.length)];
      // Random spawn from any of 4 edges
      const edge  = Math.floor(rand(0, 4));
      let sx, sy;
      if      (edge === 0) { sx = rand(0,W);  sy = -10; }
      else if (edge === 1) { sx = W+10;        sy = rand(0,H); }
      else if (edge === 2) { sx = rand(0,W);  sy = H+10; }
      else                 { sx = -10;         sy = rand(0,H); }

      // Angle pointing generally inward (toward opposite region) + random spread
      const baseAngle = Math.atan2(H/2 - sy, W/2 - sx);
      const angle     = baseAngle + rand(-0.9, 0.9);
      const speed     = rand(10, 22);

      const hue = rand(t.hue1, t.hue2);
      return {
        x: sx, y: sy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        len:   rand(t.len[0],   t.len[1]),
        alpha: rand(0.65, 0.95),
        fade:  rand(0.009, 0.018),
        width: rand(t.width[0], t.width[1]),
        hue, sat: t.sat, lit: t.lit,
        glow: t.glow,
        type: t.name,
      };
    }

    let frame = 0, nextShoot = rand(60, 180);

    function loop() {
      ctx.clearRect(0, 0, W, H);
      frame++;

      // ── Draw black hole first (behind everything) ──
      drawBlackHole();

      // ── Shooting stars ──
      if (frame >= nextShoot) {
        shootingStars.push(createShootingStar());
        // occasionally spawn a second simultaneous one for drama
        if (Math.random() < 0.25) shootingStars.push(createShootingStar());
        nextShoot = frame + rand(90, 280);
      }
      shootingStars = shootingStars.filter(s => s.alpha > 0);

      for (const s of shootingStars) {
        ctx.save();
        const tx = s.x - s.vx * (s.len / 14);
        const ty = s.y - s.vy * (s.len / 14);
        const g  = ctx.createLinearGradient(s.x, s.y, tx, ty);
        g.addColorStop(0,   `hsla(${s.hue},${s.sat}%,${s.lit}%,${s.alpha})`);
        g.addColorStop(0.3, `hsla(${s.hue},${s.sat}%,${s.lit}%,${s.alpha*0.5})`);
        g.addColorStop(1,   `hsla(${s.hue},${s.sat}%,${s.lit}%,0)`);
        ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(tx, ty);
        ctx.strokeStyle = g; ctx.lineWidth = s.width; ctx.lineCap = 'round'; ctx.stroke();

        // glow halo for fiery/golden types
        if (s.glow) {
          const g2 = ctx.createLinearGradient(s.x, s.y, tx, ty);
          g2.addColorStop(0,   `hsla(${s.hue},100%,70%,${s.alpha * 0.18})`);
          g2.addColorStop(1,   `hsla(${s.hue},100%,70%,0)`);
          ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(tx, ty);
          ctx.strokeStyle = g2; ctx.lineWidth = s.width * 4; ctx.stroke();
        }
        ctx.restore();
        s.x += s.vx; s.y += s.vy; s.alpha -= s.fade;
      }

      // ── Stars with black hole gravity ──
      for (let i = stars.length - 1; i >= 0; i--) {
        const s = stars[i];

        // Gravity pull toward black hole
        const dx   = bhX - s.x;
        const dy   = bhY - s.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < BH_RADIUS * 0.9) {
          // Consumed — replace with fresh star from edge
          stars[i] = spawnStarAtEdge();
          continue;
        }

        if (dist < BH_INFLUENCE) {
          // Gravity gets stronger the closer the star is
          const pull = BH_PULL * Math.pow((BH_INFLUENCE - dist) / BH_INFLUENCE, 2) * 2.2;
          s.vx += (dx / dist) * pull;
          s.vy += (dy / dist) * pull;
          // slight speed cap so stars don't teleport
          const spd = Math.sqrt(s.vx*s.vx + s.vy*s.vy);
          if (spd > 2.8) { s.vx = (s.vx/spd)*2.8; s.vy = (s.vy/spd)*2.8; }
        }

        const twinkle = Math.sin(frame * s.twinkleSpeed + s.twinkleOffset);
        // Stars near BH dim as they approach
        const dimFactor = dist < BH_INFLUENCE ? Math.min(1, (dist - BH_RADIUS) / (BH_INFLUENCE * 0.4)) : 1;
        const alpha = Math.max(0.01, (s.baseOpacity + twinkle * s.baseOpacity * 0.55) * dimFactor);

        s.x += s.vx; s.y += s.vy;
        s.rotation += s.rotSpeed;

        // Wrap edges (stars that drift away from BH come back)
        if (s.x < -8) s.x = W+8; if (s.x > W+8) s.x = -8;
        if (s.y < -8) s.y = H+8; if (s.y > H+8) s.y = -8;

        drawStar(s, alpha);
      }

      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => { resize(); initStars(); });
    resize(); initStars(); loop();

    // ── POSITIONS WIDGET ──
    const POSITIONS = [
      { symbol: 'NVDA', shares: 12 },
      { symbol: 'META', shares: 5  },
      { symbol: 'NVO',  shares: 8  },
      { symbol: 'INTC', shares: 30 },
      { symbol: 'SOFI', shares: 50 },
    ];

    const container = document.getElementById('cards');

    POSITIONS.forEach(({ symbol, shares }) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <span class="card-ticker">${symbol}</span>
        <span class="card-shares">${shares} sh</span>
        <span class="card-price shimmer" id="price-${symbol}"></span>
      `;
      container.appendChild(card);
    });

    async function fetchQuote(symbol) {
      const el = document.getElementById(`price-${symbol}`);
      try {
        const res  = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`);
        const data = await res.json();
        const price = data.chart.result[0].meta.regularMarketPrice.toFixed(2);
        el.textContent = `$${price}`;
        el.classList.remove('shimmer');
      } catch {
        el.textContent = '—';
        el.classList.remove('shimmer');
      }
    }

    POSITIONS.forEach(({ symbol }) => fetchQuote(symbol));
    setInterval(() => POSITIONS.forEach(({ symbol }) => fetchQuote(symbol)), 60000);
  </script>
</body>
</html>
