<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archive — AJChapa</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── TOKENS ─────────────────────────────────────────── */
    :root {
      --bg:        #ffffff;
      --fg:        #000000;
      --muted:     #999999;
      --border:    #ededed;
      --hover-bg:  #f7f7f7;
      --input-bg:  #f7f7f7;

      --sp-1:  5px;
      --sp-2:  10px;
      --sp-3:  15px;
      --sp-4:  20px;
      --sp-5:  30px;
      --sp-6:  40px;

      --nav-h: 55px;
      --font:  'Mulish', sans-serif;
      --radius: 3px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; width: 100%; height: 100%; }

    /* ── NAV ─────────────────────────────────────────────── */
    #nav {
      position: sticky; top: 0; z-index: 1000;
      height: var(--nav-h);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 var(--sp-4);
      gap: var(--sp-4);
    }

    #nav-logo {
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.04em;
      white-space: nowrap; flex-shrink: 0;
    }

    #nav-search {
      flex: 1; max-width: 320px; margin: 0 auto;
    }
    #nav-search input {
      width: 100%;
      background: var(--input-bg);
      border: none; outline: none;
      border-radius: var(--radius);
      padding: 7px 12px;
      font-family: var(--font); font-size: 13px;
      color: var(--fg);
    }
    #nav-search input::placeholder { color: var(--muted); }

    #nav-links {
      display: flex; align-items: center; gap: var(--sp-3);
      flex-shrink: 0;
    }
    #nav-links a {
      font-size: 13px; font-weight: 400; color: var(--fg);
      transition: opacity 0.15s;
    }
    #nav-links a:hover { opacity: 0.5; }

    /* ── MAIN ────────────────────────────────────────────── */
    #main {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--sp-6) var(--sp-4) 80px;
    }

    /* ── PROFILE HEADER ──────────────────────────────────── */
    #profile {
      margin-bottom: var(--sp-5);
    }

    #profile-top {
      display: flex; align-items: baseline; gap: var(--sp-3);
      margin-bottom: var(--sp-2);
    }
    #profile-name {
      font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
    }
    #profile-meta {
      font-size: 12px; color: var(--muted); font-weight: 400;
    }

    #profile-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
      margin-bottom: var(--sp-3);
      transition: color 0.15s;
    }
    #profile-back:hover { color: var(--fg); }
    #profile-back svg { width: 10px; height: 10px; }

    #profile-filters {
      display: flex; align-items: center; gap: 0;
      border-bottom: 1px solid var(--border);
    }
    .filter-tab {
      font-size: 12px; font-weight: 500;
      color: var(--muted);
      padding: var(--sp-2) var(--sp-3) var(--sp-2) 0;
      margin-right: var(--sp-3);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      position: relative; top: 1px;
    }
    .filter-tab:hover { color: var(--fg); }
    .filter-tab.active {
      color: var(--fg);
      border-bottom-color: var(--fg);
    }

    /* ── GRID ────────────────────────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--sp-3);
      margin-top: var(--sp-5);
    }

    /* ── CARD ────────────────────────────────────────────── */
    .card {
      cursor: pointer;
      display: flex; flex-direction: column;
      gap: var(--sp-1);
    }

    .card-img {
      aspect-ratio: 1 / 1;
      background: var(--hover-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      transition: border-color 0.15s;
    }
    .card-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: opacity 0.2s;
    }
    .card:hover .card-img {
      border-color: #c8c8c8;
    }
    .card:hover .card-img img {
      opacity: 0.88;
    }

    /* empty card placeholder */
    .card-img.empty {
      display: flex; align-items: center; justify-content: center;
    }
    .card-img.empty svg {
      width: 28px; height: 28px;
      opacity: 0.18;
    }

    .card-body {
      padding: 0 2px;
    }
    .card-title {
      font-size: 13px; font-weight: 600;
      color: var(--fg);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }
    .card-by {
      font-size: 12px; font-weight: 400;
      color: var(--muted);
      margin-top: 2px;
    }
    .card-meta {
      font-size: 11px; font-weight: 300;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── LIGHTBOX ────────────────────────────────────────── */
    #lb {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(255,255,255,0.96);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease;
    }
    #lb.open { opacity: 1; pointer-events: all; }

    #lb-inner {
      display: flex; flex-direction: column; align-items: center;
      gap: var(--sp-3);
      max-width: 86vw;
    }
    #lb-img {
      max-width: 80vw; max-height: 72vh;
      object-fit: contain;
      border: 1px solid var(--border);
      transform: scale(0.97); opacity: 0;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1), opacity 0.35s ease;
    }
    #lb.open #lb-img { transform: scale(1); opacity: 1; }

    #lb-title {
      font-size: 13px; font-weight: 600;
      color: var(--fg); text-align: center;
    }
    #lb-submeta {
      font-size: 11px; color: var(--muted);
      text-align: center; margin-top: -8px;
    }

    #lb-ui {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: var(--sp-3) var(--sp-4);
      border-bottom: 1px solid var(--border);
    }
    #lb-counter {
      font-size: 12px; color: var(--muted); font-weight: 400;
    }
    #lb-close {
      font-size: 12px; color: var(--muted);
      cursor: pointer; transition: color 0.15s;
      font-weight: 500;
    }
    #lb-close:hover { color: var(--fg); }

    #lb-nav {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; justify-content: center; gap: var(--sp-5);
      padding: var(--sp-3) var(--sp-4);
      border-top: 1px solid var(--border);
    }
    .lb-btn {
      font-size: 12px; font-weight: 500;
      color: var(--muted); cursor: pointer;
      transition: color 0.15s;
      font-family: var(--font);
      background: none; border: none;
    }
    .lb-btn:hover { color: var(--fg); }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media(max-width: 600px){
      #nav-search { display: none; }
      #grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: var(--sp-2); }
      #lb-img { max-width: 94vw; max-height: 60vh; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <div id="nav-logo">AJChapa</div>
  <div id="nav-search">
    <input type="text" placeholder="Search archive..." />
  </div>
  <div id="nav-links">
    <a href="index.html">← home</a>
  </div>
</nav>

<!-- MAIN -->
<main id="main">

  <!-- PROFILE HEADER -->
  <div id="profile">
    <div id="profile-top">
      <h1 id="profile-name">Archive</h1>
      <span id="profile-meta">6 blocks</span>
    </div>

    <div id="profile-filters">
      <span class="filter-tab active">All</span>
      <span class="filter-tab">Photos</span>
      <span class="filter-tab">Projects</span>
    </div>
  </div>

  <!-- GRID -->
  <div id="grid">

    <div class="card" onclick="openLB(0)">
      <div class="card-img">
        <img src="photo1.jpg" alt="frame 01" />
      </div>
      <div class="card-body">
        <div class="card-title">frame 01</div>
        <div class="card-by">by AJChapa</div>
        <div class="card-meta">1 block</div>
      </div>
    </div>

    <div class="card" onclick="openLB(1)">
      <div class="card-img">
        <img src="photo2.jpg" alt="frame 02" />
      </div>
      <div class="card-body">
        <div class="card-title">frame 02</div>
        <div class="card-by">by AJChapa</div>
        <div class="card-meta">1 block</div>
      </div>
    </div>

    <div class="card" onclick="openLB(2)">
      <div class="card-img">
        <img src="photo3.jpg" alt="frame 03" />
      </div>
      <div class="card-body">
        <div class="card-title">frame 03</div>
        <div class="card-by">by AJChapa</div>
        <div class="card-meta">1 block</div>
      </div>
    </div>

    <div class="card" onclick="openLB(3)">
      <div class="card-img">
        <img src="photo4.jpg" alt="frame 04" />
      </div>
      <div class="card-body">
        <div class="card-title">frame 04</div>
        <div class="card-by">by AJChapa</div>
        <div class="card-meta">1 block</div>
      </div>
    </div>

    <div class="card" onclick="openLB(4)">
      <div class="card-img">
        <img src="photo5.jpg" alt="frame 05" />
      </div>
      <div class="card-body">
        <div class="card-title">frame 05</div>
        <div class="card-by">by AJChapa</div>
        <div class="card-meta">1 block</div>
      </div>
    </div>

    <div class="card" onclick="openLB(5)">
      <div class="card-img">
        <img src="photo6.jpg" alt="frame 06" />
      </div>
      <div class="card-body">
        <div class="card-title">frame 06</div>
        <div class="card-by">by AJChapa</div>
        <div class="card-meta">1 block</div>
      </div>
    </div>

  </div>
</main>

<!-- LIGHTBOX -->
<div id="lb" onclick="handleLBBg(event)">
  <div id="lb-ui">
    <span id="lb-counter"></span>
    <span id="lb-close" onclick="closeLB()">close</span>
  </div>
  <div id="lb-inner">
    <img id="lb-img" src="" alt="" />
    <div id="lb-title"></div>
    <div id="lb-submeta">by AJChapa</div>
  </div>
  <div id="lb-nav">
    <button class="lb-btn" onclick="stepLB(-1)">← prev</button>
    <button class="lb-btn" onclick="stepLB(1)">next →</button>
  </div>
</div>

<script>
  // filter tabs
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    });
  });

  // lightbox
  const photos = [
    { src:'photo1.jpg', title:'frame 01' },
    { src:'photo2.jpg', title:'frame 02' },
    { src:'photo3.jpg', title:'frame 03' },
    { src:'photo4.jpg', title:'frame 04' },
    { src:'photo5.jpg', title:'frame 05' },
    { src:'photo6.jpg', title:'frame 06' },
  ];

  let idx = 0;

  function openLB(i) {
    idx = i;
    const p = photos[i];
    document.getElementById('lb-img').src = p.src;
    document.getElementById('lb-img').alt = p.title;
    document.getElementById('lb-title').textContent = p.title;
    document.getElementById('lb-counter').textContent = `${i+1} / ${photos.length}`;
    document.getElementById('lb').classList.add('open');
  }
  function closeLB() {
    document.getElementById('lb').classList.remove('open');
  }
  function stepLB(dir) {
    openLB((idx + dir + photos.length) % photos.length);
  }
  function handleLBBg(e) {
    if (e.target === document.getElementById('lb')) closeLB();
  }
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lb').classList.contains('open')) return;
    if (e.key === 'Escape')     closeLB();
    if (e.key === 'ArrowRight') stepLB(1);
    if (e.key === 'ArrowLeft')  stepLB(-1);
  });
</script>
</body>
</html>
