<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AJChapa — Archive</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── TOKENS ──────────────────────────────────────────── */
    :root {
      --bg:         #ffffff;
      --card-bg:    #f7f7f7;
      --border:     #ededed;
      --text-main:  #000000;
      --text-muted: #999999;
      --text-link:  #333333;
      --font:       'Mulish', sans-serif;
      --mono:       Menlo, Monaco, Consolas, monospace;
    }

    /* ── RESET ───────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: var(--bg);
      color: var(--text-main);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    button { font-family: var(--font); }

    /* ── NAV ─────────────────────────────────────────────── */
    #nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 55px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    #nav-logo {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: 0;
    }

    #nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #nav-right a {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      transition: color 0.1s;
    }
    #nav-right a:hover { color: var(--text-main); }

    /* ── PROFILE HEADER ──────────────────────────────────── */
    #profile {
      padding: 30px 20px 0;
      border-bottom: 1px solid var(--border);
    }

    #profile-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    #profile-name {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.01em;
    }

    #profile-meta {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    /* filter tabs */
    #profile-tabs {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .tab {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      padding: 10px 14px 10px 0;
      margin-right: 6px;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      position: relative;
      top: 1px;
      transition: color 0.1s;
      user-select: none;
    }
    .tab:hover { color: var(--text-main); }
    .tab.active {
      color: var(--text-main);
      font-weight: 600;
      border-bottom-color: var(--text-main);
    }

    /* ── GRID CONTAINER ──────────────────────────────────── */
    #grid-wrap {
      padding: 20px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 15px;
    }

    /* ── BLOCK / CARD ────────────────────────────────────── */
    .block {
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
      position: relative;
    }

    /* image container */
    .block-img {
      aspect-ratio: 1 / 1;
      background: var(--card-bg);
      border-radius: 3px;
      border: 1px solid transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.1s;
      position: relative;
    }

    .block-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 1;
      transition: opacity 0.1s;
    }

    .block:hover .block-img {
      border-color: var(--border);
    }
    .block:hover .block-img img {
      opacity: 0.9;
    }

    /* options button — top right, visible on hover */
    .block-options {
      position: absolute;
      top: 6px;
      right: 6px;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.1s;
    }
    .block:hover .block-options { opacity: 1; }

    .block-options button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      padding: 0;
    }
    .block-options button:hover {
      background: var(--bg);
    }
    .block-options svg {
      width: 12px;
      height: 12px;
      fill: var(--text-muted);
    }

    /* metadata */
    .block-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 0 1px;
    }

    .block-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-main);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }

    .block-author {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-main);
    }

    .block-info {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── LIGHTBOX ────────────────────────────────────────── */
    #lb {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(255,255,255,0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }
    #lb.open {
      opacity: 1;
      pointer-events: all;
    }

    #lb-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      max-width: 90vw;
    }

    #lb-img {
      max-width: 80vw;
      max-height: 72vh;
      object-fit: contain;
      border: 1px solid var(--border);
      border-radius: 3px;
    }

    #lb-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-main);
      text-align: center;
    }

    #lb-sublabel {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
      margin-top: -8px;
      text-align: center;
    }

    #lb-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 55px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
    }

    #lb-counter {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    #lb-close {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.1s;
      background: none;
      border: none;
      font-family: var(--font);
    }
    #lb-close:hover { color: var(--text-main); }

    #lb-bot {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 55px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      border-top: 1px solid var(--border);
    }

    .lb-nav {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--font);
      transition: color 0.1s;
    }
    .lb-nav:hover { color: var(--text-main); }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 600px) {
      #grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 10px;
      }
      #profile { padding: 20px 14px 0; }
      #grid-wrap { padding: 14px; }
      #nav { padding: 0 14px; }
      #lb-img { max-width: 96vw; max-height: 60vh; }
    }
  </style>
</head>
<body>

<!-- ── NAV ──────────────────────────────────────────────── -->
<nav id="nav">
  <div id="nav-logo">AJChapa</div>
  <div id="nav-right">
    <a href="index.html">← home</a>
  </div>
</nav>

<!-- ── PROFILE HEADER ───────────────────────────────────── -->
<div id="profile">
  <div id="profile-top">
    <h1 id="profile-name">Archive</h1>
    <span id="profile-meta">5 blocks</span>
  </div>
  <div id="profile-tabs">
    <span class="tab active">Blocks</span>
  </div>
</div>

<!-- ── GRID ─────────────────────────────────────────────── -->
<div id="grid-wrap">
  <div id="grid">

    <div class="block" onclick="openLB(0)">
      <div class="block-img">
        <img src="photo1.jpg" alt="in ma village" loading="lazy" />
        <div class="block-options">
          <button onclick="event.stopPropagation()" title="Options" aria-label="Options">
            <svg viewBox="0 0 16 16"><circle cx="3" cy="8" r="1.2"/><circle cx="8" cy="8" r="1.2"/><circle cx="13" cy="8" r="1.2"/></svg>
          </button>
        </div>
      </div>
      <div class="block-meta">
        <div class="block-title">in ma village</div>
        <div class="block-info">frame 01 &bull; 1 block</div>
      </div>
    </div>

    <div class="block" onclick="openLB(1)">
      <div class="block-img">
        <img src="photo2.jpg" alt="clothing store era" loading="lazy" />
        <div class="block-options">
          <button onclick="event.stopPropagation()" title="Options" aria-label="Options">
            <svg viewBox="0 0 16 16"><circle cx="3" cy="8" r="1.2"/><circle cx="8" cy="8" r="1.2"/><circle cx="13" cy="8" r="1.2"/></svg>
          </button>
        </div>
      </div>
      <div class="block-meta">
        <div class="block-title">clothing store era</div>
        <div class="block-info">frame 02 &bull; 1 block</div>
      </div>
    </div>

    <div class="block" onclick="openLB(2)">
      <div class="block-img">
        <img src="photo3.jpg" alt="pic with the judge before the prosecutor got fricked by urstruly" loading="lazy" />
        <div class="block-options">
          <button onclick="event.stopPropagation()" title="Options" aria-label="Options">
            <svg viewBox="0 0 16 16"><circle cx="3" cy="8" r="1.2"/><circle cx="8" cy="8" r="1.2"/><circle cx="13" cy="8" r="1.2"/></svg>
          </button>
        </div>
      </div>
      <div class="block-meta">
        <div class="block-title">pic with the judge before the prosecutor got fricked by urstruly</div>
        <div class="block-info">frame 03 &bull; 1 block</div>
      </div>
    </div>

    <div class="block" onclick="openLB(3)">
      <div class="block-img">
        <img src="photo4.jpg" alt="orientation era" loading="lazy" />
        <div class="block-options">
          <button onclick="event.stopPropagation()" title="Options" aria-label="Options">
            <svg viewBox="0 0 16 16"><circle cx="3" cy="8" r="1.2"/><circle cx="8" cy="8" r="1.2"/><circle cx="13" cy="8" r="1.2"/></svg>
          </button>
        </div>
      </div>
      <div class="block-meta">
        <div class="block-title">orientation era</div>
        <div class="block-info">frame 04 &bull; 1 block</div>
      </div>
    </div>

    <div class="block" onclick="openLB(4)">
      <div class="block-img">
        <img src="photo6.jpg" alt="vegas" loading="lazy" />
        <div class="block-options">
          <button onclick="event.stopPropagation()" title="Options" aria-label="Options">
            <svg viewBox="0 0 16 16"><circle cx="3" cy="8" r="1.2"/><circle cx="8" cy="8" r="1.2"/><circle cx="13" cy="8" r="1.2"/></svg>
          </button>
        </div>
      </div>
      <div class="block-meta">
        <div class="block-title">vegas</div>
        <div class="block-info">frame 05 &bull; 1 block</div>
      </div>
    </div>

  </div>
</div>

<!-- ── LIGHTBOX ──────────────────────────────────────────── -->
<div id="lb" onclick="handleLBBg(event)">
  <div id="lb-top">
    <span id="lb-counter"></span>
    <button id="lb-close" onclick="closeLB()">Close</button>
  </div>
  <div id="lb-inner">
    <img id="lb-img" src="" alt="" />
    <div id="lb-label"></div>
    <div id="lb-sublabel"></div>
  </div>
  <div id="lb-bot">
    <button class="lb-nav" onclick="stepLB(-1)">← Previous</button>
    <button class="lb-nav" onclick="stepLB(1)">Next →</button>
  </div>
</div>

<script>
  const photos = [
    { src: 'photo1.jpg', title: 'in ma village',                                                          info: 'frame 01 \u2022 1 block' },
    { src: 'photo2.jpg', title: 'clothing store era',                                                     info: 'frame 02 \u2022 1 block' },
    { src: 'photo3.jpg', title: 'pic with the judge before the prosecutor got fricked by urstruly',        info: 'frame 03 \u2022 1 block' },
    { src: 'photo4.jpg', title: 'orientation era',                                                        info: 'frame 04 \u2022 1 block' },
    { src: 'photo6.jpg', title: 'vegas',                                                                  info: 'frame 05 \u2022 1 block' },
  ];

  let idx = 0;

  function openLB(i) {
    idx = i;
    const p = photos[i];
    document.getElementById('lb-img').src         = p.src;
    document.getElementById('lb-img').alt         = p.title;
    document.getElementById('lb-label').textContent    = p.title;
    document.getElementById('lb-sublabel').textContent = p.info;
    document.getElementById('lb-counter').textContent  = (i + 1) + ' / ' + photos.length;
    document.getElementById('lb').classList.add('open');
  }

  function closeLB() {
    document.getElementById('lb').classList.remove('open');
  }

  function stepLB(dir) {
    openLB((idx + dir + photos.length) % photos.length);
  }

  function handleLBBg(e) {
    if (e.target === document.getElementById('lb')) closeLB();
  }

  document.addEventListener('keydown', function(e) {
    if (!document.getElementById('lb').classList.contains('open')) return;
    if (e.key === 'Escape')     closeLB();
    if (e.key === 'ArrowRight') stepLB(1);
    if (e.key === 'ArrowLeft')  stepLB(-1);
  });

  // tab switching (visual only)
  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
    });
  });
</script>
</body>
</html>
