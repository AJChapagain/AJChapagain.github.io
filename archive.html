<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archive — AJChapa</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    /* ── TOKENS ─────────────────────────────────────────── */
    :root {
      --bg:       #ffffff;
      --fg:       #1d1d1f;
      --muted:    #6e6e73;
      --border:   rgba(0,0,0,0.08);
      --hover-bg: #f5f5f7;
      --sp-1: 5px; --sp-2: 10px; --sp-3: 15px;
      --sp-4: 20px; --sp-5: 30px; --sp-6: 40px;
      --nav-h: 52px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
      --radius-sm: 3px;
      --radius-md: 10px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body {
      animation: fadeIn 0.55s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* subtle bg life */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(circle at 28% 18%, rgba(0,0,0,0.025), transparent 58%),
        radial-gradient(circle at 82% 82%, rgba(0,0,0,0.018), transparent 58%);
    }

    a { color: inherit; text-decoration: none; }

    /* ── NAV ─────────────────────────────────────────────── */
    #nav {
      position: sticky; top: 0; z-index: 1000;
      height: var(--nav-h);
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
    }
    #nav-logo {
      font-size: 13px; font-weight: 600;
      letter-spacing: -0.01em; color: var(--fg);
    }
    #nav-right a {
      font-size: 13px; font-weight: 400; color: var(--muted);
      transition: color 0.18s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    #nav-right a:hover { color: var(--fg); }
    #nav-right svg { width: 11px; height: 11px; }

    /* ── MAIN ────────────────────────────────────────────── */
    #main {
      position: relative; z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 56px 24px 110px;
    }

    /* ── PROFILE ─────────────────────────────────────────── */
    #profile { margin-bottom: var(--sp-5); }

    #profile-top {
      display: flex; align-items: baseline; gap: 12px;
      margin-bottom: 18px;
    }
    #profile-name {
      font-size: 28px; font-weight: 600;
      letter-spacing: -0.025em; color: var(--fg);
    }
    #profile-count {
      font-size: 13px; color: var(--muted); font-weight: 400;
    }

    #profile-filters {
      display: flex; align-items: center;
      border-bottom: 1px solid var(--border);
      gap: 0;
    }
    .filter-tab {
      font-size: 12px; font-weight: 500; color: var(--muted);
      padding: 9px 14px 9px 0;
      margin-right: 14px;
      border-bottom: 1.5px solid transparent;
      cursor: pointer;
      transition: color 0.16s, border-color 0.16s;
      position: relative; top: 1px;
      user-select: none;
    }
    .filter-tab:hover { color: var(--fg); }
    .filter-tab.active { color: var(--fg); border-bottom-color: var(--fg); }

    /* ── GRID ────────────────────────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
      margin-top: var(--sp-5);
      transition: opacity 0.2s;
    }

    /* focus mode */
    #grid:hover .card { opacity: 0.45; }
    #grid:hover .card:hover { opacity: 1; }

    /* ── CARD ────────────────────────────────────────────── */
    .card {
      cursor: pointer;
      display: flex; flex-direction: column; gap: 8px;
      transition: opacity 0.3s ease;
    }

    .card-img {
      aspect-ratio: 1 / 1;
      background: var(--hover-bg);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: transform 0.28s cubic-bezier(0.16,1,0.3,1),
                  box-shadow 0.28s cubic-bezier(0.16,1,0.3,1);
    }

    /* size variation — breaks the grid monotony */
    .card:nth-child(3n) .card-img { aspect-ratio: 3 / 4; }
    .card:nth-child(5n) .card-img { aspect-ratio: 4 / 3; }

    .card:hover .card-img {
      transform: translateY(-5px);
      box-shadow: 0 14px 36px rgba(0,0,0,0.09), 0 4px 12px rgba(0,0,0,0.05);
    }

    .card-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.42s ease, opacity 0.22s ease;
    }
    .card:hover .card-img img {
      transform: scale(1.05);
      opacity: 0.94;
    }

    .card-body { padding: 0 2px; }
    .card-title {
      font-size: 13px; font-weight: 500;
      color: var(--fg); letter-spacing: -0.01em;
      display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; line-height: 1.4;
    }
    .card-meta {
      font-size: 11px; font-weight: 400;
      color: var(--muted); margin-top: 2px;
    }

    /* ── LIGHTBOX ────────────────────────────────────────── */
    #lb {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.24s ease;
    }
    #lb.open { opacity: 1; pointer-events: all; }

    #lb-inner {
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; max-width: 88vw;
    }
    #lb-img {
      max-width: 78vw; max-height: 70vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 32px 90px rgba(0,0,0,0.12), 0 8px 28px rgba(0,0,0,0.07);
      transform: scale(0.96); opacity: 0;
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease;
    }
    #lb.open #lb-img { transform: scale(1); opacity: 1; }

    #lb-label {
      font-size: 13px; font-weight: 500;
      color: var(--fg); text-align: center;
    }

    #lb-top {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }
    #lb-counter { font-size: 12px; color: var(--muted); }
    #lb-close {
      font-size: 12px; font-weight: 500; color: var(--muted);
      cursor: pointer; transition: color 0.16s;
    }
    #lb-close:hover { color: var(--fg); }

    #lb-bottom {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; justify-content: center; gap: 40px;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
    }
    .lb-btn {
      font-size: 12px; font-weight: 500; color: var(--muted);
      background: none; border: none; cursor: pointer;
      font-family: var(--font);
      transition: color 0.16s;
    }
    .lb-btn:hover { color: var(--fg); }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media(max-width: 600px){
      #grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
      #lb-img { max-width: 94vw; max-height: 62vh; }
      #profile-name { font-size: 22px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <div id="nav-logo">AJChapa</div>
  <div id="nav-right">
    <a href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M5 12l7-7M5 12l7 7"/>
      </svg>
      home
    </a>
  </div>
</nav>

<!-- MAIN -->
<main id="main">

  <div id="profile">
    <div id="profile-top">
      <h1 id="profile-name">Archive</h1>
      <span id="profile-count">06 blocks</span>
    </div>
    <div id="profile-filters">
      <span class="filter-tab active">All</span>
      <span class="filter-tab">Photos</span>
      <span class="filter-tab">Projects</span>
    </div>
  </div>

  <div id="grid">

    <div class="card" onclick="openLB(0)">
      <div class="card-img"><img src="photo1.jpg" alt="block 01" /></div>
      <div class="card-body">
        <div class="card-title">block 01</div>
        <div class="card-meta">frame 01</div>
      </div>
    </div>

    <div class="card" onclick="openLB(1)">
      <div class="card-img"><img src="photo2.jpg" alt="block 02" /></div>
      <div class="card-body">
        <div class="card-title">block 02</div>
        <div class="card-meta">frame 02</div>
      </div>
    </div>

    <div class="card" onclick="openLB(2)">
      <div class="card-img"><img src="photo3.jpg" alt="block 03" /></div>
      <div class="card-body">
        <div class="card-title">block 03</div>
        <div class="card-meta">frame 03</div>
      </div>
    </div>

    <div class="card" onclick="openLB(3)">
      <div class="card-img"><img src="photo4.jpg" alt="block 04" /></div>
      <div class="card-body">
        <div class="card-title">block 04</div>
        <div class="card-meta">frame 04</div>
      </div>
    </div>

    <div class="card" onclick="openLB(4)">
      <div class="card-img"><img src="photo5.jpg" alt="block 05" /></div>
      <div class="card-body">
        <div class="card-title">block 05</div>
        <div class="card-meta">frame 05</div>
      </div>
    </div>

    <div class="card" onclick="openLB(5)">
      <div class="card-img"><img src="photo6.jpg" alt="block 06" /></div>
      <div class="card-body">
        <div class="card-title">block 06</div>
        <div class="card-meta">frame 06</div>
      </div>
    </div>

  </div>
</main>

<!-- LIGHTBOX -->
<div id="lb" onclick="handleLBBg(event)">
  <div id="lb-top">
    <span id="lb-counter"></span>
    <span id="lb-close" onclick="closeLB()">close</span>
  </div>
  <div id="lb-inner">
    <img id="lb-img" src="" alt="" />
    <div id="lb-label"></div>
  </div>
  <div id="lb-bottom">
    <button class="lb-btn" onclick="stepLB(-1)">← prev</button>
    <button class="lb-btn" onclick="stepLB(1)">next →</button>
  </div>
</div>

<script>
  // filter tabs
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    });
  });

  // photos
  const photos = [
    { src:'photo1.jpg', title:'block 01', meta:'frame 01' },
    { src:'photo2.jpg', title:'block 02', meta:'frame 02' },
    { src:'photo3.jpg', title:'block 03', meta:'frame 03' },
    { src:'photo4.jpg', title:'block 04', meta:'frame 04' },
    { src:'photo5.jpg', title:'block 05', meta:'frame 05' },
    { src:'photo6.jpg', title:'block 06', meta:'frame 06' },
  ];

  let idx = 0;

  function openLB(i) {
    idx = i;
    const p = photos[i];
    const img = document.getElementById('lb-img');
    img.style.transform = 'scale(0.96)';
    img.style.opacity   = '0';
    img.src = p.src;
    img.alt = p.title;
    setTimeout(() => {
      img.style.transform = 'scale(1)';
      img.style.opacity   = '1';
    }, 12);
    document.getElementById('lb-label').textContent   = p.title;
    document.getElementById('lb-counter').textContent = `${String(i+1).padStart(2,'0')} / 06`;
    document.getElementById('lb').classList.add('open');
  }

  function closeLB() {
    document.getElementById('lb').classList.remove('open');
  }

  function stepLB(dir) {
    openLB((idx + dir + photos.length) % photos.length);
  }

  function handleLBBg(e) {
    if (e.target === document.getElementById('lb')) closeLB();
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lb').classList.contains('open')) return;
    if (e.key === 'Escape')     closeLB();
    if (e.key === 'ArrowRight') stepLB(1);
    if (e.key === 'ArrowLeft')  stepLB(-1);
  });
</script>
</body>
</html>
