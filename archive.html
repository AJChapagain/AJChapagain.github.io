<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archive — AJChapa</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── ARE.NA DESIGN TOKENS ─────────────────────────────── */
    :root {
      --colors-gray0: #ffffff;
      --colors-gray1: #f7f7f7;
      --colors-gray2: #ededed;
      --colors-gray3: #dedede;
      --colors-gray4: #999999;
      --colors-gray5: #696969;
      --colors-gray6: #333333;
      --colors-gray7: #000000;

      --colors-background: var(--colors-gray0);
      --colors-foreground: var(--colors-gray7);
      --colors-muted:      var(--colors-gray4);
      --colors-border:     var(--colors-gray2);
      --colors-hover:      var(--colors-gray1);

      --space-1: 5px;
      --space-2: 10px;
      --space-3: 15px;
      --space-4: 20px;
      --space-5: 30px;
      --space-6: 40px;

      --fonts-sans: 'Mulish', 'Arial', Arial, Helvetica, sans-serif;
      --radii-1: 3px;

      /* Apple spring */
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { background: var(--colors-gray1); }

    body {
      font-family: var(--fonts-sans);
      background: var(--colors-gray1);
      color: var(--colors-foreground);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      animation: pageIn 0.45s var(--ease) both;
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; }

    /* ── NAV ─────────────────────────────────────────────── */
    #nav {
      position: sticky; top: 0; z-index: 1000;
      height: 55px;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--colors-border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--space-4);
    }

    #nav-logo {
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--colors-foreground);
      transition: opacity 0.18s;
      cursor: default;
    }
    #nav-logo:hover { opacity: 0.55; }

    #nav-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 400;
      color: var(--colors-gray5);
      transition: color 0.18s;
    }
    #nav-back:hover { color: var(--colors-foreground); }
    #nav-back svg { width: 11px; height: 11px; }

    /* ── PAGE WRAPPER ────────────────────────────────────── */
    #page {
      max-width: 1080px;
      margin: 24px auto 80px;
      background: var(--colors-background);
      border-radius: 12px;
      border: 1px solid var(--colors-border);
      box-shadow:
        0 1px 2px rgba(0,0,0,0.03),
        0 6px 18px rgba(0,0,0,0.04),
        0 32px 72px rgba(0,0,0,0.04);
      overflow: hidden;
    }

    /* ── PROFILE HEADER ──────────────────────────────────── */
    #profile {
      padding: var(--space-5) var(--space-5) 0;
      border-bottom: 1px solid var(--colors-border);
    }

    #profile-row {
      display: flex; align-items: baseline; gap: var(--space-2);
      margin-bottom: var(--space-3);
    }
    #profile-name {
      font-size: 22px; font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--colors-foreground);
    }
    #profile-count {
      font-size: 12px; font-weight: 400;
      color: var(--colors-muted);
    }

    /* single tab — just "Archive" label */
    #profile-tabs {
      display: flex; align-items: center;
      margin-top: var(--space-1);
    }
    .tab {
      font-size: 12px; font-weight: 600;
      color: var(--colors-foreground);
      padding: var(--space-2) 0;
      border-bottom: 2px solid var(--colors-foreground);
      margin-right: var(--space-4);
      position: relative; top: 1px;
      letter-spacing: 0.01em;
    }

    /* ── GRID AREA ───────────────────────────────────────── */
    #grid-wrap {
      padding: var(--space-4);
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--space-3);
    }

    /* focus mode */
    #grid:hover .block { opacity: 0.45; }
    #grid:hover .block:hover { opacity: 1; }

    /* ── BLOCK (Are.na card anatomy) ─────────────────────── */
    .block {
      cursor: pointer;
      display: flex; flex-direction: column;
      transition: opacity 0.3s ease;
    }

    .block-content {
      display: flex; flex-direction: column; gap: 6px;
    }

    /* image wrapper — square default */
    .block-image {
      aspect-ratio: 1 / 1;
      background: var(--colors-gray1);
      border: 1px solid var(--colors-border);
      border-radius: var(--radii-1);
      overflow: hidden;
      transition:
        border-color 0.2s ease,
        transform 0.35s var(--ease),
        box-shadow 0.35s var(--ease);
    }
    /* size variation */
    .block:nth-child(3n) .block-image { aspect-ratio: 3 / 4; }
    .block:nth-child(5n) .block-image { aspect-ratio: 4 / 3; }
    /* hero */
    .block:nth-child(1)  .block-image { aspect-ratio: 16 / 9; }

    .block-image img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.45s var(--ease), opacity 0.2s ease;
    }

    .block:hover .block-image {
      border-color: var(--colors-gray3);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.08), 0 3px 10px rgba(0,0,0,0.05);
    }
    .block:hover .block-image img {
      transform: scale(1.05);
      opacity: 0.92;
    }
    .block:active .block-image {
      transform: scale(0.98);
      box-shadow: none;
    }

    /* block meta */
    .block-meta {
      padding: 0 2px;
    }
    .block-title {
      font-size: 12px; font-weight: 600;
      color: var(--colors-foreground);
      letter-spacing: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .block-sub {
      font-size: 11px; font-weight: 400;
      color: var(--colors-muted);
      margin-top: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── LIGHTBOX ────────────────────────────────────────── */
    #lb {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(247,247,247,0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.24s ease;
    }
    #lb.open { opacity: 1; pointer-events: all; }

    #lb-inner {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
      max-width: 90vw;
    }
    #lb-img {
      max-width: 76vw; max-height: 68vh;
      object-fit: contain;
      border-radius: 6px;
      border: 1px solid var(--colors-border);
      box-shadow: 0 30px 90px rgba(0,0,0,0.11), 0 6px 24px rgba(0,0,0,0.06);
      transform: scale(0.96); opacity: 0;
      transition: transform 0.48s var(--ease), opacity 0.38s ease;
    }
    #lb.open #lb-img { transform: scale(1); opacity: 1; }

    #lb-label {
      font-size: 12px; font-weight: 600;
      color: var(--colors-foreground);
    }
    #lb-sublabel {
      font-size: 11px; color: var(--colors-muted);
      margin-top: -6px;
    }

    #lb-top {
      position: absolute; top: 0; left: 0; right: 0;
      height: 44px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 var(--space-4);
      border-bottom: 1px solid var(--colors-border);
      background: rgba(255,255,255,0.6);
    }
    #lb-counter { font-size: 11px; color: var(--colors-muted); font-weight: 400; }
    #lb-close {
      font-size: 11px; font-weight: 600;
      color: var(--colors-gray5); cursor: pointer;
      transition: color 0.16s;
      letter-spacing: 0.02em;
    }
    #lb-close:hover { color: var(--colors-foreground); }

    #lb-bottom {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 44px;
      display: flex; align-items: center; justify-content: center;
      gap: var(--space-5);
      border-top: 1px solid var(--colors-border);
      background: rgba(255,255,255,0.6);
    }
    .lb-btn {
      font-size: 11px; font-weight: 600;
      color: var(--colors-gray5);
      background: none; border: none; cursor: pointer;
      font-family: var(--fonts-sans);
      letter-spacing: 0.02em;
      transition: color 0.16s;
    }
    .lb-btn:hover { color: var(--colors-foreground); }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media(max-width: 768px) {
      #page { margin: 10px; border-radius: 8px; }
      #profile { padding: var(--space-4) var(--space-3) 0; }
      #grid-wrap { padding: var(--space-3); }
      #grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: var(--space-2); }
      .block:nth-child(1) .block-image { aspect-ratio: 3 / 2; }
      #lb-img { max-width: 94vw; max-height: 58vh; }
      #nav { padding: 0 var(--space-3); }
    }
    @media(max-width: 420px) {
      #grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <div id="nav-logo">AJChapa</div>
  <a id="nav-back" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M5 12l7-7M5 12l7 7"/>
    </svg>
    home
  </a>
</nav>

<!-- PAGE -->
<div id="page">

  <!-- PROFILE -->
  <div id="profile">
    <div id="profile-row">
      <h1 id="profile-name">Archive</h1>
      <span id="profile-count">06 blocks</span>
    </div>
    <div id="profile-tabs">
      <span class="tab">Blocks</span>
    </div>
  </div>

  <!-- GRID -->
  <div id="grid-wrap">
    <div id="grid">

      <div class="block" onclick="openLB(0)">
        <div class="block-content">
          <div class="block-image"><img src="photo1.jpg" alt="block 01" loading="lazy" /></div>
          <div class="block-meta">
            <div class="block-title">block 01</div>
            <div class="block-sub">frame 01</div>
          </div>
        </div>
      </div>

      <div class="block" onclick="openLB(1)">
        <div class="block-content">
          <div class="block-image"><img src="photo2.jpg" alt="block 02" loading="lazy" /></div>
          <div class="block-meta">
            <div class="block-title">block 02</div>
            <div class="block-sub">frame 02</div>
          </div>
        </div>
      </div>

      <div class="block" onclick="openLB(2)">
        <div class="block-content">
          <div class="block-image"><img src="photo3.jpg" alt="block 03" loading="lazy" /></div>
          <div class="block-meta">
            <div class="block-title">block 03</div>
            <div class="block-sub">frame 03</div>
          </div>
        </div>
      </div>

      <div class="block" onclick="openLB(3)">
        <div class="block-content">
          <div class="block-image"><img src="photo4.jpg" alt="block 04" loading="lazy" /></div>
          <div class="block-meta">
            <div class="block-title">block 04</div>
            <div class="block-sub">frame 04</div>
          </div>
        </div>
      </div>

      <div class="block" onclick="openLB(4)">
        <div class="block-content">
          <div class="block-image"><img src="photo5.jpg" alt="block 05" loading="lazy" /></div>
          <div class="block-meta">
            <div class="block-title">block 05</div>
            <div class="block-sub">frame 05</div>
          </div>
        </div>
      </div>

      <div class="block" onclick="openLB(5)">
        <div class="block-content">
          <div class="block-image"><img src="photo6.jpg" alt="block 06" loading="lazy" /></div>
          <div class="block-meta">
            <div class="block-title">block 06</div>
            <div class="block-sub">frame 06</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lb" onclick="handleLBBg(event)">
  <div id="lb-top">
    <span id="lb-counter"></span>
    <span id="lb-close" onclick="closeLB()">close</span>
  </div>
  <div id="lb-inner">
    <img id="lb-img" src="" alt="" />
    <div id="lb-label"></div>
    <div id="lb-sublabel"></div>
  </div>
  <div id="lb-bottom">
    <button class="lb-btn" onclick="stepLB(-1)">← prev</button>
    <button class="lb-btn" onclick="stepLB(1)">next →</button>
  </div>
</div>

<script>
  const photos = [
    { src:'photo1.jpg', title:'block 01', sub:'frame 01' },
    { src:'photo2.jpg', title:'block 02', sub:'frame 02' },
    { src:'photo3.jpg', title:'block 03', sub:'frame 03' },
    { src:'photo4.jpg', title:'block 04', sub:'frame 04' },
    { src:'photo5.jpg', title:'block 05', sub:'frame 05' },
    { src:'photo6.jpg', title:'block 06', sub:'frame 06' },
  ];

  let idx = 0;

  function openLB(i) {
    idx = i;
    const p = photos[i];
    const img = document.getElementById('lb-img');
    img.style.transition = 'none';
    img.style.transform  = 'scale(0.96)';
    img.style.opacity    = '0';
    img.src = p.src;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      img.style.transition = '';
      img.style.transform  = 'scale(1)';
      img.style.opacity    = '1';
    }));
    document.getElementById('lb-label').textContent    = p.title;
    document.getElementById('lb-sublabel').textContent = p.sub;
    document.getElementById('lb-counter').textContent  = `${String(i+1).padStart(2,'0')} / 06`;
    document.getElementById('lb').classList.add('open');
  }

  function closeLB() {
    document.getElementById('lb').classList.remove('open');
  }

  function stepLB(dir) {
    openLB((idx + dir + photos.length) % photos.length);
  }

  function handleLBBg(e) {
    if (e.target === document.getElementById('lb')) closeLB();
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lb').classList.contains('open')) return;
    if (e.key === 'Escape')     closeLB();
    if (e.key === 'ArrowRight') stepLB(1);
    if (e.key === 'ArrowLeft')  stepLB(-1);
  });
</script>
</body>
</html>
